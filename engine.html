<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K_CORE_ENGINE | KNOCKSSTUDiOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        
        /* HEADER STATUS BAR */
        .status-bar { display: flex; justify-content: space-between; padding: 15px; border: 1px solid #222; background: #000; margin-bottom: 20px; }
        .coin-count { color: #FF8C00; font-weight: bold; }

        /* MAIN GENERATOR LAYOUT */
        .engine-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1200px; margin: 0 auto; }

        /* VIDEO VIEWPORT */
        .viewport { background: #000; border: 1px solid #FF8C00; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #main-video { width: 100%; height: 100%; display: none; object-fit: cover; }
        .placeholder-text { color: #333; letter-spacing: 5px; font-size: 12px; }

        /* CONTROL PANEL */
        .controls { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; }
        h3 { font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; color: #888; }
        
        textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; height: 120px; font-family: 'Courier New', monospace; margin-bottom: 20px; outline: none; resize: none; }
        textarea:focus { border-color: #FF8C00; }

        .burn-btn { width: 100%; background: #FF8C00; color: #000; border: none; padding: 18px; font-weight: bold; cursor: pointer; letter-spacing: 3px; margin-bottom: 10px; }
        .burn-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        :focus-visible { outline: 2px solid #FF8C00; outline-offset: 2px; }

        .download-btn { width: 100%; background: transparent; border: 1px solid #444; color: #666; padding: 12px; cursor: pointer; display: none; }
        .download-btn.active { display: block; color: #00FF00; border-color: #00FF00; }
        .burn-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* COMPANiON BOT WiDGET */
        .companion-widget {
            position: fixed; bottom: 20px; right: 20px; width: 260px;
            background: #0a0a0a; border: 1px solid #00f2ff; border-radius: 8px;
            font-family: 'Courier New', monospace; z-index: 100;
            box-shadow: 0 0 20px rgba(0,242,255,0.1); display: none;
        }
        .companion-header {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px;
            border-bottom: 1px solid #1a1a1a; cursor: pointer;
        }
        .companion-icon { font-size: 18px; }
        .companion-name { font-size: 10px; letter-spacing: 2px; color: #00f2ff; font-weight: bold; }
        .companion-role { font-size: 8px; color: #555; letter-spacing: 1px; }
        .companion-body { padding: 12px 15px; }
        .companion-msg {
            font-size: 9px; color: #888; letter-spacing: 1px; line-height: 1.6;
            min-height: 30px;
        }
        .companion-msg .tip-label { color: #00f2ff; font-weight: bold; display: block; margin-bottom: 4px; }
        .companion-link { display: block; text-align: center; padding: 8px; border-top: 1px solid #1a1a1a; font-size: 8px; color: #444; text-decoration: none; letter-spacing: 2px; }
        .companion-link:hover { color: #00f2ff; }
    </style>
</head>
<body>

    <header class="status-bar" role="banner">
        <div>OPERATOR: <span id="op-id">KNOCKS_OWNER</span></div>
        <div class="coin-count">COINS: <span id="coin-balance" aria-live="polite">2,000</span></div>
    </header>

    <div id="free-tier-banner" style="display:none; max-width:1200px; margin:0 auto 15px; padding:12px 20px; border:1px solid #00FF00; background:rgba(0,255,0,0.05); font-size:11px; color:#00FF00; letter-spacing:2px; text-align:center;">
        FREE TiER ACTiVE: <span id="free-renders-left">2</span>/2 FREE 5-SEC ViDEO RENDERS REMAiNiNG
    </div>

    <main class="engine-grid">
        <div class="output-side">
            <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">9K Core Engine</h1>
            <div class="viewport" id="viewport">
                <div class="placeholder-text" id="loader">SYSTEM_READY_FOR_BURN...</div>
            </div>

            <div id="render-result" style="display:none; margin-top:10px; padding:15px; border:1px solid #00FF00; background:rgba(0,255,0,0.05); text-align:center; font-size:11px; color:#00FF00; letter-spacing:2px;">
                RENDER OUTPUT READY — USE DOWNLOAD BUTTON BELOW
            </div>
        </div>

        <div class="controls">
            <h2 style="font-size:14px; letter-spacing:2px; margin-bottom:20px; color:#888;">INPUT_PROMPT_9K</h2>
            <label for="prompt-input" style="display:block; font-size:10px; color:#666; margin-bottom:8px;">Enter visual or audio rendering parameters</label>
            <textarea id="prompt-input" placeholder="Enter visual/audio parameters..."></textarea>

            <button type="button" class="burn-btn" onclick="initiateBurn()">START_BURN — 50 CREDiTS</button>
            <button type="button" class="burn-btn" id="free-burn-btn" style="display:none; background:#00FF00; margin-top:5px;" onclick="freeBurn()">FREE RENDER — 5 SEC ViDEO</button>
            <button type="button" class="download-btn" id="dl-btn" onclick="downloadAsset()" aria-label="Download rendered 9K master file">DOWNLOAD_9K_MASTER</button>
        </div>
    </main>

    <script>
        let credits = parseInt(localStorage.getItem('knocks_credits')) || 0;
        let freeRenders = parseInt(localStorage.getItem('knocks_free_renders')) || 0;
        let renderInProgress = false;
        document.getElementById('coin-balance').innerText = credits.toLocaleString();

        // Show user name if available
        try {
            const user = JSON.parse(localStorage.getItem('knocks_user'));
            if (user && user.name) document.getElementById('op-id').innerText = user.name.toUpperCase();
        } catch(e) {}

        // Show free tier UI
        function updateFreeUI() {
            const banner = document.getElementById('free-tier-banner');
            const freeBtn = document.getElementById('free-burn-btn');
            if (freeRenders > 0) {
                banner.style.display = 'block';
                freeBtn.style.display = 'block';
                document.getElementById('free-renders-left').innerText = freeRenders;
            } else {
                banner.style.display = 'none';
                freeBtn.style.display = 'none';
            }
        }
        updateFreeUI();

        // AUTO-PREViEW: If user just logged in, run a demo preview automatically
        (function autoPreview() {
            const justLoggedIn = localStorage.getItem('knocks_just_logged_in');
            if (justLoggedIn === 'true') {
                localStorage.removeItem('knocks_just_logged_in');
                setTimeout(function() {
                    const promptEl = document.getElementById('prompt-input');
                    if (!promptEl.value) {
                        promptEl.value = 'WELCOME BACK — 9K ENGiNE PREViEW';
                    }
                    // Run a quick visual preview (no credits charged)
                    if (renderInProgress) return;
                    renderInProgress = true;
                    disableAllBtns();
                    var loader = document.getElementById('loader');
                    var viewport = document.getElementById('viewport');
                    loader.style.display = 'block';
                    loader.innerText = 'AUTO-PREViEW ACTiVE — NO CREDiTS CHARGED...';
                    loader.style.color = '#00f2ff';

                    var progress = 0;
                    var previewSteps = ['SCANNiNG NEURAL LAYERS...', 'PREViEW BUiLDiNG...', 'WATERMARK OVERLAY ACTiVE...', 'PREViEW COMPLETE'];
                    var previewRun = setInterval(function() {
                        progress += 4;
                        if (progress <= 25) loader.innerText = previewSteps[0];
                        else if (progress <= 50) loader.innerText = previewSteps[1];
                        else if (progress <= 75) loader.innerText = previewSteps[2];
                        else loader.innerText = previewSteps[3];

                        if (progress >= 100) {
                            clearInterval(previewRun);
                            loader.innerText = 'PREViEW READY — ENTER A PROMPT TO RENDER.';
                            loader.style.color = '#00f2ff';
                            viewport.style.borderColor = '#00f2ff';
                            viewport.style.boxShadow = '0 0 20px rgba(0,242,255,0.15)';
                            renderInProgress = false;
                            enableAllBtns();
                        }
                    }, 50);
                }, 800);
            }
        })();

        function disableAllBtns() {
            document.querySelector('.burn-btn').disabled = true;
            document.getElementById('free-burn-btn').disabled = true;
        }
        function enableAllBtns() {
            document.querySelector('.burn-btn').disabled = false;
            document.getElementById('free-burn-btn').disabled = false;
        }

        // FREE 5-SEC ViDEO BURN
        function freeBurn() {
            if (renderInProgress) return;
            if (freeRenders <= 0) {
                alert("NO FREE RENDERS LEFT. USE CREDiTS OR UPGRADE.");
                return;
            }
            const prompt = document.getElementById('prompt-input').value;
            if (!prompt) { alert("ENTER A PROMPT FiRST"); return; }

            renderInProgress = true;
            disableAllBtns();
            const loader = document.getElementById('loader');
            const viewport = document.getElementById('viewport');

            loader.style.display = 'block';
            loader.innerText = "GENERATiNG FREE 5-SEC ViDEO...";
            loader.style.color = '#00FF00';

            // Simulate render progress
            let progress = 0;
            const steps = ["iNiTiALiZiNG NEURAL LAYERS...", "BUiLDiNG 5-SEC SEQUENCE...", "APPLYiNG ViSUAL FiLTERS...", "FiNALiZiNG OUTPUT..."];
            const progressInterval = setInterval(() => {
                progress += 5;
                if (progress <= 25) loader.innerText = steps[0];
                else if (progress <= 50) loader.innerText = steps[1];
                else if (progress <= 75) loader.innerText = steps[2];
                else loader.innerText = steps[3];

                if (progress >= 100) {
                    clearInterval(progressInterval);
                    // Only deduct AFTER render completes
                    freeRenders--;
                    localStorage.setItem('knocks_free_renders', freeRenders);
                    updateFreeUI();

                    loader.innerText = "FREE 5-SEC ViDEO RENDER COMPLETE — " + freeRenders + " FREE RENDER(S) REMAiNiNG";
                    loader.style.color = '#00FF00';
                    viewport.style.borderColor = '#00FF00';
                    viewport.style.boxShadow = '0 0 30px rgba(0,255,0,0.2)';

                    const dlBtn = document.getElementById('dl-btn');
                    dlBtn.classList.add('active');

                    renderInProgress = false;
                    enableAllBtns();
                }
            }, 60);
        }

        function initiateBurn() {
            if (renderInProgress) return;
            const prompt = document.getElementById('prompt-input').value;
            if(!prompt) { alert("ENTER A PROMPT FIRST"); return; }

            if(credits < 50) {
                alert("NEED 50 CREDiTS. YOU HAVE " + credits + ". ViSiT THE STORE.");
                return;
            }

            renderInProgress = true;
            disableAllBtns();
            const loader = document.getElementById('loader');
            const viewport = document.getElementById('viewport');

            loader.style.display = 'block';
            loader.innerText = "iNiTiATiNG 9K BURN... CREDiTS CHARGED ON COMPLETiON.";
            loader.style.color = '#FF8C00';

            let progress = 0;
            const steps = ["GENERATING_NEURAL_LAYERS...", "APPLYiNG 9K_RENDER_MATRIX...", "iNJECTiNG TRADEMARK SiGNATURE...", "FiNALiZiNG MASTER OUTPUT..."];
            const progressInterval = setInterval(() => {
                progress += 3;
                if (progress <= 25) loader.innerText = steps[0];
                else if (progress <= 50) loader.innerText = steps[1];
                else if (progress <= 75) loader.innerText = steps[2];
                else loader.innerText = steps[3];

                if (progress >= 100) {
                    clearInterval(progressInterval);
                    // Deduct credits ONLY after successful render
                    credits -= 50;
                    localStorage.setItem('knocks_credits', credits);
                    document.getElementById('coin-balance').innerText = credits.toLocaleString();

                    loader.innerText = "9K_RENDER_COMPLETE — 50 CREDiTS CHARGED. MASTER FiLE READY.";
                    loader.style.color = '#00FF00';
                    viewport.style.borderColor = '#00FF00';
                    viewport.style.boxShadow = '0 0 30px rgba(0,255,0,0.2)';

                    const dlBtn = document.getElementById('dl-btn');
                    dlBtn.classList.add('active');

                    renderInProgress = false;
                    enableAllBtns();
                }
            }, 50);
        }

        function downloadAsset() {
            alert("DOWNLOADING_9K_MASTER_FILE...");
        }
    </script>

    <!-- COMPANiON BOT WiDGET -->
    <div class="companion-widget" id="companion-widget" role="complementary" aria-label="Companion bot assistant">
        <div class="companion-header" onclick="toggleCompanionBody()">
            <span class="companion-icon" id="cw-icon"></span>
            <div>
                <div class="companion-name" id="cw-name">—</div>
                <div class="companion-role" id="cw-role">—</div>
            </div>
        </div>
        <div class="companion-body" id="cw-body">
            <div class="companion-msg" id="cw-msg">
                <span class="tip-label">TiP:</span>
                Loading...
            </div>
        </div>
        <a href="companions.html" class="companion-link">UNLOCK MORE BOTS →</a>
    </div>

    <script>
        // COMPANiON BOT iNiT
        (function initCompanion() {
            var data = localStorage.getItem('knocks_companion');
            if (!data) return;
            try {
                var companion = JSON.parse(data);
                var widget = document.getElementById('companion-widget');
                widget.style.display = 'block';
                document.getElementById('cw-icon').innerText = companion.icon;
                document.getElementById('cw-name').innerText = companion.name;
                document.getElementById('cw-role').innerText = companion.role;

                var tips = [
                    'Enter a detailed prompt for better results. Include style, mood, and camera angle.',
                    'Free renders are 5 seconds each. Use them to test your ideas before spending credits.',
                    'Credits are only charged after a render completes. No risk if you cancel.',
                    'Try combining styles: "cinematic + hand-drawn" for unique outputs.',
                    'Your render history is saved locally. Come back anytime to continue.',
                    'Need more credits? Visit the Archive Store for bonus packs.',
                    'Unlock the School companion pack for render tutorials and tips.'
                ];
                var tip = tips[Math.floor(Math.random() * tips.length)];
                document.getElementById('cw-msg').innerHTML = '<span class="tip-label">TiP:</span>' + tip;
            } catch(e) {}
        })();
        function toggleCompanionBody() {
            var body = document.getElementById('cw-body');
            body.style.display = body.style.display === 'none' ? 'block' : 'none';
        }
    </script>

</body>
</html>
