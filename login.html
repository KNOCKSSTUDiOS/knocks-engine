<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Log In — KNOCKSSTUDiOS Engine</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#02030a;
      --accent:#7fd0ff;
      --accent-2:#9f5bff;
      --muted:#7b8aa8;
      --text:#e5f3ff;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
    html,body{height:100%}
    body{
      background:radial-gradient(circle at top,#07111f 0,#02040a 45%,#000 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
    }
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .card{
      max-width:420px;width:100%;
      border-radius:20px;
      border:1px solid rgba(127,208,255,0.4);
      background:radial-gradient(circle at top,#0b1b30 0,#02040a 55%,#000 100%);
      box-shadow:0 0 80px rgba(0,0,0,0.9),0 0 60px rgba(127,208,255,0.18);
      padding:26px 24px;
    }
    .badge{
      font-size:0.8rem;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }
    h1{
      font-size:1.3rem;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:14px;
    }
    .sub{font-size:0.9rem;color:var(--text);opacity:0.9;margin-bottom:18px;}
    .btn{
      margin-top:10px;
      width:100%;
      padding:10px 18px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      font-size:0.8rem;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#041018;
      box-shadow:0 8px 28px rgba(31,209,255,0.25);
    }
    .footer{
      margin-top:14px;
      font-size:0.8rem;
      color:var(--muted);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    a{color:var(--accent);text-decoration:none;font-size:0.8rem}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">Log in • Lab Legends Engine</div>
      <h1>Resume your session</h1>
      <div class="sub">
        This prototype uses your last saved local profile.  
        If you cleared your browser storage, sign up again.
      </div>

      <button class="btn" id="login-btn">Enter Dashboard</button>

      <div class="footer">
        <span><a href="signup.html">Create new profile</a></span>
        <span><a href="index.html">← Back to landing</a></span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("login-btn").addEventListener("click", function(){
      const raw = localStorage.getItem("knocks_state_v1");
      if(!raw){
        alert("No local profile found. Please sign up first.");
        window.location.href = "signup.html";
        return;
      }
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
