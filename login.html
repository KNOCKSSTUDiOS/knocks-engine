<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATOR_SYNC | KNOCKSSTUDIOS</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 350px; border: 1px solid #333; padding: 40px; background: #050505; position: relative; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #FF8C00; }
        h2 { color: #FF8C00; letter-spacing: 5px; text-align: center; font-size: 18px; margin-bottom: 30px; }
        label { color: #666; font-size: 10px; display: block; margin-bottom: 5px; }
        input { width: 100%; background: #111; border: 1px solid #222; padding: 12px; color: #fff; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #FF8C00; }
        .btn-sync { width: 100%; background: #FF8C00; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        .btn-sync:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        :focus-visible { outline: 2px solid #FF8C00; outline-offset: 2px; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 10px; color: #444; }
        .footer-link a { color: #FF8C00; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-card" role="main">
    <h1 style="color: #FF8C00; letter-spacing: 5px; text-align: center; font-size: 18px; margin-bottom: 30px;">OPERATOR_SYNC</h1>
    <form action="/engine/login" method="POST">
        <label for="login-id">OPERATOR_ID / EMAIL</label>
        <input type="text" id="login-id" name="id" required placeholder="ENTRY_CODE">

        <label for="login-password">ACCESS_PASSCODE</label>
        <input type="password" id="login-password" name="password" required placeholder="********">

        <button type="submit" class="btn-sync">INITIALIZE_SESSION</button>
    </form>
    <div class="footer-link">
        UNREGISTERED? <a href="signup.html">SECURE_BRIEF</a>
    </div>
</div>

</body>
</html>
