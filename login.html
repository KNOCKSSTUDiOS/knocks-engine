<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | KNOCKSSTUDiOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* CINEMATIC BACKGROUND */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,255,242,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 0% 100%, rgba(188,19,254,0.04) 0%, transparent 50%),
                radial-gradient(ellipse 40% 40% at 100% 100%, rgba(255,215,0,0.04) 0%, transparent 50%);
            z-index: 0;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,242,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,242,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #00fff2, transparent);
            z-index: 0;
            animation: scanDown 6s linear infinite;
            opacity: 0.3;
            pointer-events: none;
        }
        @keyframes scanDown { 0% { top: -2px; } 100% { top: 100%; } }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(5,5,5,0.9);
            border: 1px solid #1a1a1a;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #00fff2, #bc13fe, #ffd700);
        }

        .brand-link {
            display: block;
            text-align: center;
            margin-bottom: 40px;
            text-decoration: none;
        }
        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 5px;
            background: linear-gradient(270deg, #00fff2, #bc13fe, #ffd700, #00fff2);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brandShift 8s ease infinite;
        }
        @keyframes brandShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .login-subtitle {
            text-align: center;
            font-size: 12px;
            color: #444;
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        .form-group { margin-bottom: 22px; }
        .form-label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 3px;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 14px 16px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-input:focus {
            border-color: #00fff2;
            box-shadow: 0 0 15px rgba(0,255,242,0.1);
        }
        .form-input::placeholder { color: #333; }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00fff2, #00bcd4);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        .btn-login:hover { box-shadow: 0 0 30px rgba(0,255,242,0.4); transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1a1a1a;
        }
        .divider span {
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
        }

        .forgot-link {
            display: block;
            text-align: center;
            color: #444;
            font-size: 11px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }
        .forgot-link:hover { color: #00fff2; }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #444;
        }
        .signup-link a {
            color: #00fff2;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .signup-link a:hover { color: #fff; }

        .error-msg {
            background: rgba(255,50,50,0.1);
            border: 1px solid rgba(255,50,50,0.2);
            color: #ff4444;
            font-size: 11px;
            padding: 12px;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: none;
        }
        .success-msg {
            background: rgba(0,255,100,0.1);
            border: 1px solid rgba(0,255,100,0.2);
            color: #00ff66;
            font-size: 11px;
            padding: 12px;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: none;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #222;
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        .back-home:hover { color: #555; }

        :focus-visible { outline: 2px solid #00fff2; outline-offset: 2px; }
    </style>
</head>
<body>

<div class="grid-overlay" aria-hidden="true"></div>
<div class="scanline" aria-hidden="true"></div>

<div class="login-container">
    <div class="login-card" role="main">
        <a href="index.html" class="brand-link">
            <span class="brand-name">KNOCKSSTUDiOS</span>
        </a>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to access the engine</p>

        <div id="error-msg" class="error-msg" role="alert"></div>
        <div id="success-msg" class="success-msg" role="status"></div>

        <form id="login-form" onsubmit="handleLogin(event)" novalidate>
            <div class="form-group">
                <label for="login-email" class="form-label">Email Address</label>
                <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password" class="form-label">Password</label>
                <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="login-btn">Log In</button>
        </form>

        <div class="divider"><span>OR</span></div>
        <button type="button" class="forgot-link" onclick="handleForgotPassword()">Forgot your password?</button>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </div>
    </div>
    <a href="index.html" class="back-home">&larr; Back to Home</a>
</div>

<script type="module">
import { login, requestPasswordRecovery, handleAuthCallback, AuthError, MissingIdentityError } from '@netlify/identity';

// Process auth callbacks on page load
try {
    const result = await handleAuthCallback();
    if (result) {
        if (result.type === 'recovery') {
            window.location.href = 'settings.html';
        } else if (result.type === 'confirmation') {
            showSuccess('Email confirmed! You are now logged in.');
            setTimeout(() => { window.location.href = 'engine.html'; }, 1500);
        }
    }
} catch (err) {
    if (err instanceof AuthError) {
        showError(err.message);
    }
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
}
function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
}

window.handleLogin = async function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    if (!email || !password) {
        showError('Please enter your email and password.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'SIGNING IN...';

    try {
        const user = await login(email, password);
        showSuccess('Welcome back! Redirecting...');
        setTimeout(() => { window.location.href = 'engine.html'; }, 1000);
    } catch (error) {
        if (error instanceof MissingIdentityError) {
            showError('Identity service not configured. Please try again later.');
        } else if (error instanceof AuthError) {
            showError(error.status === 401 ? 'Invalid email or password.' : error.message);
        } else {
            showError('An unexpected error occurred. Please try again.');
        }
        btn.disabled = false;
        btn.textContent = 'LOG IN';
    }
};

window.handleForgotPassword = async function() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) {
        showError('Enter your email address first, then click forgot password.');
        return;
    }
    try {
        await requestPasswordRecovery(email);
        showSuccess('Recovery email sent! Check your inbox.');
    } catch (error) {
        if (error instanceof AuthError) {
            showError(error.message);
        } else {
            showError('Could not send recovery email. Please try again.');
        }
    }
};
</script>

</body>
</html>
