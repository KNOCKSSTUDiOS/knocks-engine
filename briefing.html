<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS_BRIEFING | SECURE_CHANNEL</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #000; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; }
        
        /* THE WATERMARK BACKGROUND */
        .page-watermark { position: fixed; bottom: 20px; right: 20px; font-size: 0.5rem; color: rgba(255, 255, 255, 0.1); letter-spacing: 2px; z-index: 1000; pointer-events: none; }

        .briefing-box { width: 100%; max-width: 700px; border: 1px solid #111; background: rgba(5,5,5,0.98); padding: 50px; position: relative; backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0,0,0,1); }
        .header { border-bottom: 1px solid #222; margin-bottom: 40px; padding-bottom: 20px; }
        .header h1 { font-size: 1.4rem; letter-spacing: 10px; color: var(--neon); margin: 0; }
        .header p { font-size: 0.5rem; color: #444; letter-spacing: 3px; margin-top: 10px; }
        
        .form-group { margin-bottom: 30px; }
        label { display: block; font-size: 0.6rem; color: var(--neon); margin-bottom: 12px; letter-spacing: 2px; opacity: 0.7; }
        
        input, select, textarea { 
            width: 100%; background: #050505; border: 1px solid #222; color: #fff; 
            padding: 18px; font-family: 'Courier New'; outline: none; border-radius: 0; box-sizing: border-box; font-size: 0.8rem;
        }
        input:focus, textarea:focus { border-color: var(--neon); }
        
        .submit-btn { 
            width: 100%; padding: 25px; background: transparent; border: 1px solid var(--neon); 
            color: var(--neon); font-weight: 900; cursor: pointer; letter-spacing: 6px; 
            transition: 0.3s; font-size: 0.9rem;
        }
        .submit-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 40px rgba(0,242,255,0.4); }
        :focus-visible { outline: 2px solid var(--neon); outline-offset: 2px; }

        #status { font-size: 0.6rem; color: var(--gold); margin-top: 20px; text-align: center; height: 15px; letter-spacing: 2px; }
        
        .credit-tag { font-size: 0.5rem; color: #222; margin-top: 40px; text-align: center; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="page-watermark" aria-hidden="true">KNOCKSSTUDiOS // TRADEMARK_PROTECTED</div>

    <main class="briefing-box">
        <div class="header">
            <h1>PROJECT_BRIEFING</h1>
            <p>ENCRYPTED_UPLINK_v1.0 // KNOCKSSTUDiOS</p>
        </div>

        <form id="briefing-form">
            <div class="form-group">
                <label for="from_email">OPERATOR_ID (EMAIL)</label>
                <input type="email" id="from_email" required placeholder="OPERATOR@DOMAIN.COM">
            </div>

            <div class="form-group">
                <label for="render_style">TARGET_ENGINE_STYLE</label>
                <select id="render_style">
                    <option>STYLIZED_3D_HIGH_FIDELITY</option>
                    <option>HAND-DRAWN_CELL_SHADE_v4</option>
                    <option>PHOTOREAL_MOTION_HQ</option>
                    <option>PROPRIETARY_HYBRID_RENDER</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">PROJECT_DETAILS (UNRESTRICTED_SPECS)</label>
                <textarea id="message" rows="6" required placeholder="DESCRIBE THE VISION..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">SEND_ENCRYPTED_BRIEF</button>
        </form>

        <div id="status" aria-live="polite"></div>

        <div class="credit-tag" aria-hidden="true">KNOCKSSTUDiOS powered by AI LAB LEGENDS</div>

        <nav style="margin-top: 20px; text-align: center;" aria-label="Page navigation">
            <a href="index.html" style="color: #222; text-decoration: none; font-size: 0.6rem; letter-spacing: 3px;">[ DISCONNECT_SESSION ]</a>
        </nav>
    </main>

    <script>
        emailjs.init("0orOwiW9_U2sNzWLf");
        document.getElementById('briefing-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status');
            btn.innerText = "UPLOADING_TO_GRID...";
            btn.disabled = true;
            const params = {
                from_email: document.getElementById('from_email').value,
                render_style: document.getElementById('render_style').value,
                message: document.getElementById('message').value
            };
            emailjs.send("service_default", "template_default", params)
                .then(() => {
                    let count = 0;
                    const hashInterval = setInterval(() => {
                        const randomHash = Math.random().toString(36).substring(2, 12).toUpperCase();
                        status.innerText = `GENERATING_HASH: 0x${randomHash}...`;
                        count++;
                        if(count > 12) {
                            clearInterval(hashInterval);
                            status.style.color = "#00ff00";
                            status.innerText = "TRANSMISSION_SECURE // SUCCESS";
                            setTimeout(() => { window.location.href = "index.html"; }, 2000);
                        }
                    }, 80);
                }, (err) => {
                    status.innerText = "ERROR: UPLINK_INTERRUPTED.";
                    btn.disabled = false;
                    btn.innerText = "RE-ATTEMPT_SEND";
                });
        });
    </script>
</body>
</html>
