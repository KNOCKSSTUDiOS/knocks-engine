<div id="render-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 2px solid #FFD700; padding: 30px; z-index: 1000; text-align: center; width: 350px;">
    
    <h3 style="color: #FFD700; margin-bottom: 20px;">INITIALIZE_RENDER?</h3>
    
    <div style="color: #fff; margin-bottom: 25px; font-family: monospace; font-size: 14px;">
        <p>COST: <span style="color: #FFD700;">1,000 COINS</span></p>
        <p>MAX LENGTH: <span style="color: #FFD700;">5 SECONDS</span></p>
        <p style="font-size: 10px; color: #666;">(UPGRADE TO BASIC FOR 15 MIN RENDER)</p>
    </div>

    <div style="display: flex; justify-content: space-between;">
        <button onclick="closeModal()" style="background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer;">CANCEL</button>
        <button onclick="processRender()" style="background: #FFD700; border: none; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer;">START_BURN</button>
    </div>
</div>
