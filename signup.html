<div id="signup-gateway" style="max-width: 500px; margin: 40px auto; background: #080808; padding: 40px; border: 1px solid #1a1a1a; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    
    <h2 style="color: #FFD700; text-align: center; font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">SECURE_BRIEF</h2>
    <p style="color: #666; text-align: center; font-size: 12px; margin-bottom: 30px;">INITIALIZE NEW OPERATOR ACCOUNT</p>

    <form action="/engine/onboard" method="POST">
        <label style="color: #888; display: block; margin-bottom: 5px;">FULL NAME</label>
        <input type="text" name="name" placeholder="John Doe" required style="width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px;">

        <label style="color: #888; display: block; margin-bottom: 5px;">EMAIL ADDRESS</label>
        <input type="email" name="email" placeholder="operator@knocks.studio" required style="width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px;">

        <label style="color: #888; display: block; margin-bottom: 5px;">PASSWORD</label>
        <input type="password" name="password" placeholder="••••••••" required style="width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px;">

        <label style="color: #FFD700; display: block; margin-bottom: 10px; font-weight: bold;">SELECT ACCESS LEVEL</label>
        <select name="tier" style="width: 100%; background: #111; border: 1px solid #FFD700; color: #fff; padding: 12px; margin-bottom: 25px;">
            <option value="free">FREE (5s LIMIT + 2,000 COIN BONUS)</option>
            <option value="basic">BASIC ($10/mo - 15 MIN LIMIT)</option>
            <option value="pro">PRO ($30/mo - 1 HOUR LIMIT)</option>
            <option value="ultra">ULTRA ($60/mo - UNLIMITED ACCESS)</option>
        </select>

        <button type="submit" style="width: 100%; background: #FFD700; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; letter-spacing: 1px;">INITIATE SYNC</button>
    </form>

    <p style="color: #444; font-size: 10px; text-align: center; margin-top: 20px;">BY JOINING, YOU AGREE TO THE SOVEREIGN ENGINE TERMS.</p>
</div>
