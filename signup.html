    <style>

        body { background-color: #050505; color: #fff; font-family: 'Courier New', Courier, monospace; line-height: 1.6; padding: 40px 20px; }
        
        .container { max-width: 900px; margin: 0 auto; }

        input, select { width: 100%; background: #0a0a0a; border: 1px solid #333; padding: 12px; color: #fff; font-family: 'Courier New', monospace; outline: none; }
        input:focus, select:focus { border-color: #FF8C00; }

        .submit-btn { width: 100%; background: #FF8C00; color: #000; border: none; padding: 15px; margin-top: 30px; font-weight: bold; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .submit-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        .bonus-tag { text-align: center; color: #00FF00; font-size: 12px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
