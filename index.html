<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS | OMNIPOTENT LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --gold: #ffcc00; --olive: #6b8e23; --neon: #00f0ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- THE 9D ANIMATED VOID --- */
        #live-void { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .water-particle { 
            position: absolute; background: rgba(255, 255, 255, 0.05); border-radius: 50%; 
            filter: blur(1px); animation: floatUp 12s infinite linear; 
        }
        @keyframes floatUp { from { transform: translateY(110vh) scale(0.5); opacity: 0; } to { transform: translateY(-10vh) scale(1.2); opacity: 0.3; } }

        /* --- AUTH TERMINAL --- */
        #auth-gate { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(30px);
        }
        .auth-card { 
            width: 420px; padding: 50px; border: 1px solid rgba(255, 204, 0, 0.1); 
            background: linear-gradient(145deg, #050505, #111); text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        /* --- LIQUID LOGO RENDERING --- */
        .liquid-text {
            font-size: 48px; font-weight: 900; letter-spacing: -0.02em;
            background: linear-gradient(180deg, var(--gold) 0%, var(--olive) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.4));
            animation: liquidDrip 4s infinite ease-in-out;
            position: relative; display: inline-block;
        }
        @keyframes liquidDrip { 0%, 100% { transform: translateY(0); filter: hue-rotate(0deg); } 50% { transform: translateY(-8px); filter: hue-rotate(15deg); } }

        /* --- RANDOMIZED GHOST GEMS --- */
        .ghost-gem { 
            position: absolute; width: 14px; height: 14px; background: transparent; 
            border: 1px solid transparent; cursor: pointer; z-index: 1000; 
        }
        .ghost-gem:hover { border: 1px solid var(--neon); box-shadow: 0 0 20px var(--neon); background: rgba(0, 240, 255, 0.1); }

        /* --- INTERFACE --- */
        #main-interface { display: none; padding-left: 110px; height: 100vh; overflow-y: auto; padding-top: 60px; }
        .nav-rail { width: 90px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid rgba(255,255,255,0.05); display: none; flex-direction: column; align-items: center; padding-top: 100px; gap: 45px; z-index: 5000; }
        .nav-item { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 9px; letter-spacing: 0.8em; cursor: pointer; opacity: 0.3; transition: 0.4s; }
        .nav-item:hover, .active-nav { opacity: 1; color: var(--neon); }

        .reactor-core { background: #050505; border: 1px solid rgba(255,255,255,0.03); height: 600px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .globe-bg { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, #ffcc0033 0%, transparent 70%); filter: blur(40px); animation: pulseGlobe 8s infinite alternate; }
        @keyframes pulseGlobe { from { opacity: 0.2; transform: scale(1); } to { opacity: 0.5; transform: scale(1.3); } }

        .input-box { background: #000; border: 1px solid #222; padding: 20px; color: var(--neon); width: 100%; outline: none; font-size: 11px; margin-bottom: 20px; }
    </style>
</head>
<body onload="initVoid()">

    <div id="live-void"></div>

    <div id="auth-gate">
        <div class="auth-card">
            <h2 class="extraordinary text-xs tracking-[1.5em] mb-10 text-[#6b8e23]">IDENTITY CLEARANCE</h2>
            <input type="text" id="driller-name" placeholder="CREATE DRILLER ID" class="input-box knocks-font">
            <input type="password" placeholder="SECURE ACCESS KEY" class="input-box knocks-font">
            <button onclick="unlockEngine()" class="w-full bg-[#ffcc00] text-black py-5 extraordinary text-[10px] font-black hover:bg-white transition-all tracking-[0.3em]">ACTIVATE CORE</button>
            <p class="text-[7px] opacity-20 mt-8 uppercase tracking-[0.5em]">Knocks Creative Legacy Encryption</p>
        </div>
    </div>

    <div id="nav-rail" class="nav-rail">
        <div class="knocks-font text-[8px] text-[#ffcc00] mb-6">ID: <span id="id-tag">--</span></div>
        <div class="nav-item active-nav knocks-font" onclick="jump('engine')">CORE</div>
        <div class="nav-item knocks-font" onclick="jump('cinema')">CINEMA</div>
        <div class="nav-item knocks-font" onclick="jump('vault')">VAULT</div>
        <div class="nav-item knocks-font" onclick="location.reload()">OFFLINE</div>
    </div>

    <main id="main-interface" class="pr-16">
        <div class="flex justify-between items-start mb-14">
            <div>
                <h1 class="liquid-text extraordinary">KNOCKSCREATIVESTUDIOS</h1>
                <div class="flex gap-10 mt-4 text-[8px] opacity-40 knocks-font tracking-[0.5em]">
                    <span>LEGACY</span><span>WEALTH</span><span>GROWTH</span><span>YOUTH</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-10 relative">
            <div id="gem-1" class="ghost-gem" onclick="claimReward('Hidden Gold Artwork Stem Unlocked')"></div>
            <div id="gem-2" class="ghost-gem" onclick="claimReward('Free 9D Render Credit Added')"></div>

            <div class="col-span-4 space-y-6">
                <div class="bg-white/5 p-10 border border-white/5">
                    <h3 class="extraordinary text-[9px] opacity-40 mb-6 tracking-widest uppercase">Genetic Input</h3>
                    <label class="h-32 border border-white/5 flex flex-col items-center justify-center hover:bg-white/5 cursor-pointer transition">
                        <input type="file" class="hidden">
                        <span class="text-[8px] knocks-font">UPLOAD RAW MEDIA</span>
                    </label>
                </div>
                <div class="bg-white/5 p-10 border border-white/5">
                    <h3 class="extraordinary text-[9px] opacity-40 mb-6 tracking-widest uppercase">Command Logic</h3>
                    <textarea class="input-box h-32 mb-6" placeholder="DESCRIBE THE IMPOSSIBLE..."></textarea>
                    <button onclick="igniteDrill()" class="w-full bg-[#00f0ff] text-black py-6 extraordinary text-[10px] font-black hover:tracking-[0.8em] transition-all">IGNITE DRILL</button>
                </div>
            </div>

            <div class="col-span-8">
                <div class="reactor-core">
                    <div class="globe-bg"></div>
                    <div id="idle-text" class="extraordinary text-[10px] opacity-10 tracking-[3em]">CORE IDLE</div>
                    
                    <div id="render-frame" class="hidden w-full h-full relative">
                        <img src="1773441360031.jpg" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                        <div class="absolute bottom-10 left-10">
                            <h2 class="extraordinary text-2xl italic text-[#ffcc00]">RENDER_MANIFEST_01</h2>
                            <p class="text-[8px] opacity-50 tracking-[1em] mt-2">BLACK WALLSTREET LIQUID LOUNGE SERIES</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function initVoid() {
            const container = document.getElementById('live-void');
            for(let i=0; i<60; i++) {
                const p = document.createElement('div');
                p.className = 'water-particle';
                p.style.width = Math.random() * 4 + "px";
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + "vw";
                p.style.animationDuration = (Math.random() * 10 + 5) + "s";
                p.style.animationDelay = Math.random() * 5 + "s";
                container.appendChild(p);
            }
        }

        function unlockEngine() {
            const name = document.getElementById('driller-name').value;
            if(!name) return alert("Identify Yourself, Driller.");
            
            document.getElementById('auth-gate').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = "none";
                document.getElementById('main-interface').style.display = "block";
                document.getElementById('nav-rail').style.display = "flex";
                document.getElementById('id-tag').innerText = name.toUpperCase();
                shuffleGems();
            }, 800);
        }

        function shuffleGems() {
            ['gem-1', 'gem-2'].forEach(id => {
                const g = document.getElementById(id);
                g.style.top = Math.random() * 80 + 10 + "%";
                g.style.left = Math.random() * 80 + 10 + "%";
            });
        }

        function claimReward(msg) {
            alert("GHOST PROTOCOL ACTIVATED: " + msg);
            event.target.style.display = 'none';
        }

        function igniteDrill() {
            document.getElementById('idle-text').innerText = "GENERATING...";
            setTimeout(() => {
                document.getElementById('idle-text').classList.add('hidden');
                document.getElementById('render-frame').classList.remove('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
