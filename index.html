<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | SUBSCRIPTION GATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        * { cursor: crosshair; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow: hidden; }

        #bg-layer {
            position: fixed; inset: 0; z-index: -1;
            background: url('1773441360031.jpg') no-repeat center center;
            background-size: cover; opacity: 0.4; filter: brightness(0.5) saturate(1.8);
        }

        #robot-asset {
            position: absolute; width: 320px; bottom: 5%; right: 5%;
            filter: drop-shadow(0 0 30px #00f0ff);
            animation: float 4s infinite ease-in-out; z-index: 5;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .panel {
            background: rgba(0, 5, 10, 0.98); border: 2px solid #00f0ff;
            padding: 30px; width: 95%; max-width: 500px; box-shadow: 0 0 50px #00f0ff44;
        }
        .tier-card {
            border: 1px solid rgba(0, 240, 255, 0.3); padding: 15px; margin: 10px 0;
            cursor: pointer; transition: 0.3s;
        }
        .tier-card:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .coin-tag { color: #ffcc00; font-weight: 900; font-size: 14px; }
    </style>
</head>

    <img src="V_SENTINEL.jpg" id="robot-asset" alt="SENTINEL">

        <button onclick="openPanel('signup')" class="bg-[#00f0ff] text-black px-6 py-2 text-xs font-bold uppercase">Join 9K</button>
    </nav>

    </main>
