<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K REALITY | KNOCKS STUDiOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #050505; font-family: 'Orbitron', sans-serif; color: #fff; margin: 0; overflow-x: hidden; }
        .all-caps { text-transform: uppercase; letter-spacing: 0.2em; font-weight: 900; }
        
        /* 1. SCION NEON ROTATION WITH LOWERCASE i */
        .scion-neon {
            font-size: 6vw; font-weight: 900;
            background: linear-gradient(90deg, #00f0ff, #7000ff, #ff00c8, #00f0ff);
            background-size: 300% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: scionFlow 5s linear infinite, wobble 4s ease-in-out infinite;
        }
        .scion-neon span { text-transform: none !important; } /* ALLOWS LOWERCASE i */

        @keyframes scionFlow { to { background-position: 300% center; } }
        @keyframes wobble { 0%, 100% { transform: perspective(1000px) rotateY(-15deg); } 50% { transform: perspective(1000px) rotateY(15deg); } }

        /* 2. ROBOT EYE FIXING ANIMATION */
        .robot-eye {
            width: 100px; height: 100px; border: 4px solid #1a1a1a; border-radius: 50%;
            background: #000; position: relative; box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        .iris {
            position: absolute; top: 25%; left: 25%; width: 50%; height: 50%;
            background: radial-gradient(circle, #00f0ff 0%, #000 80%);
            border-radius: 50%; box-shadow: 0 0 40px #00f0ff;
            animation: drillRepair 1.5s infinite ease-in-out;
        }
        @keyframes drillRepair { 
            0% { transform: scale(1) rotate(0); filter: brightness(1); } 
            50% { transform: scale(1.4) rotate(180deg); filter: brightness(1.5); } 
            100% { transform: scale(1) rotate(360deg); filter: brightness(1); } 
        }

        .knocks-card { background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(0, 240, 255, 0.1); transition: 0.3s; }
        .knocks-card:hover { border-color: #00f0ff; }
        .input-box { background: #000; border: 1px solid #222; padding: 20px; width: 100%; color: #00f0ff; outline: none; font-size: 11px; }
        .input-box:focus { border-color: #00f0ff; }

        .view-layer { display: none; min-height: 100vh; width: 100%; position: relative; z-index: 10; }
        #splash { display: flex; flex-direction: column; align-items: center; justify-content: center; background: url('1773441360031.jpg') center/cover; }
        #splash::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: -1; }
    </style>
</head>
<body>

    <audio id="drill-fx" src="mechanical-drill.mp3"></audio>

    <main id="splash" class="view-layer">
        <div class="text-center mb-10">
            <h1 class="scion-neon">KNOCKS STUDiOS</h1>
            <p class="all-caps text-[10px] opacity-40 mt-4 tracking-[1em]">POWERED BY AI LEGENDS</p>
        </div>
        
        <div class="robot-eye mb-12"><div class="iris"></div></div>

        <div class="flex gap-8">
            <button onclick="nav('gate')" class="knocks-card px-16 py-6 all-caps text-xs hover:bg-[#00f0ff] hover:text-black">CREATE ACCOUNT</button>
            <button onclick="nav('gate')" class="px-16 py-6 all-caps text-xs border-b border-[#00f0ff]">LOGIN</button>
        </div>
    </main>
