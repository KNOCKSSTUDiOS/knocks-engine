<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNOCKSSTUDiOS | LIVE GATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Courier New', monospace; }

        /* THE BREATHING SUNRISE */
        .singularity-container {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1;
        }

        .sun-core {
            width: 80px; height: 80px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 50px #fff, 0 0 100px #ffaa00, 0 0 200px #ff6600, 0 0 400px rgba(255, 50, 0, 0.3);
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 50px #fff, 0 0 100px #ffaa00, 0 0 200px #ff6600; }
            50% { transform: scale(1.1); filter: brightness(1.3); box-shadow: 0 0 70px #fff, 0 0 150px #ffcc00, 0 0 300px #ff3300; }
        }

        /* THE LIVE SCAN RAY (MOVING) */
        .active-scan-ray {
            position: absolute; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #00f2ff, #fff, #00f2ff, transparent);
            box-shadow: 0 0 25px #00f2ff;
            z-index: 5; opacity: 0.6;
            animation: sweep 6s infinite linear;
        }

        @keyframes sweep {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* BRANDING */
        .brand-text {
            position: absolute; top: 48%; width: 100%; text-align: center;
            font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 900; letter-spacing: 20px;
            color: rgba(255, 255, 255, 0.9); text-transform: uppercase; z-index: 10;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* NAVIGATION */
        .ui-nav { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; }
        .btn { 
            padding: 18px 45px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; color: #00f2ff; 
            text-transform: uppercase; letter-spacing: 4px; cursor: pointer; transition: 0.4s; font-weight: bold;
        }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 50px #00f2ff; }
        .gold { border-color: #ffd700; color: #ffd700; }

        /* THE SCANNING OVERLAY */
        #scanner { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .progress-fill { width: 0%; height: 2px; background: #00f2ff; box-shadow: 0 0 20px #00f2ff; transition: 5s linear; }
    </style>
</head>
<body>

    <div class="active-scan-ray"></div>

    <div class="singularity-container">
        <div class="sun-core"></div>
    </div>

    <div class="brand-text">KNOCKSSTUDiOS</div>

    <div class="ui-nav">
        <div class="btn" onclick="runScan()">Login</div>
        <div class="btn" onclick="runScan()">Sign Up</div>
        <div class="btn gold" onclick="location.href='valerius.html'">Request Intel</div>
    </div>

    <div id="scanner">
        <div style="letter-spacing: 12px; font-size: 0.9rem; color: #00f2ff; margin-bottom: 20px;">BIO-SCAN ACTIVE</div>
        <div style="width: 300px; height: 2px; background: #111;"><div class="progress-fill" id="fill"></div></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // THE BACKGROUND MUSIC (Cyber Synth)
        function playBackgroundMusic() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); // Deep A1 note
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            
            osc.connect(g);
            g.connect(audioCtx.destination);
            
            osc.start();
            // Create a pulsing effect for the music
            setInterval(() => {
                g.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 1);
                g.gain.exponentialRampToValueAtTime(0.05, audioCtx.currentTime + 2);
            }, 2000);
        }

        function runScan() {
            playBackgroundMusic(); // Music starts on first click
            document.getElementById('scanner').style.display = 'flex';
            setTimeout(() => { document.getElementById('fill').style.width = '100%'; }, 100);
            
            // Success sound
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                alert("ACCESS GRANTED TO KNOCKSSTUDiOS");
                location.reload();
            }, 5200);
        }
    </script>
</body>
</html>
