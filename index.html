<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | LIVE ENGINE</title>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Courier New', monospace; }

        /* THE COSMIC EYE - REAL DEPTH */
        #canvas-bg { position: fixed; inset: 0; z-index: 1; }
        
        .singularity {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #00f2ff 20%, #ff00ff 50%, transparent 70%);
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.5);
            z-index: 2; animation: breathe 3s infinite ease-in-out;
        }

        /* THE MULTI-COLOR SPINNING RIM */
        .outer-rim {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 450px; border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        conic-gradient(#00f2ff, #ff00ff, #ffd700, #00f2ff) border-box;
            z-index: 3; animation: spin 5s linear infinite;
        }

        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes breathe { 0%, 100% { opacity: 0.6; scale: 0.9; } 50% { opacity: 1; scale: 1.1; } }

        /* THE SIGNATURE: KNOCKSSTUDiOS */
        .brand {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(1.5rem, 8vw, 4rem); font-weight: 900; letter-spacing: 15px;
            z-index: 10; text-transform: none; color: white;
            text-shadow: 0 0 20px #00f2ff, 0 0 40px #ff00ff; pointer-events: none;
        }

        /* BUTTONS */
        .nav { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; }
        .btn { 
            padding: 20px 60px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; color: #00f2ff; 
            font-weight: bold; letter-spacing: 5px; cursor: pointer; transition: 0.4s;
        }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 50px #00f2ff; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="outer-rim"></div>
    <div class="singularity"></div>
    <div class="brand">KNOCKSSTUDiOS</div>

    <div class="nav">
        <button class="btn" onclick="startEngine()">LOGiN</button>
        <button class="btn" onclick="startEngine()">SiGN UP</button>
    </div>

    <script>
        // 1. THE ELECTRIC WAVE CANVAS
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function drawWaves() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2;
            ctx.beginPath();
            let t = Date.now() * 0.002;
            for(let i=0; i<canvas.width; i+=5) {
                let y = (canvas.height/2) + Math.sin(i * 0.01 + t) * 100;
                ctx.lineTo(i, y);
            }
            ctx.stroke();
            requestAnimationFrame(drawWaves);
        }
        drawWaves();

        // 2. THE AUDIO ENGINE (SWORD WHOOSH)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function startEngine() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);

            alert("ACCESSiNG KNOCKSSTUDiOS...");
        }
    </script>
</body>
</html>
