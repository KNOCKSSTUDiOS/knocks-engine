<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { cursor: none !important; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        /* HEADER DYNAMICS */
        #main-header h1 {
            transition: letter-spacing 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: -0.05em;
        }
        .is-focused #main-header h1 { letter-spacing: 0.4em; }

        /* THE FLICKER ANIMATION (CODE-BASED) */
        @keyframes strobe-flicker {
            0% { opacity: 1; filter: brightness(1); }
            5% { opacity: 0.8; filter: brightness(1.5); }
            10% { opacity: 1; filter: brightness(1); }
            15% { opacity: 0.9; filter: brightness(2); }
            20% { opacity: 1; filter: brightness(1); }
            100% { opacity: 1; filter: brightness(1); }
        }

        #init-btn {
            background: #0891b2;
            transition: all 0.4s ease;
            position: relative;
        }

        /* HOVER TRIGGER */
        #init-btn:hover {
            animation: strobe-flicker 0.2s infinite; /* Rapid stutter on hover */
            background: #22d3ee;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.6);
            color: #000;
        }

        /* STILLNESS SURGE (RE-INTEGRATED) */
        .is-focused #init-btn {
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.8);
            transform: scale(1.02);
        }

        /* VIDEO & FILTERS */
        #bg-video {
            width: 100%; height: 100%;
            filter: brightness(0.25) contrast(1.2) blur(12px);
            object-fit: cover;
            transition: filter 0.8s ease, transform 0.8s ease;
        }
        .is-focused #bg-video { filter: brightness(0.4) blur(0px); transform: scale(1.1); }

        .signature-i { text-transform: none !important; color: #06b6d4; display: inline-block; }
        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.3); }
    </style>
</head>
