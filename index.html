<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { cursor: none !important; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        /* RECOVERY GLITCH OVERLAY */
        #glitch-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; pointer-events: none; display: none;
            background: repeating-linear-gradient(0deg, 
                transparent 0%, 
                rgba(34, 211, 238, 0.2) 2%, 
                transparent 4%, 
                rgba(255, 0, 255, 0.2) 6%);
            background-size: 100% 200%;
            animation: glitch-slide 0.1s infinite;
        }

        @keyframes glitch-slide {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* 8-SECOND WHITE-OUT DECAY */
        #pixel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0; }
        @keyframes terminal-decay {
            0% { backdrop-filter: blur(0px); opacity: 0; filter: invert(0); }
            70% { backdrop-filter: blur(10px); opacity: 1; filter: invert(1); }
            100% { backdrop-filter: blur(30px) brightness(800%); opacity: 1; filter: invert(0); background: white; }
        }

        .persistence-hd #pixel-overlay {
            animation: terminal-decay 8s forwards cubic-bezier(0.4, 0, 0.2, 1);
            background-image: radial-gradient(circle, transparent 2px, black 2px);
            background-size: 4px 4px;
        }

        /* HEADER & UI */
        #main-header h1 { transition: all 0.6s ease; letter-spacing: -0.05em; z-index: 60; position: relative; }
        .persistence-hd #main-header h1 { animation: header-shiver 0.05s infinite; color: black; }
        @keyframes header-shiver { 0% { transform: translate(-2px, 2px); } 100% { transform: translate(2px, -2px); } }

        /* VIDEO ENGINE */
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000; }
        #bg-video { width: 100%; height: 100%; filter: brightness(0.25) contrast(1.2) blur(12px); object-fit: cover; }
        
        .persistence-hd #bg-video {
            animation: chromatic-hum 0.08s linear infinite, systolic-throb 1s ease-in-out infinite !important;
        }

        @keyframes chromatic-hum {
            0% { filter: drop-shadow(2px 0 0 rgba(255,0,0,0.5)) drop-shadow(-2px 0 0 rgba(0,255,255,0.5)) brightness(0.7); }
            100% { filter: drop-shadow(-2px 0 0 rgba(255,0,0,0.5)) drop-shadow(2px 0 0 rgba(0,255,255,0.5)) brightness(0.8); }
        }
        @keyframes systolic-throb { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.3); }
        .btn-hidden { opacity: 0 !important; pointer-events: none; }
