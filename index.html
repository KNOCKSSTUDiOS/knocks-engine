<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- THE CHAMELEON TYPEWRITER & GLASS SHINE --- */
        .chameleon-text {
            display: inline-block;
            position: relative;
            font-size: 4rem;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #ff4d00, #00ff88, #00f0ff, #bf00ff, #ffcc00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: worm 8s linear infinite, typewriter 4s steps(14) forwards;
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid var(--cyan);
        }

        /* WORM COLOR SHIFT */
        @keyframes worm {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* TYPEWRITER EFFECT */
        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        /* GLASS SHINE / SWORD SWISH */
        .chameleon-text::after {
            content: "";
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: swish 3s infinite;
        }

        @keyframes swish {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- THE TILES --- */
        #visual-core { position: fixed; inset: 0; z-index: -1; background: #000; }
        .nebula { position: absolute; border-radius: 50%; filter: blur(160px); opacity: 0.3; }
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid #111; z-index: 100; }
        
        .tool-card { 
            background: rgba(10,10,15,0.98); 
            border: 1px solid rgba(255,255,255,0.05); 
            height: 300px; padding: 30px; display: flex; flex-direction: column; justify-content: flex-end;
        }
    </style>
</head>
<body onload="ignite()">

    <div id="visual-core"></div>

    <div id="engine-wrap">
        <nav class="sidebar flex flex-col items-center pt-10 gap-8">
            <div class="text-cyan-400 text-xl">⚡</div>
            <div class="opacity-20 text-lg">📂</div>
            <div class="opacity-20 text-lg">🛒</div>
        </nav>

        <main class="pl-[110px] pr-10 pt-10">
            <header class="flex justify-between items-center mb-20 border-b border-white/5 pb-10">
                <h1 class="extraordinary chameleon-text">KNOCKSSTUDiOS</h1>
                <div class="knocks-font text-[11px] text-emerald-400">Vault: 2000</div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="tool-card" style="border-left: 2px solid #ff4d00;">
                    <h3 class="extraordinary text-xs">STORE</h3>
                    <p class="text-[9px] text-[#ff4d00] knocks-font uppercase">Fire/Orange</p>
                </div>
                <div class="tool-card" style="border-left: 2px solid #00ff88;">
                    <h3 class="extraordinary text-xs">RENDER</h3>
                    <p class="text-[9px] text-[#00ff88] knocks-font uppercase">Green/Lime</p>
                </div>
                <div class="tool-card" style="border-left: 2px solid #00f0ff;">
                    <h3 class="extraordinary text-xs">CREATE</h3>
                    <p class="text-[9px] text-[#00f0ff] knocks-font uppercase">Cyan/Blue</p>
                </div>
                <div class="tool-card" style="border-left: 2px solid #ffcc00;">
                    <h3 class="extraordinary text-xs">SCHOOL</h3>
                    <p class="text-[9px] text-[#ffcc00] knocks-font uppercase">Gold/Purple</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function ignite() {
            const core = document.getElementById('visual-core');
            for(let i=0; i<8; i++) {
                const n = document.createElement('div');
                n.className = 'nebula';
                n.style.width = '600px'; n.style.height = '600px';
                n.style.background = ['#ff4d00', '#00ff88', '#00f0ff', '#bf00ff'][i%4];
                n.style.left = Math.random() * 100 + '%'; n.style.top = Math.random() * 100 + '%';
                core.appendChild(n);
            }
        }
    </script>
</body>
</html>
