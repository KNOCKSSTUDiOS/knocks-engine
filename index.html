<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDIOS | 9K SOVEREIGN ENGINE</title>
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
        }

        /* THE ENGINE VISUAL CONTAINER */
        .engine-gate {
            position: relative;
            width: 100%;
            height: 100vh;
            /* REPLACE '9k-eye.jpg' WITH YOUR ACTUAL IMAGE PATH */
            background: url('9k-eye.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* DARK OVERLAY TO PROTECT UI READABILITY */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* MAIN UI LAYER */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 15px;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
        }

        .tagline {
            font-size: 12px;
            color: #888;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* TACTICAL NEON BUTTONS */
        .gate-controls {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .btn {
            position: relative;
            padding: 18px 50px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* LOGIN - WHITE TACTICAL */
        .btn-login {
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-login:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        /* SIGNUP - 9K ORANGE GLOW */
        .btn-signup {
            color: #FF8C00;
            border: 1px solid #FF8C00;
            background: rgba(255, 140, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.2);
        }
        .btn-signup:hover {
            background: #FF8C00;
            color: #000;
            box-shadow: 0 0 40px #FF8C00;
            transform: translateY(-3px);
        }

        /* SCANNING LINE ANIMATION ON BUTTONS */
        .btn::after {
            content: '';
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.2);
            animation: scan-line 3s linear infinite;
        }
        @keyframes scan-line {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* BOTTOM MODULES (FROM YOUR IMAGE) */
        .footer-modules {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            padding: 0 20px;
        }

        .mod-card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #1a1a1a;
            padding: 15px 25px;
            min-width: 220px;
            text-align: center;
        }

        .mod-id { color: #555; font-size: 10px; display: block; margin-bottom: 5px; }
        .mod-name { color: #eee; font-size: 12px; font-weight: bold; letter-spacing: 1px; }

        .active-mod { border-color: #FF8C00; }
        .active-mod .mod-name { color: #FF8C00; }

        /* RESPONSIVE FIX */
        @media (max-width: 768px) {
            .gate-controls { flex-direction: column; width: 80%; }
            .footer-modules { display: none; } /* Hide complex footer on small mobile */
        }
    </style>
</head>
<body>

    <div class="engine-gate">
        <div class="overlay"></div>

        <div class="content">
            <h1>KNOCKSSTUDIOS</h1>
            <p class="tagline">9K GLOBAL PROXIED RENDER CORE</p>

            <div class="gate-controls">
                <a href="login.html" class="btn btn-login">OPERATOR_SYNC</a>
                <a href="signup.html" class="btn btn-signup">SECURE_BRIEF</a>
            </div>
        </div>

        <div class="footer-modules">
            <div class="mod-card">
                <span class="mod-id">MODULE_01</span>
                <span class="mod-name">SYSTEM_STABILITY</span>
            </div>
            <div class="mod-card active-mod">
                <span class="mod-id" style="color: #FF8C00;">MODULE_02_MAX</span>
                <span class="mod-name">RENDER_CORE_PRO</span>
            </div>
            <div class="mod-card">
                <span class="mod-id">MODULE_03
