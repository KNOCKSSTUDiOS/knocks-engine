<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V | SOVEREIGN_V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-blue: #000080;
            --cyan: #00fff2;
            --void: #010103;
        }

        body {
            background-color: #008080; /* Raw Tablet Desktop */
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .monolith { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-weight: 900; }

        /* THE SOVEREIGN SHELL */
        main.v-shell {
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff #404040 #404040 #fff;
            width: 98vw;
            height: 88vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.5);
        }

        .win-title {
            background: linear-gradient(90deg, var(--win-blue), #1084d0);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: 900;
            font-size: 13px;
        }

        .workspace {
            background: var(--void);
            margin: 4px;
            border: 4px inset #fff;
            flex-grow: 1;
            padding: 40px;
            position: relative;
            background-image: radial-gradient(circle at center, rgba(0,255,242,0.1) 0%, transparent 85%);
        }

        /* THE BLACK MECH ASSISTANT (downloadfile-65.mp4) */
        .mech-live-pin {
            position: fixed;
            bottom: 75px;
            right: 40px;
            width: 250px; 
            height: 180px;
            z-index: 9999;
            border: 2px solid var(--cyan);
            background: #000;
            box-shadow: 0 0 35px rgba(0, 255, 242, 0.6);
            border-radius: 4px;
            overflow: hidden;
            animation: tablet-float 5s ease-in-out infinite;
        }

        @keyframes tablet-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .metallic-v {
            background: linear-gradient(180deg, #FFFFFF 0%, #718096 50%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(4rem, 18vw, 12rem);
            filter: drop-shadow(0 0 20px rgba(0,255,242,0.4));
            line-height: 0.8;
        }

        /* VEO_CORE SYNCED PANELS */
        .veo-panel {
            border: 1px solid rgba(0, 255, 242, 0.2);
            background: rgba(255,255,255,0.02);
            padding: 25px;
            transition: 0.2s;
            cursor: pointer;
        }
        .veo-panel:hover {
            border-color: var(--cyan);
            background: rgba(0, 255, 242, 0.05);
        }

        /* TASKBAR */
        .taskbar {
            height: 50px;
            background: var(--win-gray);
            border-top: 3px solid #fff;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
    </style>
</head>

    </div>

            </div>
        </div>

        <div class="workspace">
            <h1 class="monolith metallic-v mb-16">V_OS</h1>
