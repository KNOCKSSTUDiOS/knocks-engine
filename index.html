<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V SENTINEL | DARK OPERATIONAL SHIFT</title>
    <style>
        /* BASE RESET - NO talk, just execution */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; text-transform: uppercase; }
        body, html { height: 100%; background: #000; color: #fff; overflow: hidden; }

        /* HEADER NAV GATES (LOCKED) */
        header { 
            position: fixed; top: 0; width: 100%; padding: 20px 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: #000; border-bottom: 2px solid #111; z-index: 1000; 
        }
        .brand { color: #00FFFF; font-weight: 900; letter-spacing: 6px; font-size: 22px; text-shadow: 0 0 15px #00FFFF; }
        .gates { display: flex; gap: 20px; }
        .btn-gate { 
            background: transparent; border: 1px solid #111; color: #444; 
            padding: 10px 20px; cursor: pointer; font-size: 11px;
        }
        .active-gate { border-color: #00FFFF; color: #00FFFF; }

        /* PAGE ENGINE */
        .page { display: none; min-height: 100vh; width: 100%; padding-top: 120px; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* THE VISUAL CORE (15FT SENTINEL) */
        .viewport { 
            position: relative; width: 90%; max-width: 1100px; aspect-ratio: 16/9; 
            border: 2px solid #111; background: #000; 
            box-shadow: 0 0 50px rgba(0,255,255,0.05); overflow: hidden;
        }
        .sentinel-visual { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.9; 
            filter: brightness(0.7) contrast(1.1); /* Intimidating dark filter */
        }
        
        /* PULSING CYAN OVERLAY (Surprise element) */
        .pulse-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; background: #00FFFF; 
            border-radius: 50%; box-shadow: 0 0 50px 30px #00FFFF;
            animation: pulse-cyan 3s infinite;
        }
        @keyframes pulse-cyan { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* DISCREET OWNERSHIP STAMP (Behind Left Foot Area) */
        .ownership { 
            position: absolute; bottom: 20px; right: 50px; 
            font-size: 10px; color: #111; /* Extremely dark/small font */
            letter-spacing: 2px;
        }

        /* FORM BOXES */
        .form-box { width: 90%; max-width: 450px; border: 1px solid #00FFFF; padding: 40px; background: #000; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid #111; color: #00FFFF; outline: none; text-shadow: 0 0 5px #00FFFF; }

        /* MAIN BUTTONS */
        .btn-main { padding: 20px 60px; border: 2px solid #00FFFF; background: transparent; color: #00FFFF; cursor: pointer; letter-spacing: 5px; text-shadow: 0 0 5px #00FFFF; }
        .btn-main:hover { background: #00FFFF; color: #000; box-shadow: 0 0 60px #00FFFF; }

    </style>
</head>
<body>

    <header>
        <div class="brand">V SENTINEL (9K)</div>
        <div class="gates">
            <button class="btn-gate active-gate" onclick="showPage('visual-core')">VISUAL</button>
            <button class="btn-gate" onclick="showPage('access-core')">ACCESS</button>
            <button class="btn-gate" onclick="showPage('deploy-core')">DEPLOY</button>
        </div>
    </header>

    <div id="visual-core" class="page active">
        <div class="viewport">
            <img src="v-sentinel-dark.jpg" class="sentinel-visual" alt="V SENTINEL: DARK TRANSITION">
            <div class="pulse-core"></div>
            <div class="ownership">property of KNOCKSSTUDiOS</div>
        </div>
        <div style="width: 90%; max-width: 1100px; display: flex; justify-content: space-between; margin-top: 20px;">
            <div style="color: #00FFFF; text-shadow: 0 0 5px #00FFFF;">15FT OPERATIONAL SPEC</div>
            <div style="color: #444;">ID: V_SENTINEL_01 (DARK SHIFT)</div>
        </div>
    </div>

    <div id="access-core" class="page">
        <div class="form-box">
            <h2>ADMINISTRATION ACCESS</h2>
            <input type="text" placeholder="OPERATOR ID">
            <input type="password" placeholder="ENCRYPTION KEY">
            <button class="btn-main" style="width: 100%;" onclick="showPage('visual-core')">SYNC KEY</button>
        </div>
    </div>

    <div id="deploy-core" class="page">
        <div class="form-box" style="border-color: #111;">
            <h2 style="color: #444;">DEPLOYMENT STATUS: AWAITING AUTHORIZATION</h2>
            <div style="width: 100%; height: 2px; background: #111; margin: 30px 0;"></div>
            <button class="btn-gate" style="width: 100%; padding: 20px;">AUTHORIZE_BURN (9K)</button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.btn-gate').forEach(b => b.classList.remove('active-gate'));
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active-gate');
        }
    </script>
</body>
</html>
