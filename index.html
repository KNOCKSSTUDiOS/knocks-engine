<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLLYWOOD iMAGiNG | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        :root { --cyan: #00f0ff; --gold: #ffcc00; --emerald: #00ff88; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- BACKGROUND & WATERMARK --- */
        #visual-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #08081a 0%, #000 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: drift 15s infinite alternate; }
        @keyframes drift { 0% { transform: scale(1); } 100% { transform: scale(1.4) translate(5%, 2%); } }
        #watermark { position: fixed; bottom: 80px; left: 100px; opacity: 0.1; font-size: 8px; letter-spacing: 0.5em; pointer-events: none; }

        /* --- COMPANION & AUTH --- */
        #companion { position: fixed; width: 10px; height: 10px; background: var(--cyan); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); z-index: 3000; pointer-events: none; transition: 0.1s linear; opacity: 0; box-shadow: 0 0 15px var(--cyan); }
        #auth-gate { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.6); backdrop-filter: blur(30px); display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #05050a; border: 1px solid var(--cyan); padding: 40px; width: 380px; text-align: center; }

        /* --- UI WRAP --- */
        #engine-wrap { transition: 1.5s filter; filter: blur(25px); pointer-events: none; height: 100vh; display: flex; flex-direction: column; }
        .unlocked { filter: blur(0) !important; pointer-events: auto !important; }
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.9); border-right: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding-top: 40px; gap: 30px; z-index: 500; }
        
        #sys-log { position: fixed; bottom: 100px; right: 30px; width: 260px; background: rgba(0,0,0,0.9); border-left: 2px solid var(--cyan); padding: 12px; font-size: 8px; color: var(--cyan); z-index: 600; }
        
        /* --- PAYMENT & FOOTER --- */
        .footer-bar { position: fixed; bottom: 0; left: 80px; right: 0; height: 60px; background: rgba(5,5,10,0.95); border-top: 1px solid #111; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; font-size: 7px; color: rgba(255,255,255,0.3); z-index: 1000; }
        .pay-icon { opacity: 0.4; height: 12px; filter: grayscale(1); transition: 0.3s; }
        .pay-icon:hover { opacity: 1; filter: grayscale(0); }

        .coin-btn { background: rgba(0,255,136,0.1); border: 1px solid var(--emerald); color: var(--emerald); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 8px; transition: 0.3s; }
        .coin-btn:hover { background: var(--emerald); color: #000; }
        
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        .overclock-active { animation: shake 0.1s infinite; }
    </style>
</head>
<body onload="ignite()">

    <div id="visual-core"></div>
    <div id="watermark" class="extraordinary">KNOCKSSTUDiOS</div>
    <div id="companion"></div>

    <div id="auth-gate">
        <div class="auth-box">
            <h2 class="extraordinary text-white text-lg mb-2">NEURAL ACCESS</h2>
            <p class="text-[8px] knocks-font text-cyan-400 tracking-widest mb-6">HUMAN_VERIFICATION_REQUIRED</p>
            <input type="email" class="w-full bg-white/5 border border-white/10 p-3 mb-3 text-[10px] text-white outline-none" placeholder="ENTER_EMAIL">
            <input type="password" class="w-full bg-white/5 border border-white/10 p-3 mb-6 text-[10px] text-white outline-none" placeholder="ACCESS_KEY">
            <button class="w-full bg-cyan-400 text-black py-3 text-[10px] font-black uppercase" onclick="unlock()">Initialize & Verify</button>
            <p class="text-[7px] opacity-30 mt-4 uppercase tracking-widest">By clicking, you agree to our Privacy Policy</p>
        </div>
    </div>

    <div id="engine-wrap">
        <div id="sys-log" class="knocks-font uppercase">
            <div id="log-text">> ID_REQUIRED...</div>
        </div>

        <nav class="sidebar">
            <div class="side-icon text-cyan-400 text-xl">⚡</div>
            <div class="side-icon opacity-20">🛒</div>
            <div class="side-icon opacity-20">💼</div>
        </nav>

        <main class="pl-[110px] pr-10 pt-8 flex-grow">
            <header class="flex justify-between items-start mb-12 border-b border-white/5 pb-8">
                <div>
                    <h1 id="main-logo" class="extraordinary text-3xl tracking-tighter overclock-active">HOLLYWOOD iMAGiNG</h1>
                    <div class="flex gap-4 mt-4">
                        <span class="text-emerald-400 knocks-font text-[9px] tracking-widest">BAL: <span id="coin-bal">0</span> COINS</span>
                        <button class="coin-btn knocks-font" onclick="dailyCheck()">Daily Check-in (+25)</button>
                        <button class="coin-btn knocks-font" onclick="watchAd()">Watch Ad (+15)</button>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[8px] opacity-40 knocks-font">SENTINEL_LEAGUE_STATUS: ACTIVE</p>
                    <p class="text-[8px] opacity-40 knocks-font">BILLING_CYCLE: MONTHLY</p>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="tool-card p-10 h-64 flex flex-col justify-end bg-black/40">
                    <h3 class="extraordinary text-xs text-cyan-400">STUDIO CORE</h3>
                    <p class="text-[8px] opacity-40">School & Rendering</p>
                </div>
