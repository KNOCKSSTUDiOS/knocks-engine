<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        :root { --cyan: #00f0ff; --magenta: #ff00ff; --emerald: #00ff88; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- VISUAL CORE --- */
        #visual-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #08081a 0%, #000 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: drift 20s infinite alternate ease-in-out; }
        @keyframes drift { 0% { transform: scale(1); } 100% { transform: scale(1.3) translate(3%, 3%); } }
        #watermark { position: fixed; bottom: 80px; left: 100px; opacity: 0.15; font-size: 8px; letter-spacing: 0.5em; pointer-events: none; z-index: 100; }

        /* --- AUTH GATE --- */
        #auth-gate { position: fixed; inset: 0; z-index: 2500; background: rgba(0,0,0,0.7); backdrop-filter: blur(40px); display: flex; align-items: center; justify-content: center; transition: 1s ease; }
        .auth-box { background: #05050a; border: 1px solid var(--cyan); padding: 40px; width: 380px; text-align: center; box-shadow: 0 0 50px rgba(0,240,255,0.1); }
        
        /* --- ENGINE WRAP --- */
        #engine-wrap { transition: 1.5s filter; filter: blur(25px); pointer-events: none; display: flex; flex-direction: column; height: 100vh; }
        .unlocked { filter: blur(0) !important; pointer-events: auto !important; }
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.95); border-right: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding-top: 50px; gap: 35px; z-index: 500; }
        
        /* --- COMPONENTS --- */
        .tool-card { background: rgba(10,10,15,0.8); border: 1px solid #1a1a1a; border-radius: 4px; transition: 0.4s; cursor: pointer; }
        .tool-card:hover { border-color: var(--cyan); transform: translateY(-5px); }
        #sys-log { position: fixed; bottom: 100px; right: 30px; width: 260px; background: rgba(0,0,0,0.9); border-left: 2px solid var(--cyan); padding: 12px; font-size: 8px; color: var(--cyan); z-index: 600; }
        
        .footer-bar { position: fixed; bottom: 0; left: 80px; right: 0; height: 60px; background: #000; border-top: 1px solid #111; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; font-size: 7px; color: rgba(255,255,255,0.3); z-index: 1000; }
        
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        .overclock-active { animation: shake 0.1s infinite; }

        #companion { position: fixed; width: 10px; height: 10px; background: var(--cyan); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); z-index: 3000; pointer-events: none; opacity: 0; box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body onload="ignite()">

    <div id="visual-core"></div>
    <div id="watermark" class="extraordinary">KNOCKSSTUDiOS</div>
    <div id="companion"></div>

    <div id="auth-gate">
        <div class="auth-box">
            <h2 class="extraordinary text-white text-lg mb-2">NEURAL ACCESS</h2>
            <p class="text-[8px] knocks-font text-cyan-400 tracking-[0.5em] mb-8">SECURE_VERIFICATION_REQUIRED</p>
            <input type="email" class="w-full bg-white/5 border border-white/10 p-3 mb-3 text-[10px] text-white outline-none" placeholder="IDENTiTY_EMAIL">
            <button class="w-full bg-cyan-400 text-black py-3 text-[10px] font-black uppercase" onclick="unlock()">Initialize Core</button>
            <p class="text-[7px] opacity-20 mt-6 tracking-widest uppercase">Privacy Policy // Security Protocol</p>
        </div>
    </div>

    <div id="engine-wrap">
        <div id="sys-log" class="knocks-font uppercase">
            <div id="log-text">> STANDBY_MODE...</div>
        </div>

        <nav class="sidebar">
            <div class="text-cyan-400 text-xl">⚡</div>
            <div class="opacity-20">📂</div>
            <div class="opacity-20">🛒</div>
        </nav>

        <main class="pl-[110px] pr-10 pt-12">
            <header class="flex justify-between items-start mb-16 border-b border-white/5 pb-10">
                <div>
                    <h1 id="main-logo" class="extraordinary text-4xl tracking-tighter overclock-active">KNOCKSSTUDiOS</h1>
                    <p class="text-[8px] knocks-font text-cyan-400 mt-3 tracking-[0.4em]">OMNIPOTENT ENGINE // RENDERING LAB</p>
                </div>
                <div class="text-right">
                    <span class="text-emerald-400 knocks-font text-[10px]">VAULT: <span id="coin-bal">20
