<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | 9K AUDIO CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        * { cursor: crosshair; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow: hidden; }

        #bg-layer {
            position: fixed; inset: 0; z-index: -1;
            background: url('workshop.jpg') no-repeat center center;
            background-size: cover; opacity: 0.5; filter: brightness(0.7) saturate(1.5);
        }

        #robot-asset {
            position: absolute; width: 320px; bottom: 5%; right: 5%;
            filter: drop-shadow(0 0 30px #00f0ff);
            animation: float 4s infinite ease-in-out; z-index: 5;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <img src="image.png" id="robot-asset" alt="VALERIUS_9K">

    <audio id="engine-sound" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div class="fixed top-0 right-0 p-10 flex gap-6 z-50">
        <button onclick="openAuth()" class="border-2 border-[#00f0ff] px-10 py-3 text-[#00f0ff] font-black hover:bg-[#00f0ff] hover:text-black">SIGN IN</button>
    </div>

    <main class="h-screen flex flex-col items-center justify-center text-center">
        <h1 class="text-9xl font-black mix-blend-difference mb-4">KNOCKS</h1>
        <p class="tracking-[2em] text-[#00f0ff] mb-12">STUDIOS 9K ENGINE</p>
        
        <button id="boot-btn" onclick="startEngine()" class="bg-white text-black py-8 px-16 font-black uppercase text-[12px] tracking-[1em] hover:bg-[#00f0ff] transition-all">
            BOOT_SYSTEM_WITH_AUDIO
        </button>
    </main>

    <script>
        const audio = document.getElementById('engine-sound');
        const btn = document.getElementById('boot-btn');

        function startEngine() {
            // UNLOCKS AUDIO ON TABLET
            audio.play().catch(e => console.log("Audio blocked: Needs user interaction first."));
            
            btn.innerText = "SYSTEM_ONLINE";
            btn.style.background = "#00f0ff";
            
            // Pulse the screen with the beat
            document.body.style.animation = "pulse 0.5s infinite alternate";
            
            setTimeout(() => {
                alert("9K AUDIO CORE INITIALIZED. WELCOME MASTER.");
            }, 500);
        }

        function openAuth() {
            // Making sure audio plays even if they click sign-in first
            audio.play();
            alert("MEMBER PORTAL LOADING...");
        }

        // Parallax Workshop Effect
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            document.getElementById('bg-layer').style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });
    </script>

    <style>
        @keyframes pulse {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }
    </style>
</body>
</html>
