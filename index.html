<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | 9K ULTRA ENGINE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* THE COSMO EYE & ELECTRIC WAVES */
        #canvas-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        .eye-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .plasma-rim {
            width: 350px; height: 350px; border-radius: 50%; padding: 4px;
            background: conic-gradient(from 0deg, #00f2ff, #ff00ff, #ffd700, #00f2ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; animation: spin 6s linear infinite;
        }
        .core-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 50px #fff, 0 0 100px #00f2ff, 0 0 200px #ff00ff;
            animation: pulse 2s infinite alternate;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { scale: 0.8; opacity: 0.6; } to { scale: 1.1; opacity: 1; } }

        /* SIGNATURE BRANDING */
        .brand {
            position: absolute; top: 50%; width: 100%; text-align: center;
            transform: translateY(-50%); font-size: clamp(1.5rem, 8vw, 3.5rem); 
            font-weight: 900; letter-spacing: 15px; z-index: 10; text-transform: none;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.8); pointer-events: none;
        }

        /* NAVIGATION & UI */
        .ui-section { position: relative; z-index: 20; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 100px; }
        .btn { 
            padding: 20px 60px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; color: #00f2ff; 
            font-weight: bold; letter-spacing: 5px; cursor: pointer; transition: 0.4s; text-decoration: none;
        }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 50px #00f2ff; }

        /* THE STOREFRONT AREA */
        .store-area { position: relative; z-index: 20; background: #000; padding: 100px 20px; border-top: 1px solid #111; }
        .store-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid #222; padding: 40px; width: 320px; text-align: center; position: relative; }
        .bonus-tag { background: #ffd700; color: #000; font-weight: bold; padding: 5px 10px; font-size: 0.7rem; position: absolute; top: 15px; right: 15px; }
        .price { font-size: 3rem; color: #00f2ff; margin: 20px 0; font-weight: 900; }
        
        /* COIN METER */
        .coin-meter { position: fixed; top: 20px; right: 20px; border: 1px solid #ffd700; padding: 10px 20px; color: #ffd700; font-weight: bold; background: #000; z-index: 100; }

        /* LIVE FEED */
        .archive-feed { margin-top: 80px; overflow: hidden; white-space: nowrap; border-top: 1px solid #111; padding: 40px 0; }
        .scroll-wrap { display: flex; gap: 20px; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        .feed-item { min-width: 250px; background: #080808; border: 1px solid #151515; padding: 15px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="coin-meter">CREDITS: 0</div>
    <canvas id="canvas-bg"></canvas>
