<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K ARENA | BATTLE OF REALITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow-x: hidden; }
        
        .arena-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(0, 240, 255, 0.2); 
            transition: 0.4s;
            position: relative;
        }
        .arena-card:hover { border-color: #ff003c; transform: translateY(-5px); }
        
        .split-view { display: grid; grid-template-cols: 1fr 1fr; gap: 2px; }
        .vote-btn { 
            background: #ff003c; color: white; font-size: 10px; font-weight: 900; 
            padding: 8px 15px; border-radius: 2px; transition: 0.3s;
        }
        .vote-btn:hover { background: white; color: #ff003c; }
        
        .rank-badge {
            position: absolute; top: -10px; left: -10px;
            background: #ffcc00; color: #000; padding: 5px 10px;
            font-size: 10px; font-weight: 900; z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="p-6 border-b border-white/10 flex justify-between items-center bg-black/90 sticky top-0 z-50">
        <h2 class="font-black text-2xl italic tracking-tighter">9K <span class="text-[#ff003c]">ARENA</span></h2>
        <div class="flex gap-6 text-[10px] font-black tracking-widest uppercase">
            <a href="transformer.html">Transform</a>
            <a href="store.html">Marketplace</a>
            <button class="bg-[#00f0ff] text-black px-4 py-1">Join Battle</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-16 px-6 pb-20">
        
        <div class="text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter">BATTLE OF REALITY</h1>
            <p class="text-[10px] text-[#ffcc00] tracking-[0.8em] mt-4">VOTE FOR THE ULTIMATE TITAN TRANSFORMATION</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            
            <div class="arena-card">
                <div class="rank-badge">#1 TITAN</div>
                <div class="split-view">
                    <div class="aspect-[3/4] bg-zinc-800 flex items-center justify-center border-r border-black">
                        <p class="text-[8px] opacity-30 text-center">SOURCE<br>PORTRAIT</p>
                    </div>
                    <div class="aspect-[3/4] bg-zinc-900 border-l border-[#ff003c]/30" style="background: url('V_SENTINEL.jpg') center/cover;">
                    </div>
                </div>
                <div class="p-4 flex justify-between items-center bg-black/50">
                    <div>
                        <p class="text-[10px] font-black uppercase">@KNOCK_TITAN_01</p>
                        <p class="text-[8px] text-[#00f0ff] opacity-70">STYLE: ULTRA 3D</p>
                    </div>
                    <button class="vote-btn">VOTE 2.4k</button>
                </div>
                <div class="p-2 flex gap-2">
                    <button class="flex-1 bg-white/5 text-[8px] p-2 hover:bg-white/10 uppercase">View Merch</button>
                    <button class="flex-1 bg-white/5 text-[8px] p-2 hover:bg-white/10 uppercase">Buy Identity</button>
                </div>
            </div>

            <div class="arena-card">
                <div class="split-view">
                    <div class="aspect-[3/4] bg-zinc-800"></div>
                    <div class="aspect-[3/4] bg-zinc-900" style="background: url('1773441360031.jpg') center/cover;"></div>
                </div>
                <div class="p-4 flex justify-between items-center bg-black/50">
                    <div>
                        <p class="text-[10px] font-black uppercase">@CYBER_GHOST</p>
                        <p class="text-[8px] text-[#00f0ff] opacity-70">STYLE: ANIME SOVEREIGN</p>
                    </div>
                    <button class="vote-btn">VOTE 1.1k</button>
                </div>
                <div class="p-2 flex gap-2">
                    <button class="flex-1 bg-white/5 text-[8px] p-2 hover:bg-white/10 uppercase">View Merch</button>
                    <button class="flex-1 bg-white/5 text-[8px] p-2 hover:bg-white/10 uppercase">Buy Identity</button>
                </div>
            </div>

            <div class="arena-card flex flex-col items-center justify-center p-12 border-dashed">
                <p class="text-xl font-black italic text-center mb-6">WANT TO ENTER THE ARENA?</p>
                <a href="transformer.html" class="bg-white text-black font-black px-8 py-4 text-[10px] uppercase tracking-widest hover:bg-[#ff003c] hover:text-white transition">Transform Now</a>
            </div>

        </div>
    </main>

</body>
</html>
