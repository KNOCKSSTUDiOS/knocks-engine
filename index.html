    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; margin: 0; overflow-x: hidden; }
        .all-caps { text-transform: uppercase !important; letter-spacing: 0.2em; font-weight: 900; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; }
        
        /* THE COMPANION BOT (K.I.A) */
        #kia-bot { position: fixed; bottom: 40px; left: 40px; z-index: 10000; display: flex; align-items: center; gap: 15px; transition: 1s; opacity: 1; }
        .bot-core { width: 50px; height: 50px; background: #00f0ff; border-radius: 50%; box-shadow: 0 0 20px #00f0ff; animation: pulse 2s infinite; }
        .bot-bubble { background: rgba(0,0,0,0.9); border: 1px solid #00f0ff; padding: 15px; font-size: 10px; max-width: 280px; border-radius: 0 20px 20px 20px; color: #00f0ff; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* GALLERY & TIERS */
        .style-card { height: 250px; background-size: cover; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
        .style-card:hover { border-color: #00f0ff; transform: scale(1.02); }
        .active-style { border: 2px solid #00f0ff !important; box-shadow: 0 0 20px rgba(0,240,255,0.3); }

        #bg-video { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .page-section { display: none; min-height: 100vh; }
        #lobby { display: flex; }
    </style>
</head>
