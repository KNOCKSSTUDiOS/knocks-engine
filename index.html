<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { cursor: none !important; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        /* PARTICLE STYLE */
        .particle {
            position: fixed; pointer-events: none;
            width: 4px; height: 4px; background: #22d3ee;
            z-index: 100; border-radius: 50%;
            box-shadow: 0 0 10px #22d3ee;
        }

        /* VIDEO ENGINE */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; background: #000;
        }
        
        #bg-video {
            width: 100%; height: 100%;
            filter: brightness(0.25) contrast(1.2) blur(12px);
            object-fit: cover;
            transition: filter 0.6s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* CHROMATIC HUM (VIBRATION + COLOR FRINGE) */
        @keyframes chromatic-hum {
            0% { transform: translate(0, 0); filter: drop-shadow(2px 0 0 rgba(255,0,0,0.5)) drop-shadow(-2px 0 0 rgba(0,255,255,0.5)) brightness(0.7) blur(0px); }
            25% { transform: translate(0.5px, 0.5px); }
            50% { transform: translate(-0.5px, 0.5px); filter: drop-shadow(-2px 0 0 rgba(255,0,0,0.5)) drop-shadow(2px 0 0 rgba(0,255,255,0.5)) brightness(0.8) blur(0px); }
            75% { transform: translate(0.5px, -0.5px); }
            100% { transform: translate(0, 0); filter: drop-shadow(2px 0 0 rgba(255,0,0,0.5)) drop-shadow(-2px 0 0 rgba(0,255,255,0.5)) brightness(0.7) blur(0px); }
        }

        .persistence-hd #bg-video {
            animation: chromatic-hum 0.07s linear infinite !important;
        }

        /* SHATTER / RESET STATES */
        .system-stasis #bg-video { filter: brightness(1) blur(0px) grayscale(100%) !important; transform: scale(1.4) !important; }
        .prismatic-flash #bg-video { animation: rainbow-shatter 0.05s linear infinite; }
        @keyframes rainbow-shatter {
            0% { filter: hue-rotate(0deg) brightness(5) contrast(3); }
            100% { filter: hue-rotate(360deg) brightness(8) contrast(5); }
        }
        .reset-pull #bg-video { transform: scale(0.6) rotate(360deg) !important; filter: brightness(0.15) blur(10px) !important; }

        /* UI ELEMENTS */
        #main-header h1 { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); letter-spacing: -0.05em; }
        .system-stasis #main-header h1 { letter-spacing: 2em !important; color: #06b6d4; }
        .signature-i { text-transform: none !important; color: #06b6d4; display: inline-block; }

        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.3); transition: opacity 0.3s; }
        .btn-hidden { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
