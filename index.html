<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V | SOVEREiGN_OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --win-gray: #c0c0c0; --win-blue: #000080; --cyan: #00fff2; --gold: #ffd700; --purple: #a855f7; --void: #010103; }
        body { background-color: #008080; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        .monolith { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-weight: 900; }

        /* THE V-SHELL TABLET */
        main.v-shell {
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff #404040 #404040 #fff;
            width: 98vw; height: 90vh; margin: auto;
            display: flex; flex-direction: column;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.5);
        }

        .title-bar {
            background: linear-gradient(90deg, var(--win-blue), #1084d0);
            padding: 10px 15px; display: flex; justify-content: space-between;
            color: white; font-weight: 900; font-size: 12px;
        }

        /* THE BLACK MECH ASSISTANT (downloadfile-65.mp4) */
        .mech-live-pin {
            position: fixed; bottom: 80px; right: 40px;
            width: 280px; height: 190px; z-index: 9999;
            border: 2px solid var(--cyan); background: #000;
            box-shadow: 0 0 50px rgba(0, 255, 242, 0.4);
            border-radius: 4px; overflow: hidden;
            animation: tablet-float 5s ease-in-out infinite;
        }
        @keyframes tablet-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .workspace {
            background: var(--void); margin: 4px; border: 4px inset #fff;
            flex-grow: 1; padding: 40px; position: relative;
            background-image: linear-gradient(rgba(0, 255, 242, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 242, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* SHOWCASE CARDS (ENGINE_01, NEURAL_02, MATRIX_03) */
        .showcase-card {
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; height: 160px;
        }
        .showcase-card:hover { border-color: var(--cyan); transform: translateY(-5px); }
        .showcase-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 3px; transition: 0.4s; }
        .card-cyan:hover::after { width: 100%; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        .card-purple:hover::after { width: 100%; background: var(--purple); box-shadow: 0 0 15px var(--purple); }
        .card-gold:hover::after { width: 100%; background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .metallic-v {
            background: linear-gradient(180deg, #FFFFFF 0%, #718096 50%, #FFFFFF 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 6rem; filter: drop-shadow(0 0 20px rgba(0,255,242,0.4));
        }

        .taskbar { height: 50px; background: var(--win-gray); border-top: 3px solid #fff; display: flex; align-items: center; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="mech-live-pin">
        <video autoplay muted loop playsinline class="w-full h-full object-cover">
            <source src="downloadfile-65.mp4" type="video/mp4">
        </video>
    </div>

    <main class="v-shell">
        <div class="title-bar">
            <span class="monolith">KNOCKSSTiUDiOS_VIVID_VEO_SYSTEMS</span>
            <div class="flex gap-2">
                <button class="w-6 h-6 bg-gray-300 border border-black shadow-[inset_1px_1px_#fff]">_</button>
                <button class="w-6 h-6 bg-gray-300 border border-black shadow-[inset_1px_1px_#fff] text-xs">X</button>
            </div>
        </div>

        <div class="workspace">
            <div class="flex justify-between items-start mb-12">
                <h1 class="monolith metallic-v leading-none">V_OS</h1>
                <div class="p-6 border-l-4 border-cyan-400 bg-white/5 backdrop-blur-sm">
                    <span class="monolith text-cyan-400 text-[10px] block mb-2 tracking-[0.5em]">BYPASS_0736</span>
                    <p class="text-4xl font-black text-white italic">CEO_LEVEL</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="showcase-card card-cyan p-6 flex flex-col justify-between">
                    <div>
                        <div class="status-dot bg-cyan-400 mr-2"></div>
                        <span class="monolith text-cyan-400 text-[9px]">ENGINE_01</span>
                    </div>
                    <p class="text-white text-xs font-black tracking-[0.3em] uppercase">9K_CORE_ENGINE</p>
                </div>

                <div class="showcase-card card-purple p-6 flex flex-col justify-between">
                    <div>
                        <div class="status-dot bg-purple-500 mr-2"></div>
                        <span class="monolith text-purple-400 text-[9px]">NEURAL_02</span>
                    </div>
                    <p class="text-white text-xs font-black tracking-[0.3em] uppercase">NEURAL_RENDER</p>
                </div>

                <div class="showcase-card card-gold p-6 flex flex-col justify-between">
                    <div>
                        <div class="status-dot bg-yellow-500 mr-2"></div>
                        <span class="monolith text-yellow-400 text-[9px]">MATRIX_03</span>
                    </div>
                    <p class="text-white text-xs font-black tracking-[0.3em] uppercase">ARCHiVE_STORE</p>
                </div>
            </div>

            <div class="mt-12 text-[10px] monolith text-gray-500 tracking-[0.6em] uppercase">
                Status: KNOCKSSTiUDiOS_VEO_Core_Synced // 100%
            </div>
        </div>
    </main>

    <footer class="taskbar">
        <button class="bg-gray-300 border-2 border-outset border-white px-6 py-1 font-black text-black">START</button>
        <div class="ml-4 flex gap-2">
            <div class="bg-gray-400 border-2 border-inset px-4 py-1 text-black text-[9px] font-black">SOVEREiGN_DASH</div>
        </div>
        <div class="ml-auto px-5 py-2 text-black font-mono text-[10px] border-2 border-inset bg-gray-400">
            ENGINE_01_ONLiNE
        </div>
    </footer>

</body>
</html>
