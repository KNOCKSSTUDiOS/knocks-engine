<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | Valerius 9K Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505; /* Deep Obsidian */
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* KNOCKSSTUDiOS Branding Overlay */
        .brand-overlay {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 15px;
            color: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            z-index: 1;
        }

        /* The Biometric 9K Eye Container */
        .eye-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            z-index: 2;
        }

        /* The Moving Eye / Laser Scan */
        .eye-scanner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #00f2ff; /* Electric Cyan */
            box-shadow: 0 0 50px #00f2ff, inset 0 0 30px #00f2ff;
            background: radial-gradient(circle, #000 30%, #111 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .laser-line {
            position: absolute;
            width: 150%;
            height: 2px;
            background: #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            animation: scan 3s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 20%; transform: rotate(-5deg); opacity: 0.5; }
            50% { top: 80%; transform: rotate(5deg); opacity: 1; }
        }

        /* Glass Tiles UI */
        .ui-tiles {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 3;
        }

        .glass-tile {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .glass-tile:hover {
            background: rgba(0, 242, 255, 0.2);
            border-color: #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            transform: translateY(-5px);
        }

        /* Rotating Payment Sign (Bottom Left Corner) */
        #payment-display {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 15px 25px;
            border: 2px solid #fff;
            border-radius: 5px;
            background: rgba(0,0,0,0.8);
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.5s ease;
            z-index: 10;
            min-width: 180px;
            text-align: center;
        }

        #method-name {
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="brand-overlay">KNOCKSSTUDiOS</div>

    <div class="eye-container">
        <div class="eye-scanner">
            <div class="laser-line"></div>
            <div style="width: 100px; height: 100px; background: #000; border: 2px solid #ffd700; border-radius: 50%; box-shadow: 0 0 15px #ffd700;"></div>
        </div>
    </div>

    <div class="ui-tiles">
        <div class="glass-tile">Login</div>
        <div class="glass-tile">Sign Up</div>
    </div>

    <div id="payment-display">
        <span id="method-name">Initializing...</span>
    </div>

    <script>
        const paymentMethods = [
            { name: "VISA", color: "#FFD700", icon: "fa-cc-visa" },
            { name: "MASTERCARD", color: "#FF4500", icon: "fa-cc-mastercard" },
            { name: "AMEX", color: "#00C851", icon: "fa-cc-amex" },
            { name: "BITCOIN", color: "#00B0FF", icon: "fa-bitcoin-sign" }
        ];

        let index = 0;
        const display = document.getElementById("payment-display");
        const text = document.getElementById("method-name");

        function updatePayments() {
            const method = paymentMethods[index];
            text.style.opacity = 0;

            setTimeout(() => {
                text.innerHTML = `<i class="fa-solid ${method.icon}"></i> ${method.name}`;
                display.style.borderColor = method.color;
                display.style.color = method.color;
                display.style.boxShadow = `0 0 20px ${method.color}66`;
                text.style.opacity = 1;
                index = (index + 1) % paymentMethods.length;
            }, 500);
        }

        setInterval(updatePayments, 2000);
        updatePayments();
    </script>
</body>
</html>
