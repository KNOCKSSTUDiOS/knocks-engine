<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ks-cyan: #00fff2;
            --ks-purple: #8a2be2;
            --ks-orange: #ff4b2b;
            --ks-void: #020205;
        }

        body {
            background-color: var(--ks-void);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 255, 242, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .ks-monolith { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        .hero-title {
            font-size: clamp(3rem, 11vw, 9rem);
            line-height: 0.8;
            background: linear-gradient(to bottom right, #ffffff 30%, var(--ks-cyan), var(--ks-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 255, 242, 0.2));
        }

        /* --- NAVIGATION & HAMBURGER --- */
        .nav-trigger {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- RADIO CONTROL PANEL (HIDDEN BY DEFAULT) --- */
        #side-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(40px);
            z-index: 999;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255,255,255,0.05);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #side-panel.open { right: 0; }

        .panel-header {
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--ks-cyan);
            margin-bottom: 40px;
            font-weight: 900;
        }

        /* --- MASTER VAULT OVERLAY --- */
        #master-vault {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(50px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .ks-input {
            background: #0a0a0a;
            border: 1px solid #222;
            color: var(--ks-cyan);
            padding: 20px;
            width: 100%;
            text-align: center;
            outline: none;
            font-weight: 900;
            letter-spacing: 0.5em;
            margin-bottom: 20px;
        }

        .sys-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 8px;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.05);
            background: none;
            border: none;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="nav-trigger" onclick="togglePanel()">
        <div class="w-6 h-0.5 bg-white mb-1.5"></div>
        <div class="w-6 h-0.5 bg-cyan-400 mb-1.5"></div>
        <div class="w-6 h-0.5 bg-white"></div>
    </div>

    <div id="side-panel">
        <div class="panel-header uppercase">Command Center</div>
        
        <div class="w-full bg-white/5 p-4 rounded-xl border border-white/10 mb-8 text-center">
            <p class="text-[9px] tracking-widest mb-4 text-gray-400">LIVE RADIO STREAM</p>
            <iframe id="embed_player" frameborder="0" width="100%" height="350" src="https://knocksstudios.airtime.pro/embed/player?stream=auto&skin=2"></iframe>
        </div>

        <button onclick="togglePanel()" class="text-[9px] tracking-[0.3em] text-gray-600 hover:text-white transition-colors">CLOSE MENU</button>
    </div>

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="mb-10">
            <span class="border border-cyan-500/30 px-5 py-2 rounded-full text-[9px] font-black tracking-[0.4em] text-cyan-400">
                ● AI LAB LEGENDS
            </span>
        </div>

        <h1 class="ks-monolith hero-title font-black mb-12">
            KNOCKS<br>STUDiOS
        </h1>

        <p class="max-w-2xl text-gray-400 text-sm md:text-base tracking-wide mb-14 leading-relaxed">
            Where cinematic imagination meets omnipotent AI.<br>
            <span class="text-white font-bold">Build worlds. Render legends. Ship the impossible.</span>
        </p>

        <div class="flex flex-col sm:flex-row gap-6 uppercase text-[11px] font-black tracking-widest">
            <button class="bg-[#ff4b2b] px-12 py-5 rounded-full shadow-[0_10px_40px_rgba(255,75,43,0.3)] hover:scale-105 transition-transform">
                Explore The Engine
            </button>
            <button class="border border-white/20 px-12 py-5 rounded-full hover:bg-white/5 transition-colors">
                Watch The Reel
            </button>
        </div>
    </header>

    <button onclick="toggleVault(true)" class="sys-trigger uppercase">Sys_Login</button>

    <div id="master-vault">
        <div class="max-w-sm w-full p-10 bg-black border border-white/5 text-center">
            <p class="text-[10px] text-gray-600 tracking-[1em] mb-10 font-black uppercase">Authenticate</p>
            <div id="login-form">
                <input type="password" id="pass-field" class="ks-input" placeholder="PASSKEY">
                <button onclick="checkAccess()" class="w-full bg-white text-black py-5 font-black text-xs tracking-widest hover:bg-cyan-400 transition-colors">VERIFY</button>
                <button onclick="toggleVault(false)" class="mt-8 text-[9px] text-gray-700 uppercase tracking-[0.5em]">Cancel</button>
            </div>
            <div id="ceo-controls" class="hidden">
                <p class="text-orange-500 font-black text-xs tracking-[0.3em] mb-6">CEO ACCESS GRANTED</p>
                <button class="w-full py-5 bg-cyan-400 text-black font-black text-[10px] tracking-widest">INFINITE RENDERING: ON</button>
            </div>
        </div>
    </div>

    <script>
        // Hamburger Menu Logic
        function togglePanel() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('open');
        }

        // Vault Logic
        function toggleVault(show) {
            document.getElementById('master-vault').style.display = show ? 'flex' : 'none';
        }

        function checkAccess() {
            const p = document.getElementById('pass-field').value;
            if (p === "0736") {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('ceo-controls').classList.remove('hidden');
            } else {
                alert("ACCESS DENIED");
                document.getElementById('pass-field').value = "";
            }
        }
    </script>
</body>
</html>
