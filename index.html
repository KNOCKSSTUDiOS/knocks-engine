<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>KNOCKSSTUDIOS | 9K SOVEREIGN ENGINE</title>
    <style>
        /* FORCING UNIVERSAL CAPITALIZATION - NO LOWERCASE ALLOWED */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: uppercase; font-family: 'Courier New', monospace; }
        
        body, html { height: 100%; background: #000; color: #fff; overflow-x: hidden; }

        /* HEADER NAVIGATION GATES */
        header { 
            position: fixed; top: 0; width: 100%; padding: 25px 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.95); border-bottom: 2px solid #111; z-index: 1000; 
        }
        .brand-name { color: #FF8C00; font-weight: 900; letter-spacing: 6px; font-size: 20px; }
        .nav-gates { display: flex; gap: 20px; }
        .nav-btn { 
            background: transparent; border: 1px solid #333; color: #fff; 
            padding: 10px 20px; cursor: pointer; font-size: 12px; letter-spacing: 2px; 
            transition: 0.3s; 
        }
        .nav-btn:hover { border-color: #FF8C00; color: #FF8C00; box-shadow: 0 0 10px #FF8C00; }
        .nav-btn.highlight { background: #FF8C00; color: #000; border: none; font-weight: bold; }

        /* PAGE SYSTEM */
        .page { display: none; min-height: 100vh; width: 100%; padding-top: 120px; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* HOME SCREEN */
        h1 { font-size: clamp(3rem, 12vw, 6rem); letter-spacing: 20px; text-shadow: 0 0 30px #FF8C00; margin-bottom: 10px; text-align: center; }
        .legend-tag { color: #444; letter-spacing: 10px; font-size: 14px; margin-bottom: 40px; }

        /* FORMS */
        .form-box { width: 90%; max-width: 450px; background: #050505; border: 2px solid #FF8C00; padding: 50px; text-align: center; }
        input, select { 
            width: 100%; padding: 15px; margin: 15px 0; background: #000; 
            border: 1px solid #222; color: #fff; outline: none; font-size: 16px; 
        }
        input:focus { border-color: #FF8C00; }

        /* THE ENGINE */
        .viewport { 
            width: 90%; max-width: 1100px; aspect-ratio: 16/9; 
            border: 2px solid #FF8C00; background: #000; margin-bottom: 30px; 
            display: flex; align-items: center; justify-content: center; position: relative; 
        }
        video { width: 100%; height: 100%; display: none; object-fit: cover; }
        .status-text { letter-spacing: 5px; color: #FF8C00; animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .burn-btn { 
            width: 90%; max-width: 1100px; padding: 25px; background: #FF8C00; 
            color: #000; font-weight: 900; border: none; cursor: pointer; 
            letter-spacing: 10px; font-size: 20px; 
        }
        .burn-btn:hover { background: #fff; box-shadow: 0 0 40px #fff; }

        .main-btn { padding: 20px 60px; border: 2px solid #FF8C00; background: transparent; color: #FF8C00; font-weight: bold; cursor: pointer; letter-spacing: 5px; }
        .main-btn:hover { background: #FF8C00; color: #000; box-shadow: 0 0 50px #FF8C00; }
    </style>
</head>

        </div>

        <button class="burn-btn" onclick="executeBurn()">EXECUTE_BURN</button>
    </div>
