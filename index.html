<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNOCKSSTUDiOS | LIVE GATE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Courier New', monospace; }
        
        /* THE DEPTH ENGINE (Canvas for the Electric Waves) */
        #particleCanvas { position: fixed; inset: 0; z-index: 1; }

        /* THE COSMIC EYE SINGULARITY (Layered for 3D Effect) */
        .eye-singularity {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px; z-index: 5;
            background: radial-gradient(circle, #fff 0%, #00f2ff 10%, #ff00ff 30%, transparent 70%);
            filter: blur(2px); animation: eyeBreathe 3s infinite alternate;
        }

        /* The Spinning Multi-Color Rim */
        .color-rim {
            position: absolute; top: 50%; left: 50%; width: 420px; height: 420px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        conic-gradient(#00f2ff, #ff00ff, #ffd700, #00f2ff) border-box;
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.6);
            animation: spin 8s linear infinite;
        }

        @keyframes eyeBreathe { from { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); } to { opacity: 1; transform: translate(-50%, -50%) scale(1.05); } }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* THE SIGNATURE: KNOCKSSTUDiOS */
        .signature-branding {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; letter-spacing: 20px;
            z-index: 10; text-transform: none; /* Keeps the 'i' lowercase */
            color: white; text-shadow: 0 0 20px #00f2ff, 0 0 40px #ff00ff;
            pointer-events: none;
        }

        /* UI BUTTONS */
        .nav-gate { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 20; }
        .gate-btn { 
            padding: 18px 50px; background: rgba(0,0,0,0.8); border: 2px solid #00f2ff; color: #00f2ff; 
            font-weight: bold; letter-spacing: 5px; cursor: pointer; transition: 0.5s; text-transform: uppercase;
        }
        .gate-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 60px #00f2ff; letter-spacing: 8px; }
    </style>
</head>
