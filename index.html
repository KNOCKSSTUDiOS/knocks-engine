<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        :root { --cyan: #00f0ff; --magenta: #ff00ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- THE PERFECT VISUALS (UNTOUCHED) --- */
        #visual-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #08081a 0%, #000 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: drift 20s infinite alternate ease-in-out; }
        @keyframes drift { 0% { transform: scale(1); } 100% { transform: scale(1.3) translate(3%, 3%); } }
        
        /* --- MUSIC WHEEL --- */
        #music-wheel { position: fixed; bottom: 30px; left: 30px; width: 40px; height: 40px; border: 1px solid var(--cyan); border-radius: 50%; z-index: 5000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; animation: spin 4s linear infinite; background: rgba(0,0,0,0.8); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- AUTH GATE (THE GUARD) --- */
        #auth-gate { position: fixed; inset: 0; z-index: 6000; background: rgba(0,0,0,0.8); backdrop-filter: blur(40px); display: flex; align-items: center; justify-content: center; }
        .auth-box { border: 1px solid var(--cyan); padding: 40px; width: 400px; text-align: center; background: #000; }
        
        /* --- ENGINE WRAP --- */
        #engine-wrap { transition: 1.5s filter; filter: blur(30px); pointer-events: none; }
        .unlocked { filter: blur(0) !important; pointer-events: auto !important; }
        
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        .overclock-active { animation: shake 0.1s infinite; }
    </style>
</head>
