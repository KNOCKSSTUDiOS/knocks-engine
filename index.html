<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | CINEMATIC ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@900&display=swap');
        :root { --ks-void: #020205; --ks-cyan: #00fff2; --ks-blood: #ff4b2b; }
        body { 
            background: var(--ks-void); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a2a22, transparent),
                        radial-gradient(circle at bottom left, #1a1a2a, var(--ks-void));
        }
        .ks-monolith { font-family: 'Syncopate'; font-weight: 900; text-transform: uppercase; }
        .hero-title {
            font-size: 10vw; letter-spacing: -5px;
            background: linear-gradient(to right, #00fff2, #8a2be2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 0.8;
        }
        .btn-orange { background: #ff4b2b; padding: 15px 40px; border-radius: 50px; font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 50px; font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        #master-vault { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .ks-input { background: #080808; border: 1px solid #222; color: var(--ks-cyan); padding: 20px; text-align: center; width: 100%; outline: none; font-weight: 900; letter-spacing: 0.5em; margin-bottom: 15px; }
        .trigger-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); padding: 40px; width: 100%; font-weight: 900; letter-spacing: 0.5em; text-transform: uppercase; font-size: 11px; transition: 0.4s; }
        .trigger-active { background: var(--ks-blood) !important; box-shadow: 0 0 50px var(--ks-blood); border: none; }
        .sys-login { position: fixed; bottom: 20px; right: 20px; font-size: 8px; letter-spacing: 5px; color: rgba(255,255,255,0.1); text-transform: uppercase; border: none; background: none; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="mb-6">
            <span class="text-[8px] border border-cyan-500/30 text-cyan-400 px-4 py-1 rounded-full uppercase tracking-widest font-bold">● AI LAB LEGENDS</span>
        </div>
        <h1 class="ks-monolith hero-title mb-8">KNOCKS<br>STUDiOS</h1>
        <p class="max-w-xl text-gray-400 text-sm tracking-wide mb-10 leading-relaxed">Where cinematic imagination meets omnipotent AI.<br>Build worlds. Render legends. Ship the impossible.</p>
        <div class="flex flex-col md:flex-row gap-4">
            <button class="btn-orange">EXPLORE THE ENGINE</button>
            <button class="btn-outline">WATCH THE REEL</button>
        </div>
    </header>

    <button onclick="document.getElementById('master-vault').style.display='flex'" class="sys-login">SYS_LOGIN</button>

    <div id="master-vault">
        <div class="w-full max-w-sm p-10 bg-black border border-white/5 text-center">
            <div id="gate-input">
                <p class="text-[10px] text-gray-600 tracking-[1em] mb-12 uppercase font-black">Authenticate</p>
                <input type="password" id="pass-key" class="ks-input" placeholder="PASSKEY">
                <button onclick="verifyKey()" class="w-full py-5 bg-white text-black font-black text-[11px] tracking-[0.5em] uppercase">Enter Engine</button>
            </div>
            <div id="ceo-dash" class="hidden">
                <p class="text-[10px] text-red-600 tracking-[1.2em] mb-12 font-black uppercase italic">Master_Bypass_Active</p>
                <button id="render-trigger" onclick="toggleRender()" class="trigger-btn">Infinite_Rendering: OFF</button>
                <p class="text-[8px] text-cyan-400 mt-10 tracking-widest uppercase font-bold">Credits: UNLIMITED // CEO: TAMAYO</p>
                <button onclick="location.reload()" class="mt-12 text-[9px] text-gray-700 uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </div>

    <script>
        function verifyKey() {
            const p = document.getElementById('pass-key').value;
            if (p === "0736") {
                document.getElementById('gate-input').classList.add('hidden');
                document.getElementById('ceo-dash').classList.remove('hidden');
            } else {
                alert("ACCESS_DENIED");
                location.reload();
            }
        }
        function toggleRender() {
            const btn = document.getElementById('render-trigger');
            btn.classList.toggle('trigger-active');
            const isActive = btn.classList.contains('trigger-active');
            btn.innerText = isActive ? "Infinite_Rendering: ACTIVE" : "Infinite_Rendering: OFF";
        }
    </script>
</body>
</html>
