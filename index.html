<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ks-cyan: #00fff2;
            --ks-purple: #8a2be2;
            --ks-orange: #ff4b2b;
            --ks-void: #020205;
        }

        body {
            background-color: var(--ks-void);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 255, 242, 0.1) 0%, transparent 40%);
        }

        .ks-monolith { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        .hero-title {
            font-size: clamp(3rem, 12vw, 8.5rem);
            line-height: 0.85;
            background: linear-gradient(to bottom right, #ffffff 40%, var(--ks-cyan), var(--ks-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 255, 242, 0.3));
        }

        /* --- THE HAMBURGER / RADIO DRAWER --- */
        .nav-trigger {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            cursor: pointer;
            padding: 10px;
        }

        #radio-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(2, 2, 5, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 999;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #radio-drawer.open { right: 0; }

        /* --- ORANGE BUTTON GLOW --- */
        .btn-orange {
            background: var(--ks-orange);
            box-shadow: 0 0 25px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
        }
        .btn-orange:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 75, 43, 0.6);
        }

        /* --- MASTER VAULT (HIDDEN) --- */
        #vault-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="nav-trigger" onclick="toggleRadio()">
        <div class="w-8 h-1 bg-white mb-1"></div>
        <div class="w-8 h-1 bg-orange-500 mb-1"></div>
        <div class="w-8 h-1 bg-white"></div>
    </div>

    <div id="radio-drawer">
        <h2 class="ks-monolith text-[10px] tracking-[0.5em] text-cyan-400 mb-10">Command Center</h2>
        <div class="w-full bg-white/5 rounded-lg p-2 border border-white/10">
            <iframe id="embed_player" frameborder="0" width="100%" height="396" src="https://knocksstudios.airtime.pro/embed/player?stream=auto&skin=2"></iframe>
        </div>
        <button onclick="toggleRadio()" class="mt-10 text-[9px] tracking-widest text-gray-500 hover:text-white uppercase">Close Signal</button>
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center text-center px-4">
        
        <div class="mb-8">
            <span class="border border-white/20 px-6 py-2 rounded-full text-[10px] font-black tracking-[0.4em] text-white uppercase">
                ● AI LAB LEGENDS
            </span>
        </div>

        <h1 class="ks-monolith hero-title font-black mb-10">
            KNOCKS<br>STUDiOS
        </h1>

        <p class="max-w-xl text-gray-400 text-sm md:text-base tracking-widest mb-12 uppercase">
            The Vision. The Engine. The Empire.
        </p>

        <div class="flex flex-col sm:flex-row gap-6">
            <button class="btn-orange text-white font-black px-12 py-5 rounded-full text-xs tracking-[0.3em] uppercase">
                Explore The Engine
            </button>
            <button class="border border-white/30 text-white font-black px-12 py-5 rounded-full text-xs tracking-[0.3em] uppercase hover:bg-white/10 transition-all">
                The Vision
            </button>
        </div>
    </main>

    <button onclick="openVault()" class="fixed bottom-5 right-5 text-[8px] text-white/10 tracking-widest uppercase">Sys_Access</button>

    <div id="vault-overlay">
        <div class="text-center p-10 border border-white/10 bg-zinc-950">
            <p class="ks-monolith text-[10px] text-orange-500 tracking-[1em] mb-8">Identify</p>
            <input type="password" id="vault-pass" class="bg-black border border-white/20 text-white p-4 text-center tracking-[1em] outline-none mb-6" placeholder="****">
            <br>
            <button onclick="verifyVault()" class="text-white text-[10px] tracking-widest border border-white/20 px-8 py-3 hover:bg-white hover:text-black">ENTER</button>
            <br>
            <button onclick="closeVault()" class="mt-6 text-[8px] text-gray-600 uppercase">Exit</button>
        </div>
    </div>

    <script>
        function toggleRadio() {
            document.getElementById('radio-drawer').classList.toggle('open');
        }

        function openVault() {
            document.getElementById('vault-overlay').style.display = 'flex';
        }

        function closeVault() {
            document.getElementById('vault-overlay').style.display = 'none';
        }

        function verifyVault() {
            const pin = document.getElementById('vault-pass').value;
            if(pin === "0736") {
                alert("WELCOME MASTER KNOCKS");
                // You can add CEO redirect or unlock more tabs here
            } else {
                alert("INVALID PASSKEY");
                document.getElementById('vault-pass').value = "";
            }
        }
    </script>
</body>
</html>
