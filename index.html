<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | The Sovereign Pulse</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        video.active {
            display: block;
        }

        /* Cinematic Overlay for 4D feel */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Credits Styling */
        #credits-wrap {
            position: absolute;
            bottom: -100%;
            width: 100%;
            text-align: center;
            color: #fff;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: bottom 20s linear;
        }

        .credit-line { margin: 20px 0; font-size: 1.5rem; }
        .legend-tag { color: #00f2ff; font-weight: bold; font-size: 2rem; }

        /* Impact Effect */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="video-container">
        <video id="v1" class="active" muted playsinline>
            <source src="SENTINEL_INTRO_URL" type="video/mp4">
        </video>
        
        <video id="v2" muted playsinline>
            <source src="LASER_THUNDER_URL" type="video/mp4">
        </video>

        <video id="v3" muted playsinline>
            <source src="FIGHT_SCENE_URL" type="video/mp4">
        </video>
    </div>

    <div id="credits-wrap">
        <div class="credit-line">Produced By</div>
        <div class="credit-line" style="font-size: 3rem;">MASTER KNOCKS</div>
        <div class="credit-line">Architecture by</div>
        <div class="credit-line">Knox Ford & Nor'Star</div>
        <div class="credit-line">Studio</div>
        <div class="credit-line">KNOCKSSTUDiOS</div>
        <div class="credit-line legend-tag">Powered by AI Legends</div>
    </div>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const v3 = document.getElementById('v3');
        const credits = document.getElementById('credits-wrap');
        const container = document.getElementById('video-container');

        // Logic to handle Sentinel impact (Timing should be matched to the crush)
        v1.onplay = () => {
            setTimeout(() => {
                container.classList.add('shake');
                // Code logic to simulate letters breaking goes here
            }, 3500); // Adjust this ms to the exact moment of impact
        };

        v1.onended = () => {
            v1.classList.remove('active');
            v2.classList.add('active');
            v2.play();
        };

        v2.onended = () => {
            v2.classList.remove('active');
            v3.classList.add('active');
            v3.play();
        };

        v3.onended = () => {
            // Roll Credits
            credits.style.bottom = "110%";
        };

        // Start the engine
        window.onclick = () => v1.play(); 
    </script>
</body>
</html>
