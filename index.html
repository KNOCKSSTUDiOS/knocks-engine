<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS | SPECTRUM FLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --neon: #00f0ff; --gold: #ffcc00; --olive: #6b8e23; --crimson: #ff004c; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }

        /* THE SPECTRUM LIQUID VOID */
        #live-void { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .particle { 
            position: absolute; border-radius: 50%; opacity: 0.3; 
            animation: float 10s infinite linear, colorShift 8s infinite alternate; 
            filter: blur(2px);
        }
        @keyframes float { from { transform: translateY(110vh) scale(0.5); } to { transform: translateY(-10vh) scale(1.5); } }
        @keyframes colorShift { 
            0% { background: var(--gold); } 33% { background: var(--neon); } 
            66% { background: var(--olive); } 100% { background: var(--crimson); } 
        }

        /* RESTORED LIQUID GOLD + SPECTRUM LETTERS */
        .liquid-text {
            font-size: 56px; font-weight: 900; 
            background: linear-gradient(180deg, var(--gold), var(--olive), var(--neon), var(--crimson));
            background-size: 100% 400%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255,204,0,0.5));
            animation: flow 6s infinite linear, drip 3s infinite ease-in-out;
            display: inline-block;
        }
        @keyframes flow { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }
        @keyframes drip { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-12px) scale(1.04); } }

        /* NAV & TILES */
        .nav-rail { height: 100vh; width: 90px; position: fixed; left: 0; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 35px; z-index: 5000; background: rgba(0,0,0,0.95); }
        .nav-item { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 9px; letter-spacing: 0.8em; cursor: pointer; opacity: 0.3; transition: 0.5s; }
        .nav-item:hover { opacity: 1; color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        .engine-tile { 
            background: rgba(10,10,10,0.8); border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(50px); position: relative; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .engine-tile:hover { border-color: var(--neon); box-shadow: 0 0 40px rgba(0, 240, 255, 0.1); }

        /* BUTTONS & INPUTS */
        .glow-btn { 
            background: linear-gradient(90deg, var(--gold), var(--olive)); 
            color: #000; font-weight: 900; transition: 0.4s; 
        }
        .glow-btn:hover { letter-spacing: 0.5em; filter: brightness(1.2); }

        #shutter { position: fixed; inset: 0; background: #000; z-index: 10000; transform: scaleY(0); transition: 0.8s cubic-bezier(1,0,0,1); display: flex; align-items: center; justify-content: center; }
        #shutter.active { transform: scaleY(1); }
    </style>
</head>
<body onload="initVoid()">

    <div id="live-void"></div>
    <div id="shutter"><h1 class="extraordinary text-xs tracking-[2em] animate-pulse">FLOW ACTIVATED</h1></div>

    <div class="nav-rail">
        <div class="knocks-font text-[8px] text-[#ffcc00] mb-8">CORE_V14</div>
        <div class="nav-item knocks-font">ENGINE</div>
        <div class="nav-item knocks-font">MUSIC</div>
        <div class="nav-item knocks-font">VAULT</div>
    </div>

    <main class="pl-32 pr-10 pt-10">
        <div class="mb-12"><h1 class="liquid-text extraordinary">KNOCKSCREATIVESTUDIOS</h1></div>

        <div class="grid grid-cols-12 gap-10">
            <div class="col-span-4 space-y-8">
                <div class="engine-tile p-8">
                    <h3 class="extraordinary text-[9px] opacity-40 mb-6 uppercase tracking-widest">Visual Sync</h3>
                    <label class="h-28 border border-white/10 flex items-center justify-center cursor-pointer hover:bg-white/5 transition">
                        <span class="text-[8px] knocks-font">DROP RAW DATA</span>
                        <input type="file" class="hidden">
                    </label>
                </div>
                <div class="engine-tile p-8">
                    <h3 class="extraordinary text-[9px] opacity-40 mb-6 uppercase tracking-widest">Audio Flow</h3>
                    <label class="h-28 border border-white/10 flex items-center justify-center cursor-pointer hover:bg-[#ffcc00]/5 transition">
                        <span class="text-[8px] knocks-font text-[#ffcc00]">SYNC MASTER TRACK</span>
                        <input type="file" class="hidden">
                    </label>
                </div>
                <div class="engine-tile p-8">
                    <textarea class="w-full bg-black border border-white/10 p-4 text-[10px] text-[#00f0ff] outline-none h-24 mb-6" placeholder="COMMAND THE SPECTRUM..."></textarea>
                    <button onclick="ignite()" class="w-full py-6 glow-btn extraordinary text-[10px] uppercase">Ignite Spectrum Drill</button>
                </div>
            </div>

            <div class="col-span-8">
                <div class="engine-tile h-[640px] flex items-center justify-center overflow-hidden">
                    <div id="idle" class="extraordinary text-[11px] opacity-10 tracking-[3em] animate-pulse">AWAITING INPUT</div>
                    <div id="output" class="hidden w-full h-full relative">
                        <img src="https://via.placeholder.com/1200x800/050505/ffcc00?text=9D+SPECTRUM+RENDER" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                        <div class="absolute bottom-12 left-12">
                            <h2 class="extraordinary text-3xl italic text-[#ffcc00]">RENDER_MANIFEST_FLOW</h2>
                            <p class="text-[9px] opacity-50 tracking-[1em] mt-4 uppercase">Black Wallstreet Liquid Lounge Series</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function initVoid() {
            const v = document.getElementById('live-void');
            for(let i=0; i<60; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                p.style.width = p.style.height = Math.random() * 5 + "px";
                p.style.left = Math.random() * 100 + "vw";
                p.style.animationDelay = Math.random() * 5 + "s";
                p.style.animationDuration = (Math.random() * 10 + 8) + "s";
                v.appendChild(p);
            }
        }
        function ignite() {
            document.getElementById('shutter').classList.add('active');
            setTimeout(() => {
                document.getElementById('idle').classList.add('hidden');
                document.getElementById('output').classList.remove('hidden');
                document.getElementById('shutter').classList.remove('active');
            }, 2000);
        }
    </script>
</body>
</html>
