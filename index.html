<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { cursor: none !important; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; transition: filter 0.1s ease; }
        
        /* VIDEO ENGINE WITH DYNAMIC DISTORTION */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            transition: transform 0.1s ease-out; /* Smooth snap-back */
        }
        #bg-video {
            width: 100%; height: 100%;
            filter: brightness(0.25) contrast(1.2);
            object-fit: cover;
        }

        /* PIXEL & X-RAY BURST */
        #pixel-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none; opacity: 0;
            transition: opacity 0.05s;
        }
        .burst-active #pixel-layer { opacity: 1; backdrop-filter: contrast(150%) blur(2px); }
        .burst-active { filter: invert(1) hue-rotate(180deg); }

        /* RETICLE */
        #cursor {
            position: fixed; width: 30px; height: 30px; border: 1px solid #06b6d4;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;
        }
        #cursor::before { content: ''; position: absolute; width: 1px; height: 100%; background: #06b6d4; }
        #cursor::after { content: ''; position: absolute; width: 100%; height: 1px; background: #06b6d4; }

        /* SCANNER */
        #scanner {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: #06b6d4; box-shadow: 0 0 20px #06b6d4; z-index: 50;
            pointer-events: none;
        }

        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.3); }
        .signature-i { text-transform: none !important; color: #06b6d4; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #06b6d4; } 50% { opacity: 0.4; } }
    </style>
</head>
<body id="main-body" class="flex flex-col items-center justify-center min-h-screen">

    <div id="cursor"></div>
    <div id="pixel-layer"></div>
    <div id="scanner"></div>
    
    <div id="video-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="8776550e6409b36ed5834f6e6b473a9b.mp4" type="video/mp4">
        </video>
    </div>

    <header id="main-header" class="absolute top-10 text-center w-full z-20">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter">
            KNOCKSSTUD<span class="signature-i">i</span>OS
        </h1>
    </header>

    <main id="ui-container" class="flex flex-col md:flex-row gap-8 z-10 p-6 w-full max-w-4xl mt-12">
        <div class="glass-panel flex-1 p-10 rounded-sm">
            <h2 class="text-cyan-500 text-xl font-bold mb-6 border-b border-cyan-900 pb-2 uppercase italic">Sync Operator</h2>
            <form id="login-form" class="space-y-6">
                <input type="text" placeholder="ID_REF" class="w-full bg-black/60 border border-zinc-800 p-4 text-sm uppercase text-white outline-none focus:border-cyan-500">
                <button type="submit" class="w-full bg-cyan-800 hover:bg-cyan-500 py-4 font-black uppercase tracking-widest text-sm transition-all">Initialize</button>
            </form>
        </div>
        <div class="glass-panel flex-1 p-10 rounded-sm border-zinc-800">
            <h2 class="text-zinc-500 text-xl font-bold mb-6 border-b border-zinc-800 pb-2 uppercase italic">Protocol</h2>
            <button class="w-full border border-zinc-700 hover:bg-white hover:text-black py-4 font-black uppercase tracking-widest text-sm transition-all">Request Access</button>
        </div>
    </main>

    <footer class="absolute bottom-6 w-full px-12 flex justify-between text-[10px] text-zinc-600 uppercase tracking-widest">
        <div>CORE_VELOCITY: <span id="vel-meter" class="text-cyan-700 font-bold">0.00</span></div>
        <div class="italic">© 2026 KNOCKSSTUD<span class="signature-i">i</span>OS</div>
    </footer>

    <script>
        const body = document.getElementById('main-body');
        const scanner = document.getElementById('scanner');
        const video = document.getElementById('bg-video');
        const videoCont = document.getElementById('video-container');
        const cursor = document.getElementById('cursor');
        const velMeter = document.getElementById('vel-meter');

        let scannerPos = 0;
        let scannerDir = 1;
        let hasFlashed = false;

        // VELOCITY TRACKING
        let lastX = 0;
        let velocity = 0;

        document.addEventListener('mousemove', (e) => {
            // Cursor position
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;

            // Calculate horizontal velocity
            velocity = e.clientX - lastX;
            lastX = e.clientX;

            // Apply Horizontal Stretch Distortion
            const skew = velocity * 0.1; // Amount of shear
            const scale = 1 + Math.abs(velocity * 0.005); // Amount of stretch
            videoCont.style.transform = `skewX(${skew}deg) scaleX(${scale})`;
            
            velMeter.innerText = Math.abs(velocity).toFixed(2);
        });

        // Reset distortion when mouse stops
        setInterval(() => {
            velocity *= 0.9; // Decay velocity
            if (Math.abs(velocity) < 0.1) {
                videoCont.style.transform = `skewX(0deg) scaleX(1)`;
                velMeter.innerText = "0.00";
            }
        }, 50);

        // SCANNER & BURST LOGIC
        function moveScanner() {
            scannerPos += (1.8 * scannerDir);
            if (scannerPos > window.innerHeight || scannerPos < 0) {
                scannerDir *= -1;
                hasFlashed = false;
            }
            scanner.style.top = `${scannerPos}px`;

            const midPoint = window.innerHeight / 2;
            if (Math.abs(scannerPos - midPoint) < 15 && !hasFlashed) {
                hasFlashed = true;
                video.pause();
                body.classList.add('burst-active');
                setTimeout(() => {
                    video.play();
                    body.classList.remove('burst-active');
                }, 150);
            }
            requestAnimationFrame(moveScanner);
        }
        moveScanner();
    </script>
</body>
</html>
