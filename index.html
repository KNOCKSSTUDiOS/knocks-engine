<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT BEYOND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --cyan: #00f0ff; --gold: #ffcc00; --magenta: #ff00ff; --deep: #050510; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- STUNNING 9D SUPERNOVA (LIVING BACKGROUND) --- */
        #visual-core {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at 50% 50%, #0a0a20 0%, #000 100%);
            overflow: hidden;
        }
        .nebula-cloud {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6;
            animation: drift 15s infinite alternate ease-in-out;
        }
        @keyframes drift { 
            0% { transform: translate(0,0) scale(1) rotate(0deg); filter: hue-rotate(0deg); }
            100% { transform: translate(150px, 80px) scale(1.8) rotate(120deg); filter: hue-rotate(90deg); }
        }

        /* --- THE LIQUID GOLD LOGO --- */
        .liquid-gold {
            font-size: clamp(30px, 5vw, 60px); font-weight: 900;
            background: linear-gradient(180deg, var(--gold) 0%, #6b8e23 50%, var(--cyan) 100%);
            background-size: 100% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(255, 204, 0, 0.7));
            animation: flow 3.5s infinite linear;
        }
        @keyframes flow { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }

        /* --- HIGH-END AUTH PORTAL (NO MORE SUCKING) --- */
        #gate { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.4); backdrop-filter: blur(80px); display: flex; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.8, 0, 0.2, 1); }
        .auth-tile { 
            width: 500px; padding: 60px; background: rgba(0,0,0,0.8); border: 1px solid var(--cyan);
            box-shadow: 0 0 100px rgba(0, 240, 255, 0.2); text-align: center;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }
        .auth-switch { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; }
        .switch-btn { font-size: 10px; cursor: pointer; opacity: 0.3; transition: 0.4s; letter-spacing: 0.3em; }
        .switch-btn.active { opacity: 1; color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        /* --- INTERFACE --- */
        #engine-room { opacity: 0; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); pointer-events: none; }
        #engine-room.active { opacity: 1; pointer-events: auto; }

        .engine-tile { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 240, 255, 0.15); backdrop-filter: blur(100px); transition: 0.6s; }
        .engine-tile:hover { border-color: var(--cyan); box-shadow: 0 0 60px rgba(0, 240, 255, 0.3); transform: translateY(-5px); }
        
        .nav-rail { width: 100px; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.9); z-index: 5000; }
        .nav-link { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 10px; letter-spacing: 1em; opacity: 0.3; cursor: pointer; transition: 0.5s; }
        .nav-link:hover, .active-nav { opacity: 1; color: var(--cyan); }

        input { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--cyan); padding: 18px; color: var(--cyan); font-size: 10px; width: 100%; margin-bottom: 25px; outline: none; transition: 0.3s; }
        input:focus { background: rgba(0, 240, 255, 0.05); border-bottom: 1px solid #fff; }

        .ignite-btn { background: var(--cyan); color: #000; font-weight: 900; letter-spacing: 0.2em; transition: 0.5s; cursor: pointer; }
        .ignite-btn:hover { background: #fff; box-shadow: 0 0 50px #fff; letter-spacing: 0.4em; }

        /* PERSISTENT AUDIO VISUALIZER */
        .bar { width: 4px; background: var(--cyan); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 5px; } to { height: 25px; } }
    </style>
</head>
