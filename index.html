<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K ULTRA | SECURE GATEWAY</title>
    <style>
        body { background: #010103; color: #00FFFF; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .login-frame { width: 380px; background: #050510; border: 2px solid #003366; padding: 40px; box-shadow: 0 0 60px #000; position: relative; border-radius: 5px; }
        .sentinel-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #002244; padding-bottom: 15px; }
        .v-logo { font-size: 50px; font-weight: 900; color: #00FFFF; text-shadow: 0 0 20px #00FFFF; margin-bottom: 10px; }
        
        /* TILES & INPUTS */
        input { width: 100%; background: #000; border: 1px solid #003366; padding: 12px; color: #00FFFF; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00FFFF; box-shadow: 0 0 10px #003366; }
        
        /* PAYMENT ARRAY */
        .payment-methods { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; border-top: 1px solid #002244; pt: 15px; }
        .pay-tile { background: #001122; border: 1px solid #003366; padding: 8px; font-size: 9px; text-align: center; color: #008888; border-radius: 3px; }
        
        /* BUTTONS */
        .btn-main { background: #00FFFF; color: #000; border: none; width: 100%; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-info { background: transparent; color: #008888; border: 1px solid #003366; width: 100%; padding: 10px; margin-top: 10px; font-size: 11px; cursor: pointer; }
        
        .status-light { width: 8px; height: 8px; background: #00FF00; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 5px #00FF00; }
    </style>
</head>
<body>

<div class="login-frame">
    <div class="sentinel-header">
        <div class="v-logo">V</div>
        <div style="font-size: 12px; letter-spacing: 3px;"><span class="status-on"></span>SENTINEL V AUTHENTICATION</div>
    </div>

    <form action="dashboard.html">
        <input type="text" placeholder="CITIZEN ID / EMAIL" required>
        <input type="password" placeholder="ENCRYPTION KEY" required>
        
        <button type="submit" class="btn-main">INITIALIZE 9K CORE</button>
    </form>

    <button class="btn-info" onclick="alert('9K ULTRA ENGINE: 15FT SENTINEL CLASS. TRADEMARK PENDING KNOCKSSTUDiOS.')">ENGINE INFORMATION [i]</button>

    <div style="font-size: 10px; margin-top: 25px; color: #004466; text-align: center;">SECURE PAYMENT CHANNELS:</div>
    <div class="payment-methods">
        <div class="pay-tile">CASHAPP</div>
        <div class="pay-tile">APPLE</div>
        <div class="pay-tile">VISA</div>
        <div class="pay-tile">BTC</div>
    </div>

    <div style="text-align: center; font-size: 9px; color: #002244; margin-top: 20px;">
        UNIQUE THEME GENERATED PER SIGN-UP<br>
        © 2026 LAB LEGENDS DIVISION
    </div>
</div>

</body>
</html>
