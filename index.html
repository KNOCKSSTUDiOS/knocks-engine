        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        #bg-video {
            position: fixed;
            right: 0;

            color: #22d3ee; 
            display: inline-block;
            animation: pulse-cyan 2s infinite ease-in-out;
        }

        /* OVERCLOCK ON HOVER */
        header:hover .signature-i {
            animation: pulse-cyan 0.2s infinite ease-in-out;
            color: #fff;
            filter: brightness(1.5);
        }

        header:hover h1 {

            transition: all 0.2s ease;
        }
    </style>
