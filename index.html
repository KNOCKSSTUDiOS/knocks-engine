<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | SOVEREIGN AUTH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        * { cursor: crosshair; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow: hidden; }

        /* THE WORKSHOP BACKGROUND */
        #bg-video-layer {
            position: fixed; inset: 0; z-index: -1;
            background: url('1773441360031.jpg') no-repeat center center;
            background-size: cover; opacity: 0.3; filter: brightness(0.6) saturate(1.5);
        }

        /* FLOATING ROBOT ASSET */
        #sentinel-vessel {
            position: absolute; width: 300px; bottom: 5%; right: 5%;
            filter: drop-shadow(0 0 25px #00f0ff);
            animation: float 4s infinite ease-in-out;
            z-index: 5;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        /* AUTH TILES & MODAL */
        .auth-tile {
            background: rgba(0,0,0,0.8); border: 2px solid #00f0ff;
            padding: 30px; width: 100%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.2);
        }
        input {
            background: rgba(255,255,255,0.05); border: 1px solid #00f0ff;
            color: #fff; padding: 12px; margin: 10px 0; width: 100%; outline: none;
        }
        .action-btn {
            background: #00f0ff; color: #000; font-weight: 900;
            width: 100%; padding: 15px; margin-top: 15px; transition: 0.3s;
        }
        .action-btn:hover { background: #fff; box-shadow: 0 0 30px #fff; }

        #modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; justify-content: center; align-items: center;
        }

        .brand-header { font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; letter-spacing: -2px; }
    </style>
</head>
<body>

    <div id="bg-video-layer"></div>
    <img src="image.png" id="sentinel-vessel" alt="VALERIUS">

    <nav class="fixed top-0 w-full p-6 flex justify-end gap-4 z-50">
        <button onclick="toggleAuth('signin')" class="border-2 border-[#00f0ff] px-8 py-2 text-[#00f0ff] font-bold hover:bg-[#00f0ff] hover:text-black transition">SIGN IN</button>
        <button onclick="toggleAuth('signup')" class="bg-[#00f0ff] text-black px-8 py-2 font-bold hover:bg-white transition">SIGN UP</button>
    </nav>
