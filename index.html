<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSCREATIVESTUDiOS 9K ™</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; color: white; }
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        #ai-box { background: rgba(0, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 20px; padding: 25px; border: 1px solid #32CD32; display: none; text-align: center; max-width: 400px; box-shadow: 0 0 30px rgba(50, 205, 50, 0.2); }
        button { background: linear-gradient(90deg, #32CD32, #00FFFF); color: black; border: none; padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px #00FFFF; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="ai-box"></div>
        <button onclick="showPoem()">✨ 9K Vision ™</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, text1, text2, atoms;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const g1 = new THREE.TextGeometry('KNOCKS ™', { font, size: 0.6, height: 0.2 });
                g1.center();
                text1 = new THREE.Mesh(g1, new THREE.MeshPhongMaterial({ color: 0x32CD32, shininess: 100 }));
                scene.add(text1);
                
                const g2 = new THREE.TextGeometry('CREATIVESTUDiOS', { font, size: 0.25, height: 0.1 });
                g2.center();
                text2 = new THREE.Mesh(g2, new THREE.MeshPhongMaterial({ color: 0xFF0800 }));
                text2.position.y = -0.7;
                scene.add(text2);
            });

            const pG = new THREE.BufferGeometry();
            const pP = new Float32Array(1000 * 3);
            for(let i=0; i<3000; i++) pP[i] = (Math.random()-0.5) * 15;
            pG.setAttribute('position', new THREE.BufferAttribute(pP, 3));
            atoms = new THREE.Points(pG, new THREE.PointsMaterial({ color: 0x00FFFF, size: 0.03 }));
            scene.add(atoms);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        }
        function showPoem() {
            const b = document.getElementById('ai-box');
            b.style.display = 'block';
            b.innerText = "Metal molds and colors bloom,\nLighting up the digital room.\n9K shine and jungle soul,\nKnocks Engine takes control! ™";
        }
        function animate() {
            requestAnimationFrame(animate);
            if(text1) text1.rotation.y += 0.01;
            if(atoms) atoms.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
