<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNOCKSSTUDiOS | LIVE GATE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Courier New', monospace; }
        
        /* THE ELECTRIC COSMOS */
        .cosmos-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        /* THE SIGNATURE RIM (VARIETY OF COLORS) */
        .cosmic-rim {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 4px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        conic-gradient(#00f2ff, #ff00ff, #ffd700, #00f2ff) border-box;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.4), inset 0 0 50px rgba(0, 242, 255, 0.2);
            animation: rotateRim 10s linear infinite;
            z-index: 2;
        }

        @keyframes rotateRim { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* THE SIGNATURE BRANDING */
        .signature-brand {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; letter-spacing: 15px;
            z-index: 10; pointer-events: none;
            background: linear-gradient(90deg, #fff, #00f2ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.8));
        }

        /* ELECTRIC SCANNER WAVE */
        .electric-wave {
            position: absolute; top: 50%; width: 100%; height: 2px;
            background: cyan; box-shadow: 0 0 20px cyan, 0 0 40px blue;
            z-index: 15; opacity: 0.5;
            animation: waveScan 4s infinite ease-in-out;
        }
        @keyframes waveScan { 0%, 100% { transform: translateY(-150px); opacity: 0.2; } 50% { transform: translateY(150px); opacity: 0.8; } }

        /* NAVIGATION */
        .ui-nav { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; }
        .btn { 
            padding: 15px 40px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; color: #00f2ff; 
            text-transform: uppercase; letter-spacing: 4px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 40px #00f2ff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="cosmos-bg"></div>
    <div class="cosmic-rim"></div>
    <div class="electric-wave"></div>

    <div class="signature-brand">KNOCKSSTUDiOS</div>

    <div class="ui-nav">
        <div class="btn" onclick="activateSystem()">Login</div>
        <div class="btn" onclick="activateSystem()">Sign Up</div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSwordWhoosh() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function playBackgroundMusic() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(60, audioCtx.currentTime);
            g.gain.setValueAtTime(0.03, audioCtx.currentTime);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start();
        }

        let activated = false;
        function activateSystem() {
            if (!activated) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playBackgroundMusic();
                activated = true;
            }
            playSwordWhoosh();
            alert("SYSTEM SCANNING: KNOCKSSTUDiOS AUTHORIZATION REQUIRED");
        }
    </script>
</body>
</html>
