<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS | OMNIPOTENT LIVE CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --neon: #00f0ff; --gold: #ffcc00; --olive: #6b8e23; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }
        .extraordinary { font-family: 'Syncopate', sans-serif; }

        /* 9D ANIMATED VOID */
        #live-void { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.1; animation: float 15s infinite linear; }
        @keyframes float { from { transform: translateY(105vh); } to { transform: translateY(-5vh); } }

        /* AUTH GATE */
        #auth-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        .auth-box { width: 420px; padding: 50px; border: 1px solid rgba(255, 204, 0, 0.1); background: #050505; text-align: center; }

        /* LIQUID TYPOGRAPHY */
        .liquid-text {
            font-size: 45px; font-weight: 900; background: linear-gradient(to bottom, var(--gold), var(--olive));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,204,0,0.3)); animation: drip 4s infinite ease-in-out;
        }
        @keyframes drip { 0%, 100% { transform: scale(1); filter: hue-rotate(0deg); } 50% { transform: scale(1.02); filter: hue-rotate(10deg); } }

        /* GHOST GEMS */
        .ghost-gem { position: absolute; width: 15px; height: 15px; background: transparent; border: 1px solid transparent; cursor: pointer; z-index: 100; transition: 0.3s; }
        .ghost-gem:hover { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* INTERFACE & NAV */
        #main-interface { display: none; padding-left: 120px; padding-right: 40px; padding-top: 60px; height: 100vh; overflow-y: auto; }
        .nav-rail { height: 100vh; width: 90px; position: fixed; left: 0; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 40px; z-index: 1000; background: #000; }
        .nav-item { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 9px; letter-spacing: 0.8em; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .nav-item:hover, .active-nav { opacity: 1; color: var(--neon); }

        .page-node { display: none; }
        .page-node.active { display: block; }

        /* INPUTS */
        .vault-input { background: #000; border: 1px solid #222; padding: 15px; color: var(--neon); width: 100%; font-size: 10px; margin-bottom: 20px; outline: none; }
        .engine-tile { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }

        #shutter { position: fixed; inset: 0; background: #000; z-index: 10000; transform: scaleY(0); transition: 0.6s cubic-bezier(1,0,0,1); display: flex; align-items: center; justify-content: center; }
        #shutter.active { transform: scaleY(1); }
    </style>
</head>
