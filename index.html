<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS STUDiOS | ASCENSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;900&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }
        .neon-i { text-transform: none; color: #00f0ff; text-shadow: 0 0 25px #00f0ff; font-weight: 900; }
        
        /* --- ATMOSPHERIC FX --- */
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); z-index: -1; }
        .scanline { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0, 240, 255, 0.02) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }

        /* --- THE JUMP TRANSITION --- */
        #shutter {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #shutter.active { transform: translateY(0); }

        /* --- NODES --- */
        .page-node { position: absolute; inset: 0; display: none; overflow-y: auto; padding: 120px 20px; }
        .page-node.active { display: block; animation: ascension 0.8s ease-out; }
        @keyframes ascension { from { opacity: 0; transform: translateY(50px) scale(0.95); filter: blur(20px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

        /* --- GLORIFIED UI --- */
        .glorified-card { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); transition: 0.5s; cursor: pointer; border-radius: 4px;
        }
        .glorified-card:hover { border-color: #00f0ff; box-shadow: 0 0 40px rgba(0,240,255,0.1); transform: scale(1.01); }
        
        /* Intensity Slider */
        input[type=range] { -webkit-appearance: none; background: #111; height: 4px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #00f0ff; cursor: pointer; box-shadow: 0 0 10px #00f0ff; }

        .vault-input { background: #000; border: 1px solid #222; padding: 20px; color: #00f0ff; font-family: 'Orbitron'; outline: none; width: 100%; font-size: 12px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="scanline"></div>
    <div id="shutter"><h2 class="knocks-font text-3xl italic tracking-[1em] text-[#00f0ff] animate-pulse">KNOCKS STUDiOS</h2></div>

    <header class="fixed top-0 w-full p-8 flex justify-between items-center z-50 bg
