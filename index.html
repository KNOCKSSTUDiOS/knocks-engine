<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K REALITY | KNOCKSSTUDiOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow-x: hidden; }
        
        /* 1. HUD & VIDEO SECTION */
        #splash { position: fixed; inset: 0; z-index: 50; background: #000; transition: opacity 1s ease; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        
        .hud-mask { 
            position: absolute; bottom: 30px; right: 30px; 
            width: 320px; padding: 25px; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-right: 3px solid #00f0ff; z-index: 60;
        }

        #buffer-fill { width: 0%; height: 2px; background: #00f0ff; box-shadow: 0 0 15px #00f0ff; transition: width 0.1s linear; }

        /* 2. THE VAULT DROP (THE LAYER THAT WAS FREEZING YOU) */
        #vault-drop { 
            position: fixed; inset: 0; z-index: 100; 
            background: rgba(0,0,0,0.95); 
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.5s, visibility 0.5s;
        }

        #vault-drop.active { opacity: 1; visibility: visible; pointer-events: auto; }

        .coin-particle { position: absolute; width: 4px; height: 4px; background: #ffcc00; box-shadow: 0 0 10px #ffcc00; border-radius: 50%; }

        /* 3. UI STYLING */
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .all-caps { text-transform: uppercase !important; letter-spacing: 0.2em; }
    </style>
</head>
<body>

    <div id="splash">
        <video id="intro-vid" autoplay muted playsinline>
            <source src="sora-s_69b5fccd173481919d3a27e7fff21aaf.mp4" type="video/mp4">
        </video>
        
        <div class="hud-mask">
            <div class="flex justify-between items-center text-[9px] font-black text-[#00f0ff] all-caps">
                <span>9K_BUFFER_SYNC</span>

            <div class="w-full bg-white/10 h-[2px] mt-3"><div id="buffer-fill"></div></div>

    <div id="vault-drop">

        <h1 class="text-7xl md:text-[11rem] font-black italic uppercase tracking-tighter mb-20 leading-none text-center">9K REALITY</h1>

            <div onclick="openAuth('SIGN UP')" class="glass p-16 hover:border-[#00f0ff] transition-all cursor-pointer group">
