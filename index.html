        #canvas-bg { position: fixed; inset: 0; z-index: 1; }
        .eye-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .plasma-rim { width: 380px; height: 380px; border-radius: 50%; padding: 4px; background: conic-gradient(from 0deg, #00f2ff, #ff00ff, #ffd700, #00f2ff); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; animation: spin 4s linear infinite; }
        .core-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #fff; border-radius: 50%; box-shadow: 0 0 60px #fff, 0 0 120px #00f2ff; animation: pulse 2s infinite alternate; }
        .brand { position: absolute; top: 50%; width: 100%; text-align: center; transform: translateY(-50%); font-size: 3.5rem; font-weight: 900; letter-spacing: 15px; z-index: 10; text-transform: none; text-shadow: 0 0 30px #00f2ff; pointer-events: none; }

        .btn { padding: 20px 60px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold; cursor: pointer; letter-spacing: 5px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { scale: 0.9; } to { scale: 1.1; } }
    </style>

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2; ctx.beginPath();
            let t = Date.now() * 0.002;
            for(let x=0; x<canvas.width; x+=10) {
                let y = (canvas.height/2) + Math.sin(x*0.01 + t)*80;
                ctx.lineTo(x, y);
            }
            ctx.stroke(); requestAnimationFrame(animate);
        }
        animate();

            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
