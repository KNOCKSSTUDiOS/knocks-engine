<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K REALITY | KNOCKSSTUDiOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow-x: hidden; }
        
        /* 1. INTRO & HUD MASK (Z-INDEX 50) */
        #splash { position: fixed; inset: 0; z-index: 50; background: #000; transition: opacity 1s ease; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        
        .hud-mask { 
            position: absolute; bottom: 30px; right: 30px; 
            width: 320px; padding: 25px; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-right: 3px solid #00f0ff; z-index: 60;
        }

        #buffer-fill { width: 0%; height: 2px; background: #00f0ff; box-shadow: 0 0 15px #00f0ff; }

        /* 2. THE TILES (Z-INDEX 100 - ALWAYS ON TOP) */
        #main-ui { position: relative; z-index: 100; opacity: 0; transition: opacity 1s ease; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        .auth-tile { transition: all 0.3s ease; cursor: pointer; position: relative; z-index: 110; }
        .auth-tile:hover { transform: scale(1.02); border-color: #00f0ff; background: rgba(0,240,255,0.05); }

        /* 3. VAULT DROP (Z-INDEX 2000 - ONLY APPEARS ON SUCCESS) */
        #vault-drop { 
            position: fixed; inset: 0; z-index: 2000; 
            background: rgba(0,0,0,0.98); 
            display: none; align-items: center; justify-content: center;
        }

        .coin-particle { position: absolute; width: 4px; height: 4px; background: #ffcc00; border-radius: 50%; }
        .all-caps { text-transform: uppercase !important; letter-spacing: 0.3em; font-weight: 900; }
    </style>
</head>
<body>

    <div id="splash">
        <video id="intro-vid" autoplay muted playsinline>
            <source src="sora-s_69b5fccd173481919d3a27e7fff21aaf.mp4" type="video/mp4">
        </video>
        <div class="hud-mask">
            <div class="flex justify-between items-center text-[9px] text-[#00f0ff] all-caps">
                <span>9K_BUFFER_SYNC</span>
                <span id="percent">0%</span>
            </div>
            <div class="w-full bg-white/10 h-[2px] mt-3"><div id="buffer-fill"></div></div>
        </div>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <h1 class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter opacity-70">KNOCKSSTUDiOS</h1>
        </div>
    </div>

    <div id="vault-drop">
        <div id="emitter" class="relative text-center">
            <div id="counter" class="text-[12rem] font-black italic text-[#ffcc00] tracking-tighter leading-none">0</div>
            <p class="text-[12px] tracking-[1.5em] uppercase text-[#ffcc00] font-black mt-4">COINS SYNCED</p>
        </div>
    </div>

    <main id="main-ui" class="min-h-screen flex flex-col items-center justify-center px-6">
        
        <nav class="fixed top-0 w-full p-10 flex justify-between items-center pointer-events-none">
            <div class="font-black italic text-3xl tracking-tighter pointer-events-auto">KNOCKSSTUDiOS</div>
            <div class="text-[10px] opacity-30 all-caps font-bold">HOLLYWOODIMAGING.STUDIO</div>
        </nav>

        <h1 class="text-7xl md:text-[10rem] font-black italic uppercase tracking-tighter mb-20 leading-none text-center">9K REALITY</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-5xl">
            
            <div onclick="openAuth('SIGN UP')" class="auth-tile glass p-16">
                <h3 class="text-[#00f0ff] text-[10px] all-caps mb-4">NEW IDENTITY</h3>
                <h2 class="text-6xl font-black italic all-caps tracking-widest">SIGN UP</h2>
                <p class="text-[10px] opacity-20 mt-6 all-caps">CLAIM 2,000 BASE STACK</p>
            </div>

            <div onclick="openAuth('SIGN IN')" class="auth-tile glass p-16">
                <h3 class="text-[#ffcc00] text-[10px] all-caps mb-4">TITAN ACCESS</h3>
                <h2 class="text-6xl font-black italic all-caps tracking-widest">SIGN IN</h2>
                <p class="text-[10px] opacity-20 mt-6 all-caps">ENGINE START</p>
            </div>

        </div>
    </main>

    <div id="auth-gate" class="fixed inset-0 z-[3000] bg-black/95 flex items-center justify-center hidden">
        <div class="w-full max-w-md p-10 text-center">
            <h2 id="gate-title" class="text-6xl font-black italic all-caps mb-8">ACCESS</h2>
            <input type="email" id="email" placeholder="EMAIL" class="w-full bg-white/5 border border-white/10 p-5 text-xs all-caps outline-none focus:border-[#00f0ff] mb-4">
            <button onclick="confirm()" class="w-full bg-white text-black py-5 font-black all-caps text-xs tracking-widest">INITIALIZE</button>
            <button onclick="document.getElementById('auth-gate').classList.add('hidden')" class="mt-6 text-[8px] opacity-30 all-caps underline">Cancel</button>
        </div>
    </div>

    <script>
        const vid = document.getElementById('intro-vid');
        const fill = document.getElementById('buffer-fill');
        const percent = document.getElementById('percent');

        vid.ontimeupdate = () => {
            const p = (vid.currentTime / vid.duration) * 100;
            fill.style.width = p + "%";
            percent.innerText = Math.floor(p) + "%";
        };

        vid.onended = () => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-ui').style.opacity = '1';
            }, 1000);
        };

        function openAuth(type) {
            document.getElementById('gate-title').innerText = type;
            document.getElementById('auth-gate').classList.remove('hidden');
        }

        function confirm() {
            document.getElementById('auth-gate').classList.add('hidden');
            triggerVault();
        }

        function triggerVault() {
            const drop = document.getElementById('vault-drop');
            const counter = document.getElementById('counter');
            drop.style.display = 'flex';
            
            let count = 0;
            const startTime = performance.now();

            function update(t) {
                const progress = Math.min((t - startTime) / 2000, 1);
                counter.innerText = Math.floor(progress * 2000).toLocaleString();
                if (progress < 1) requestAnimationFrame(update);
                else {
                    setTimeout(() => { drop.style.display = 'none'; }, 1500);
                }
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
