<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K REALITY | KNOCKSSTUDiOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; margin: 0; overflow-x: hidden; }
        .all-caps { text-transform: uppercase !important; letter-spacing: 0.3em; font-weight: 900; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* FORCE VISIBILITY ON START */
        #main-ui { display: flex; opacity: 1; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        
        #splash { position: fixed; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }

        #vault-drop { position: fixed; inset: 0; z-index: 1000; background: #000; display: none; align-items: center; justify-content: center; }
        #engine-room { display: none; min-height: 100vh; width: 100%; background: #000; position: relative; z-index: 100; flex-direction: column; p: 40px; }
        
        .auth-tile { transition: 0.3s; cursor: pointer; }
        .auth-tile:hover { border-color: #00f0ff; background: rgba(0,240,255,0.05); }
    </style>
</head>
<body>

    <div id="splash">
        <video autoplay muted loop playsinline>
            <source src="sora-s_69b5fccd173481919d3a27e7fff21aaf.mp4" type="video/mp4">
        </video>
    </div>

    <main id="main-ui">
        <h1 class="text-6xl md:text-[9rem] font-black italic uppercase tracking-tighter mb-16 text-center">9K REALITY</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl px-6">
            <div onclick="openGate('SIGN UP')" class="glass p-12 auth-tile">
                <h2 class="text-4xl font-black italic all-caps">SIGN UP</h2>
                <p class="text-[10px] opacity-30 mt-4 all-caps">+2,000 COINS INITIALIZATION</p>
            </div>
            <div onclick="openGate('SIGN IN')" class="glass p-12 auth-tile border-white/20">
                <h2 class="text-4xl font-black italic all-caps">SIGN IN</h2>
                <p class="text-[10px] opacity-30 mt-4 all-caps">RESUME ENGINE COMMAND</p>
            </div>
        </div>
    </main>

    <div id="vault-drop">
        <div class="text-center">
            <div id="counter" class="text-[10rem] font-black italic text-[#ffcc00] tracking-tighter">0</div>
            <p class="all-caps text-[#ffcc00] text-sm tracking-[1em]">VAULT SYNCING...</p>
        </div>
    </div>

    <section id="engine-room" class="p-10">
        <div class="flex justify-between items-center mb-10 w-full">
            <h2 class="text-3xl font-black italic all-caps">COMMAND CENTER</h2>
            <div class="glass p-4"><p class="text-2xl font-black text-[#ffcc00]">2,000c</p></div>
        </div>
        <div class="flex-grow flex items-center justify-center">
            <div class="glass p-20 border-dashed border-2 border-white/10 w-full max-w-4xl text-center cursor-pointer hover:bg-white/5" onclick="alert('Engine Primed. Ready for Asset.')">
                <p class="text-4xl mb-4">↑</p>
                <h3 class="text-2xl font-black all-caps">UPLOAD FOR 9K RENDER</h3>
            </div>
        </div>
    </section>

    <div id="auth-modal" class="fixed inset-0 z-[2000] bg-black/95 flex items-center justify-center hidden">
        <div class="glass p-10 w-full max-w-md text-center">
            <h2 id="modal-title" class="text-4xl font-black italic all-caps mb-8">ACCESS</h2>
            <input type="email" placeholder="EMAIL" class="w-full bg-white/5 border border-white/10 p-4 all-caps mb-4 outline-none">
            <button onclick="startSync()" class="w-full bg-white text-black py-4 font-black all-caps">CONNECT</button>
        </div>
    </div>

    <script>
        function openGate(title) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('auth-modal').classList.remove('hidden');
        }

        function startSync() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('main-ui').style.display = 'none';
            const vault = document.getElementById('vault-drop');
            vault.style.display = 'flex';
            
            let start = performance.now();
            function run(t) {
                const prog = Math.min((t - start) / 2000, 1);
                document.getElementById('counter').innerText = Math.floor(prog * 2000);
                if (prog < 1) requestAnimationFrame(run);
                else {
                    setTimeout(() => {
                        vault.style.display = 'none';
                        const room = document.getElementById('engine-room');
                        room.style.display = 'flex';
                    }, 1000);
                }
            }
            requestAnimationFrame(run);
        }
    </script>
</body>
</html>
