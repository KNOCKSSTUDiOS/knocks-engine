<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        :root { --cyan: #00f0ff; --gold: #ffcc00; --panel-bg: rgba(15, 15, 20, 0.95); }
        body { background: #050508; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- VIVID ENGINE BACKGROUND --- */
        #visual-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #050508 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.6; animation: drift 20s infinite alternate ease-in-out; }
        @keyframes drift { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.5) translate(10%, 10%); } }

        /* --- KLING-STYLE SIDEBAR --- */
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 40px; z-index: 100; }
        .side-icon { opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .side-icon:hover, .side-active { opacity: 1; color: var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }

        /* --- TOOL CARDS (Mirroring Studio AI) --- */
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .tool-card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .tool-card:hover { border-color: var(--cyan); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,240,255,0.1); }
        .preview-box { height: 180px; background: #1a1a1a; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .tool-card:hover img { opacity: 1; transform: scale(1.05); }

        /* --- OVERCLOCK SYSTEM --- */
        .drill-btn { border: 1px solid #333; padding: 10px 20px; font-size: 10px; transition: 0.3s; cursor: pointer; }
        .drill-btn.active { background: var(--cyan); color: #000; font-weight: 900; border-color: #fff; box-shadow: 0 0 20px var(--cyan); }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        .overclock-active { animation: shake 0.1s infinite; }

        /* --- SENTINEL ROBOTS --- */
        .sentinel { position: fixed; width: 50px; height: 50px; background: var(--cyan); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); opacity: 0; transition: 1s; z-index: 200; pointer-events: none; }
    </style>
</head>
<body onload="launch()">

    <div id="visual-core"></div>
    <div id="sentinel-left" class="sentinel"></div>
    <div id="sentinel-right" class="sentinel"></div>

    <nav class="sidebar">
        <div class="side-icon side-active">🏠</div>
        <div class="side-icon">🖼️</div>
        <div class="side-icon">🎥</div>
        <div class="side-icon">⚙️</div>
    </nav>

    <main class="pl-[100px] pr-8 pt-8">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 id="main-logo" class="extraordinary text-3xl tracking-tighter text-white">KNOCKSSTUDiOS</h1>
                <p class="text-[9px] opacity-40 knocks-font tracking-[0.4em] mt-1">POWERED BY AI LAB LEGENDS</p>
            </div>
            <div class="flex gap-2">
                <div class="drill-btn knocks-font" onclick="setMode(this, 1)">1X</div>
                <div class="drill-btn knocks-font" onclick="setMode(this, 2)">2X</div>
                <div class="drill-btn knocks-font active" onclick="setMode(this, 4)">4X</div>
            </div>
        </header>

        <h2 class="extraordinary text-[10px] mb-6 opacity-60">SELECT ENGINE MODULE</h2>
        <div class="tool-grid">
            <div class="tool-card" onclick="alert('Module Initializing...')">
                <div class="preview-box"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400" alt="Editor"></div>
                <div class="p-5">
                    <h3 class="extraordinary text-[11px] text-cyan-400 mb-1">AI IMAGE EDITOR</h3>
                    <p class="text-[9px] opacity-50 uppercase">Upload and refine asset cores</p>
                </div>
            </div>
            <div class="tool-card" onclick="alert('Generator Ready.')">
                <div class="preview-box"><img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=400" alt="Generator"></div>
                <div class="p-5">
                    <h3 class="extraordinary text-[11px] text-gold-400 mb-1">AI IMAGE GENERATOR</h3>
                    <p class="text-[9px] opacity-50 uppercase">Manifest concepts from void</p>
                </div>
            </div>
            <div class="tool-card" onclick="alert('Upscaler Calibrated.')">
                <div class="preview-box"><img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=400" alt="Upscaler"></div>
                <div class="p-5">
                    <h3 class="extraordinary text-[11px] text-magenta-400 mb-1">IMAGE UPSCALER</h3>
                    <p class="text-[9px] opacity-50 uppercase">Push quality to 9K Reality</p>
                </div>
            </div>
        </div>

        <section class="mt-16">
            <div class="flex justify-between items-end mb-6">
                <h2 class="extraordinary text-[10px] opacity-60">RECENT GENERATIONS</h2>
                <div class="text-[8px] text-cyan-400 knocks-font">VIEW ALL ASSETS →</div>
            </div>
            <div class="grid grid-cols-4 gap-4">
                <div class="aspect-video bg-white/5 border border-white/5 hover:border-cyan-400/50 transition-all cursor-pointer"></div>
                <div class="aspect-video bg-white/5 border border-white/5 hover:border-cyan-400/50 transition-all cursor-pointer"></div>
                <div class="aspect-video bg-white/5 border border-white/5 hover:border-cyan-400/50 transition-all cursor-pointer"></div>
                <div class="aspect-video bg-white/5 border border-white/5 hover:border-cyan-400/50 transition-all cursor-pointer"></div>
            </div>
        </section>
    </main>

    <script>
        function launch() {
            const core = document.getElementById('visual-core');
            const colors = ['#00f0ff', '#ff00ff', '#ffcc00'];
            for(let i=0; i<8; i++) {
                const n = document.createElement('div');
                n.className = 'nebula';
                n.style.width = n.style.height = '700px';
                n.style.background = colors[i % 3];
                n.style.left = Math.random() * 100 + '%';
                n.style.top = Math.random() * 100 + '%';
                n.style.animationDelay = (i * -2) + 's';
                core.appendChild(n);
            }
            setMode(document.querySelectorAll('.drill-btn')[2], 4);
        }

        function setMode(el, val) {
            document.querySelectorAll('.drill-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const logo = document.getElementById('main-logo');
            const sL = document.getElementById('sentinel-left');
            const sR = document.getElementById('sentinel-right');

            if(val === 4) {
                logo.classList.add('overclock-active');
                sL.style.opacity = "1"; sL.style.left = "90px"; sL.style.top = "40px";
                sR.style.opacity = "1"; sR.style.right = "40px"; sR.style.bottom = "40px";
            } else {
                logo.classList.remove('overclock-active');
                sL.style.opacity = "0"; sR.style.opacity = "0";
            }
        }
    </script>
</body>
</html>
