<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT 4D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; perspective: 1200px; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- THE CHAMELEON WORM HEADER --- */
        .chameleon-header {
            font-size: clamp(2rem, 8vw, 5rem); letter-spacing: -4px; position: relative; display: inline-block;
            background: linear-gradient(90deg, #ff0000, #ff6b00, #00ff88, #00f0ff, #bf00ff);
            background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: worm 5s linear infinite, typewriter 3s steps(14) forwards;
            white-space: nowrap; overflow: hidden;
        }
        @keyframes worm { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes typewriter { from { width: 0; } to { width: 100%; } }

        .chameleon-header::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-30deg); animation: swish 4s infinite ease-in-out;
        }
        @keyframes swish { 0% { left: -100%; } 25% { left: 150%; } 100% { left: 150%; } }

        /* --- 4D TILES & BROADCAST MODULE --- */
        .tool-card-4d, .broadcast-module { 
            background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px;
            transform-style: preserve-3d; transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); position: relative;
        }
        .tool-card-4d { height: 300px; padding: 40px; display: flex; flex-direction: column; justify-content: flex-end; cursor: pointer; }
        .tool-card-4d:hover { transform: translateZ(50px) rotateX(4deg); border-color: rgba(255,255,255,0.4); }

        .broadcast-module { padding: 15px; width: 350px; border-color: rgba(0, 240, 255, 0.2); }
        
        .bevel { position: absolute; bottom: 0; left: 0; height: 6px; width: 100%; border-radius: 0 0 4px 4px; }
        
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; padding-top: 40px; gap: 40px; }

        /* KILL SWITCH STYLING */
        .kill-switch { 
            cursor: pointer; font-size: 8px; color: #ff0000; border: 1px solid #ff0000; 
            padding: 8px 5px; border-radius: 2px; transition: 0.3s; text-align: center; width: 60px;
        }
        .kill-switch.active { color: #00f0ff; border-color: #00f0ff; box-shadow: 0 0 10px #00f0ff; }
    </style>
</head>
