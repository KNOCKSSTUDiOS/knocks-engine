<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        /* HIDE DEFAULT CURSOR */
        * { cursor: none !important; }
        
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        /* RETICLE CURSOR */
        #cursor {
            position: fixed;
            width: 20px; height: 20px;
            border: 1px solid #06b6d4;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
            display: flex;
            align-items: center; justify-content: center;
        }
        #cursor::after { content: ''; width: 2px; height: 2px; background: #06b6d4; border-radius: 50%; }
        
        /* CURSOR HOVER STATE */
        .cursor-hover { width: 45px !important; height: 45px !important; background: rgba(6, 182, 212, 0.1); border: 2px solid #22d3ee !important; box-shadow: 0 0 15px #22d3ee; }

        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: brightness(0.25) contrast(1.1);
            object-fit: cover;
            transition: filter 0.5s ease;
        }

        #clock { position: fixed; top: 2.5rem; right: 3rem; color: #06b6d4; font-size: 0.75rem; letter-spacing: 0.3em; z-index: 60; text-shadow: 0 0 10px #06b6d4; }

        #scanner { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); box-shadow: 0 0 15px #06b6d4; z-index: 50; pointer-events: none; animation: sweep 4s infinite linear; }
        @keyframes sweep { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .scanner-breach { background: linear-gradient(90deg, transparent, #ff0055, transparent) !important; animation: sweep 1s infinite linear !important; }

        @keyframes shake { 0% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, -2px); } }
        .shaking { animation: shake 0.2s infinite; }

        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.4); transition: all 0.5s ease; }
        
        /* SIGNATURE i */
        @keyframes pulse-cyan { 0%, 100% { opacity: 1; text-shadow: 0 0 20px #22d3ee; } 50% { opacity: 0.7; text-shadow: 0 0 10px #22d3ee; } }
        .signature-i { text-transform: none !important; color: #22d3ee; display: inline-block; animation: pulse-cyan 2s infinite ease-in-out; }
        header:hover .signature-i { animation: pulse-cyan 0.1s infinite; color: #fff; filter: brightness(2); }

        .neon-btn { background: #0891b2; transition: all 0.3s ease; border: none; }
        .neon-btn:hover { background: #22d3ee; box-shadow: 0 0 25px #22d3ee; color: black; }
        
        .shattered { animation: shatter-fx 0.6s forwards ease-in; color: #ff0055 !important; }
        @keyframes shatter-fx { 0% { transform: translate(0); } 100% { transform: scale(1.1); opacity: 0; filter: blur(15px); } }
    </style>
</head>
