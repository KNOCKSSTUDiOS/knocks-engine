<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNOCKSSTUDiOS | 9K ULTRA ENGINE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Courier New', monospace; }
        
        /* THE COSMO EYE SINGULARITY */
        .eye-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        
        .plasma-rim {
            width: 400px; height: 400px; border-radius: 50%; padding: 3px;
            background: conic-gradient(from 0deg, #00f2ff, #ff00ff, #ffd700, #00f2ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; animation: spin 4s linear infinite;
        }

        .core-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 50px #fff, 0 0 100px #00f2ff, 0 0 200px #ff00ff;
            animation: pulse 2s infinite alternate;
        }

        @keyframes spin { from { rotate: 0deg; } to { rotate: 360deg; } }
        @keyframes pulse { from { scale: 0.8; opacity: 0.5; } to { scale: 1.2; opacity: 1; } }

        /* SIGNATURE BRANDING */
        .brand {
            position: absolute; top: 50%; width: 100%; text-align: center;
            transform: translateY(-50%); font-size: 3.5rem; font-weight: 900;
            letter-spacing: 20px; z-index: 10; text-transform: none;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.8); pointer-events: none;
        }

        /* NAVIGATION GATES */
        .nav-hub { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; z-index: 20; }
        .gate-btn { 
            padding: 18px 50px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; color: #00f2ff; 
            font-weight: bold; letter-spacing: 5px; cursor: pointer; transition: 0.4s;
        }
        .gate-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 50px #00f2ff; }
    </style>
</head>
<body>

    <div class="eye-wrap">
        <div class="plasma-rim"></div>
        <div class="core-glow"></div>
    </div>

    <div class="brand">KNOCKSSTUDiOS</div>

    <div class="nav-hub">
        <button class="gate-btn" onclick="activate()">LOGiN</button>
        <button class="gate-btn" onclick="activate()">SiGN UP</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function activate() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            window.location.href = "store.html";
        }
    </script>
</body>
</html>
