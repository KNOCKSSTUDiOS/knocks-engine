<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS | OMNIPOTENT APEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --cyan: #00f0ff; --gold: #ffcc00; --olive: #6b8e23; --magenta: #ff00ff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }

        /* --- THE VIVID SPECTRUM NEBULA --- */
        #nebula {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(circle at 15% 15%, rgba(0, 240, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(255, 0, 255, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 204, 0, 0.2) 0%, transparent 60%),
                #020205;
            animation: nebulaShift 8s infinite alternate ease-in-out;
        }
        @keyframes nebulaShift { from { filter: hue-rotate(0deg) brightness(1.2); } to { filter: hue-rotate(180deg) brightness(1.5); } }

        /* --- SIGN IN / CREATE ACCOUNT TILES --- */
        #auth-gate { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .auth-card { width: 450px; padding: 50px; border: 1px solid var(--gold); background: #050505; text-align: center; box-shadow: 0 0 60px rgba(255, 204, 0, 0.15); }
        .auth-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .auth-tab { font-size: 10px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .auth-tab.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; }

        .glow-input { background: #000; border: 1px solid #222; padding: 15px; color: var(--cyan); outline: none; width: 100%; font-size: 10px; margin-bottom: 20px; transition: 0.3s; }
        .glow-input:focus { border-color: var(--gold); }
        .ignite-btn { background: var(--cyan); color: #000; font-weight: 900; cursor: pointer; transition: 0.4s; }
        .ignite-btn:hover { background: #fff; letter-spacing: 0.2em; }

        /* --- ENGINE INTERFACE (HIDDEN UNTIL LOGIN) --- */
        #main-engine { display: none; }
        .liquid-text {
            font-size: 58px; font-weight: 900;
            background: linear-gradient(180deg, var(--gold), var(--olive), var(--cyan));
            background-size: 100% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 35px rgba(255, 204, 0, 0.6));
            animation: flowAnim 3s infinite linear;
        }
        @keyframes flowAnim { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }

        .engine-tile { background: rgba(5,5,15,0.9); border: 1px solid rgba(0, 240, 255, 0.3); backdrop-filter: blur(60px); position: relative; }
        .nav-rail { width: 90px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.95); border-right: 1px solid var(--cyan); z-index: 5000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 40px; }
        .nav-item { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 9px; letter-spacing: 0.8em; opacity: 0.3; cursor: pointer; }
        .nav-item:hover, .active-nav { opacity: 1; color: var(--cyan); }
    </style>
</head>
<body onload="initSystem()">

    <div id="nebula"></div>
    
    <audio id="core-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="auth-gate">
        <div class="auth-card">
            <div class="auth-tabs">
                <span id="tab-in" class="auth-tab active extraordinary" onclick="switchAuth('in')">SIGN IN</span>
                <span id="tab-up" class="auth-tab extraordinary" onclick="switchAuth('up')">CREATE ACCOUNT</span>
            </div>
            <h2 id="auth-header" class="knocks-font text-[9px] tracking-[1em] text-[#ffcc00] mb-8 uppercase">Initialize Driller</h2>
            <input type="text" id="u-id" placeholder="IDENTITY NAME" class="glow-input knocks-font">
            <input type="password" placeholder="ACCESS KEY" class="glow-input knocks-font">
            <button onclick="bootEngine()" class="ignite-btn w-full py-5 extraordinary text-[10px] uppercase">Initialize Core</button>
        </div>
    </div>

    <div id="main-engine">
        <div class="nav-rail">
            <div class="knocks-font text-[8px] text-[#ffcc00] mb-8" id="display-id">--</div>
            <div class="nav-item active-nav extraordinary">ENGINE</div>
            <div class="nav-item extraordinary">VAULT</div>
            <div class="nav-item extraordinary" onclick="location.reload()">OFFLINE</div>
        </div>

        <main class="pl-32 pr-10 pt-10">
            <div class="mb-14 flex justify-between items-center">
                <h1 class="liquid-text extraordinary">KNOCKSSTUDiOS</h1>
                <div class="text-[9px] knocks-font text-[#ffcc00] animate-pulse">CORE_ONLINE</div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-8">
                    <div class="engine-tile p-8">
                        <h3 class="extraordinary text-[10px] text-cyan-400 mb-6 tracking-widest">DRILL DUAL VIDEO</h3>
                        <div class="h-40 border border-dashed border-cyan-400/30 flex items-center justify-center mb-6">
                            <span class="text-[8px] knocks-font opacity-40">READY FOR SYNC...</span>
                        </div>
                        <button class="ignite-btn w-full py-6 extraordinary text-[10px] uppercase">Ignite Drill</button>
                    </div>
                </div>

                <div class="col-span-8 grid grid-cols-2 gap-8">
                    <div class="engine-tile h-[600px] flex flex-col justify-end p-8">
                        <h4 class="extraordinary text-lg mb-2">RESULT_01</h4>
                        <button class="border border-cyan-400 text-cyan-400 px-6 py-2 text-[8px] extraordinary">DOWNLOAD</button>
                    </div>
                    <div class="engine-tile h-[600px] flex flex-col justify-end p-8">
                        <h4 class="extraordinary text-lg mb-2">RESULT_02</h4>
                        <button class="border border-gold-400 text-gold-400 px-6 py-2 text-[8px] extraordinary">DOWNLOAD</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function switchAuth(mode) {
            document.getElementById('tab-in').classList.toggle('active', mode === 'in');
            document.getElementById('tab-up').classList.toggle('active', mode === 'up');
            document.getElementById('auth-header').innerText = mode === 'in' ? 'Initialize Driller' : 'Register Identity';
        }

        function bootEngine() {
            const id = document.getElementById('u-id').value;
            if(!id) return;
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('main-engine').style.display = 'block
