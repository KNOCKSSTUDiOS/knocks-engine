<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | AUTO-LAYER ENGINE</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* THE COSMO EYE & MULTi-COLOR RiM */
        #canvas-bg { position: fixed; inset: 0; z-index: 1; }
        .eye-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .plasma-rim { 
            width: 380px; height: 380px; border-radius: 50%; padding: 4px; 
            background: conic-gradient(from 0deg, #00f2ff, #ff00ff, #ffd700, #00f2ff); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            mask-composite: exclude; animation: spin 4s linear infinite; 
            filter: drop-shadow(0 0 20px #00f2ff);
        }
        .core-glow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85px; height: 85px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 60px #fff, 0 0 120px #00f2ff; animation: pulse 2s infinite alternate; 
        }

        /* SiGNATURE BRANDiNG */
        .brand { 
            position: absolute; top: 50%; width: 100%; text-align: center; transform: translateY(-50%); 
            font-size: clamp(1.5rem, 8vw, 3.8rem); font-weight: 900; letter-spacing: 15px; z-index: 10; 
            text-transform: none; text-shadow: 0 0 30px #00f2ff; pointer-events: none; 
        }

        /* AUTO-BOT UI */
        .ui-nav { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; align-items: center; }
        .btn { padding: 20px 60px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold; cursor: pointer; letter-spacing: 5px; transition: 0.4s; }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 50px #00f2ff; }
        
        .status-msg { font-size: 0.7rem; color: #444; letter-spacing: 2px; text-transform: none; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { scale: 0.9; opacity: 0.7; } to { scale: 1.1; opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="eye-wrap"><div class="plasma-rim"></div><div class="core-glow"></div></div>
    
    <div class="brand">KNOCKSSTUDiOS</div>

    <div class="ui-nav">
        <button class="btn" onclick="runAutoEngine()">SiGN UP & ACTiVATE</button>
        <div class="status-msg" id="bot-status">BOT STATUS: iDLE</div>
    </div>

    <script>
        // iNiTiALiZE EMAiLJS (Replace 'YOUR_PUBLIC_KEY' with your actual key from emailjs.com)
        emailjs.init("YOUR_PUBLIC_KEY");

        // 1. COSMO WAVE ENGiNE
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2; ctx.beginPath();
            let t = Date.now() * 0.002;
            for(let x=0; x<canvas.width; x+=10) {
                let y = (canvas.height/2) + Math.sin(x*0.01 + t)*80;
                ctx.lineTo(x, y);
            }
            ctx.stroke(); requestAnimationFrame(animate);
        }
        animate();

        // 2. THE AUTOMATiON BOT
        function runAutoEngine() {
            const userEmail = prompt("ENTER EMAiL FOR 2000 COiN iNJECTiON:");
            if (!userEmail) return;

            const status = document.getElementById('bot-status');
            status.innerText = "BOT: CONNECTiNG TO CLOUD...";
            status.style.color = "#ffd700";

            // SWORD WHOOSH
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);

            // BOT LOGiC: SEND AUTO-REPLY & iNJECT COiNS
            const templateParams = {
                user_email: userEmail,
                message: "Welcome to KNOCKSSTUDiOS. Your 2000 Credits have been injected into your signature ID."
            };

            emailjs.send('YOUR_SERViCE_iD', 'YOUR_TEMPLATE_iD', templateParams)
                .then(function() {
                    status.innerText = "BOT: EMAiL SENT & COiNS iNJECTED";
                    status.style.color = "#00f2ff";
                    localStorage.setItem('knocks_credits', '2000');
                    alert("AUTO-ACTiVATiON COMPLETE. CHECK YOUR iNBOX.");
                    window.location.href = "store.html";
                }, function(error) {
                    status.innerText = "BOT ERROR: OFFLiNE MODE ACTiVATED";
                    localStorage.setItem('knocks_credits', '2000');
                    window.location.href = "store.html";
                });
        }
    </script>
</body>
</html>
