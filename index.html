<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KNOCKSSTUDiOS | OMNIPOTENT ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ks-cyan: #00fff2;
            --ks-purple: #8a2be2;
            --ks-orange: #ff4b2b;
            --ks-void: #020205;
        }

        /* ADDED: High-Density AI Depth Field */
        body {
            background-color: var(--ks-void);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(0, 255, 242, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 10% 40%, rgba(255, 75, 43, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .ks-monolith { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-weight: 900; }

        /* ADDED: Elite Kinetic Title Gradient */
        .hero-title {
            font-size: clamp(3.5rem, 12vw, 9rem);
            line-height: 0.8;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #ffffff 30%, var(--ks-cyan), var(--ks-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 0 40px rgba(0, 255, 242, 0.2));
        }

        /* ADDED: Sovereign Badge FX */
        .badge-ai {
            display: inline-block;
            background: rgba(0, 255, 242, 0.05);
            border: 1px solid rgba(0, 255, 242, 0.3);
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.4em;
            color: var(--ks-cyan);
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.1);
        }

        /* ADDED: King AI Button Weight */
        .btn-orange-king {
            background: linear-gradient(to right, #ff4b2b, #ff7b2b);
            padding: 22px 55px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(255, 75, 43, 0.4);
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            color: white; border: none; cursor: pointer;
        }
        .btn-orange-king:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(255, 75, 43, 0.6); }

        /* ADDED: Command Signal Drawer Fix */
        #nav-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px;
            height: 100vh; background: rgba(0,0,0,0.98); z-index: 1000;
            backdrop-filter: blur(30px); border-left: 1px solid rgba(255,255,255,0.1);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); padding: 60px 40px;
        }
        #nav-drawer.active { right: 0; }
    </style>
</head>
<body>

    <div class="fixed top-10 right-10 z-[1001] cursor-pointer group" onclick="toggleNav()">
        <div class="w-10 h-[2px] bg-white mb-2 transition-all group-hover:bg-cyan-400"></div>
        <div class="w-10 h-[2px] bg-orange-600 mb-2"></div>
        <div class="w-6 h-[2px] bg-white ml-auto transition-all group-hover:w-10"></div>
    </div>

    <div id="nav-drawer">
        <p class="ks-monolith text-[10px] text-cyan-400 tracking-[0.8em] mb-10">Signal Status: Active</p>
        <div class="rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
            <iframe src="https://knocksstudios.airtime.pro/embed/player?stream=auto&skin=2" frameborder="0" width="100%" height="420"></iframe>
        </div>
        <button onclick="toggleNav()" class="mt-20 text-[10px] text-gray-600 uppercase tracking-widest hover:text-white">Disconnect</button>
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center text-center px-6 relative z-50">
        <div class="mb-10">
            <span class="badge-ai">● AI LAB LEGENDS</span>
        </div>
        
        <h1 class="hero-title ks-monolith">
            KNOCKS<br>STUDiOS
        </h1>

        <p class="mt-12 text-gray-500 text-sm tracking-[0.4em] uppercase max-w-lg leading-relaxed font-bold">
            The Vision. The Engine. The Empire.
        </p>

        <div class="mt-16 flex flex-col sm:flex-row gap-8">
            <button class="btn-orange-king">Explore the Engine</button>
            <button class="border border-white/20 px-14 py-5 rounded-full text-[11px] font-black uppercase tracking-widest hover:bg-white/5 transition">The Vision</button>
        </div>
    </main>

    <section class="py-40 px-10 border-t border-white/5">
        <div class="max-w-6xl mx-auto">
            <span class="text-cyan-400 text-[10px] tracking-[1em] font-black uppercase block mb-10">The Vision</span>
            <h2 class="ks-monolith text-5xl md:text-8xl leading-[0.85] mb-14 italic">
                We render it<br><span style="background: linear-gradient(90deg, #ff4b2b, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">from scratch.</span>
            </h2>
            <p class="text-gray-500 text-sm md:text-base leading-loose max-w-2xl uppercase tracking-[0.2em] font-bold">
                KNOCKSSTUDIOS IS THE CONVERGENCE OF SOVEREIGN AI PIPELINES AND HIGH-FIDELITY CINEMATICS. WE DON'T LICENSE THE FUTURE—WE BUILD THE ENGINE.
            </p>
        </div>
    </section>

    <button onclick="showVault()" class="fixed bottom-6 right-6 text-[8px] text-white/5 tracking-[0.5em] uppercase hover:text-white transition">Sys_Control</button>

    <div id="vault" style="display:none; position:fixed; inset:0; background:black; z-index:10000; align-items:center; justify-content:center;">
        <div class="text-center p-12 bg-zinc-950 border border-white/10 rounded-[40px] w-full max-w-sm">
            <p class="ks-monolith text-[11px] text-orange-600 tracking-[1em] mb-12">IDENTIFY_CEO</p>
            <input type="password" id="pass" class="bg-black border border-white/20 text-white p-6 text-center tracking-[1em] w-full mb-10 outline-none rounded-2xl" placeholder="****">
            <button onclick="verify()" class="w-full py-5 bg-white text-black font-black text-xs tracking-widest uppercase rounded-2xl hover:bg-cyan-400">Verify Access</button>
            <button onclick="hideVault()" class="mt-10 text-[9px] text-gray-700 uppercase block mx-auto tracking-widest">Exit</button>
        </div>
    </div>

    <script>
        function toggleNav() { document.getElementById('nav-drawer').classList.toggle('active'); }
        function showVault() { document.getElementById('vault').style.display = 'flex'; }
        function hideVault() { document.getElementById('vault').style.display = 'none'; }
        
        function verify() {
            if(document.getElementById('pass').value === "0736") {
                alert("SOVEREIGN BYPASS ENGAGED.");
                hideVault();
            } else {
                alert("ACCESS DENIED.");
                location.reload();
            }
        }
    </script>
</body>
</html>
