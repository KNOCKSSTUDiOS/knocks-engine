<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN GATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        * { cursor: crosshair; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow: hidden; }

        /* THE WORKSHOP BACKGROUND */
        #background-robot {
            position: fixed; inset: 0; z-index: -1;
            background: url('1773441360031.jpg') no-repeat center center;
            background-size: cover; opacity: 0.4; filter: saturate(1.5) brightness(0.7);
        }

        /* THE FLOATING V-SENTINEL (Animated) */
        #moving-sentinel {
            position: absolute; width: 300px; bottom: 10%; right: 5%;
            filter: drop-shadow(0 0 30px #00f0ff);
            animation: floatRobot 6s infinite ease-in-out;
            z-index: 5;
        }
        @keyframes floatRobot { 0%, 100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-40px) rotate(-2deg); } }

        /* BUSINESS TILES (LOGIN/SIGNUP) */
        .auth-container {
            position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 15px;
        }
        .tile-btn {
            background: rgba(0, 240, 255, 0.1); border: 2px solid #00f0ff;
            color: #00f0ff; padding: 10px 25px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; pointer-events: auto;
        }
        .tile-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 20px #00f0ff; }

        /* THE MAIN HUD */
        .brand-text { font-size: 8rem; font-weight: 900; letter-spacing: -0.05em; mix-blend-mode: difference; text-shadow: 0 0 20px #fff; }
        
        /* SUBSCRIPTION MODAL */
        #sub-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 200; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="background-robot"></div>
    <img src="image.png" id="moving-sentinel" alt="VALERIUS">

    <div class="auth-container">
        <button class="tile-btn" onclick="openGate()">LOGIN</button>
        <button class="tile-btn" onclick="openGate()">SIGN UP</button>
        <button class="tile-btn" style="border-color: #ff0055; color: #ff0055;">SUBSCRIBE</button>
    </div>

    <main class="relative z-10 flex flex-col items-center justify-center min-h-screen">
        <h1 class="brand-text">KNOCKS</h1>
        <p class="tracking-[2em] text-[#00f0ff] mb-10">STUDIOS 9K ENGINE</p>
        
        <button id="init-btn" onclick="triggerEngine()" class="bg-white text-black py-6 px-12 font-black uppercase text-[14px] tracking-[1em] hover:bg-[#00f0ff] transition-all">
            BOOT SYSTEM
        </button>
    </main>

    <div id="sub-modal">
        <div>
            <h2 style="font-size: 3rem; color: #ff0055;">ACCESS DENIED</h2>
            <p style="letter-spacing: 5px;">ACTIVE SUBSCRIPTION REQUIRED FOR 9K ENGINE</p>
            <button class="tile-btn" style="margin-top: 20px;" onclick="closeModal()">RETURN TO GATE</button>
        </div>
    </div>

    <script>
        function triggerEngine() {
            // This links to your actual live engine file
            window.location.href = "hollywoodimaging.studio"; 
        }

        function openGate() {
            document.getElementById('sub-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('sub-modal').style.display = 'none';
        }

        // Mouse interaction for the background robot
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.getElementById('background-robot').style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
