<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>KNOCKSSTUDiOS — Welcome</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#000;
      --accent:#7fd0ff;
      --accent-2:#9f5bff;
      --muted:#6f9fd0;
      --panel-bg:radial-gradient(circle at top,#07111f 0,#02040a 55%,#000 100%);
      --glass-border:rgba(127,208,255,0.35);
      --text:#e5f3ff;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
    html,body{height:100%}
    body{
      background:#02030a;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      overflow:hidden;
    }
    .center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{
      width:100%;
      max-width:900px;
      background:var(--panel-bg);
      border-radius:20px;
      padding:30px;
      border:1px solid var(--glass-border);
      box-shadow:0 0 40px rgba(127,208,255,0.12), inset 0 0 30px rgba(0,0,0,0.7);
      text-align:center;
    }
    h1{
      font-size:2.4rem;
      letter-spacing:0.15em;
      color:var(--accent);
      margin-bottom:10px;
      font-weight:800;
    }
    h2{
      font-size:1.1rem;
      color:var(--muted);
      margin-bottom:20px;
      letter-spacing:0.05em;
    }
    .btn{
      display:inline-block;
      padding:12px 22px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      font-size:0.85rem;
      margin:8px;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#041018;
      box-shadow:0 6px 24px rgba(31,209,255,0.18);
    }
    .btn-ghost{
      background:transparent;
      border:1px solid rgba(127,208,255,0.22);
      color:var(--accent);
    }
    .footer{
      margin-top:30px;
      font-size:0.8rem;
      color:var(--muted);
    }
    @media(max-width:600px){
      h1{font-size:1.8rem}
      h2{font-size:1rem}
    }
  </style>
</head>
<body>

  <div class="center">
    <div class="container">
      <h1>KNOCKSSTUDiOS</h1>
      <h2>Lab Legends • 9K Ultra Engine Preview</h2>

      <div>
        <button class="btn btn-primary" onclick="location.href='signup.html'">Sign Up</button>
        <button class="btn btn-ghost" onclick="location.href='login.html'">Log In</button>
      </div>

      <div class="footer">
        © 2026 KNOCKSSTUDiOS — Prototype Preview  
      </div>
    </div>
  </div>

</body>
</html>
