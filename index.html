<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KNOCKSTUDiOS - 9K ENGINE</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { 
            display: block; 
            background: #000;
        }
        #overlay {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #00f0ff;
            text-shadow: 0 0 8px #00f0ff; 
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .glitch-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 class="glitch-text">SATELLITE FEED: 9K ULTRA</h1>
        <p>STATUS: ENGINE AWAKENED // ONLINE</p>
        <p>LOCATION: KNOX STUDIOS MANSION</p>
    </div>
    <canvas id="radarCanvas"></canvas>

<script>
const canvas = document.getElementById('radarCanvas');
const ctx = canvas.getContext('2d');

let width, height;
let zoom = 1;
let linePosV = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

function drawGrid() {
    ctx.strokeStyle = "rgba(0, 100, 255, 0.2)";
    ctx.lineWidth = 1;
    const gridSize = 60 * zoom;

    // Fixed Grid Logic
    for (let x = (width / 2) % gridSize; x < width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = (height / 2) % gridSize; y < height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }
}

function drawStructures() {
    const cx = width / 2;
    const cy = height / 2;
    const size = 180 * zoom;

    // Main Studio Core
    ctx.fillStyle = "rgba(0, 150, 255, 0.15)";
    ctx.strokeStyle = "#00f0ff";
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - size/2, cy - size/2, size, size);
    ctx.fillRect(cx - size/2, cy - size/2, size, size);

    // Labels
    ctx.fillStyle = "#00f0ff";
    ctx.font = "bold 12px Courier New";
    ctx.fillText("KNOX STUDIOS HQ", cx - size/2, cy - size/2 - 15);
    
    // Corner Accents
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fill();
}

function drawCrosshair() {
    const cx = width / 2;
    const cy = height / 2;
    const gap = 30;
    const len = 120;

    ctx.strokeStyle = "#00f0ff";
    ctx.lineWidth = 3;

    // Top
    ctx.beginPath(); ctx.moveTo(cx, cy - gap); ctx.lineTo(cx, cy - gap - len); ctx.stroke();
    // Bottom
    ctx.beginPath(); ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + gap + len); ctx.stroke();
    // Left
    ctx.beginPath(); ctx.moveTo(cx - gap, cy); ctx.lineTo(cx - gap - len, cy); ctx.stroke();
    // Right
    ctx.beginPath(); ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + gap + len, cy); ctx.stroke();
}

function animate() {
    // Clear with slight trail effect
    ctx.fillStyle = "rgba(0, 5, 15, 1)";
    ctx.fillRect(0, 0, width, height);

    // Dynamic Zoom Pulse
    zoom = 1 + Math.sin(Date.now() / 2500) * 0.1;

    drawGrid();
    drawStructures();
    drawCrosshair();

    // The Scanning Pulse
    linePosV = (Date.now() / 15) % height;
    ctx.strokeStyle = "rgba(0, 240, 255, 0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, linePosV); ctx.lineTo(width, linePosV); ctx.stroke();

    // Red Alert Dot (Satellite Ping)
    if (Math.sin(Date.now() / 200) > 0) {
        ctx.fillStyle = "#ff0055";
        ctx.beginPath();
        ctx.arc(width * 0.8, height * 0.2, 8, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}

// Kickstart the Engine
animate();
</script>
</body>
</html>
