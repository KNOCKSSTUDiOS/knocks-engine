<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K REALITY | KNOCKS STUDIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #0b0b0b; font-family: 'Orbitron', sans-serif; color: #e3e3e3; margin: 0; overflow-x: hidden; }
        .all-caps { text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; }
        
        /* 1. SCION NEON & ROTATION (HERO) */
        .scion-neon {
            font-size: 7vw; font-weight: 900;
            background: linear-gradient(90deg, #00f0ff, #7000ff, #00f0ff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: neonFlow 4s linear infinite, rotateY 8s ease-in-out infinite;
        }
        @keyframes neonFlow { to { background-position: 200% center; } }
        @keyframes rotateY { 0%, 100% { transform: rotateY(-15deg); } 50% { transform: rotateY(15deg); } }

        /* 2. ROBOT EYE REPAIR (KIA) */
        .eye-container { width: 100px; height: 100px; position: relative; border: 2px solid #333; border-radius: 50%; padding: 5px; }
        .eye-iris { 
            width: 100%; height: 100%; background: radial-gradient(circle, #00f0ff 10%, #000 70%); 
            border-radius: 50%; box-shadow: 0 0 30px #00f0ff; 
            animation: calibrate 3s infinite ease-in-out; 
        }
        @keyframes calibrate { 0%, 100% { transform: scale(1) translate(0,0); } 30% { transform: scale(1.2) translate(5px, -5px); } 60% { transform: scale(0.9) translate(-5px, 5px); } }

        /* 3. FLOW STYLE COMPONENTS */
        .flow-card { background: #1e1e1e; border-radius: 24px; border: 1px solid #333; transition: 0.3s; cursor: pointer; overflow: hidden; }
        .flow-card:hover { border-color: #00f0ff; background: #252525; }
        .google-btn { background: #1e1e1e; border: 1px solid #333; border-radius: 100px; padding: 12px 24px; display: flex; items-center; gap: 12px; }

        .view-layer { display: none; min-height: 100vh; flex-direction: column; align-items: center; }
        #splash { display: flex; justify-content: center; background: url('1773441360031.jpg') center/cover; }
        #splash::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <audio id="drill-fx" src="drill-mechanical.mp3"></audio>

    <main id="splash" class="view-layer relative">
        <div class="z-10 text-center max-w-4xl px-6">
            <h1 class="scion-neon mb-4">KNOCKS STUDIOS</h1>
            <p class="all-caps text-xs opacity-50 mb-12">POWERED BY AI LAB LEGENDS</p>
            
            <div class="flow-card p-8 max-w-md mx-auto">
                <h2 class="text-2xl font-bold mb-8">Choose an account</h2>
                <div onclick="navTo('dashboard')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-xl cursor-pointer mb-2">
                    <div class="w-10 h-10 rounded-full bg-[#00f0ff] text-black flex items-center justify-center font-bold">K</div>
                    <div class="text-left">
                        <p class="font-bold text-sm">KNOCKS STUDIOS</p>
                        <p class="text-xs opacity-50">gtamayo36@gmail.com</p>
                    </div>
                </div>
                <div onclick="navTo('auth')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-xl cursor-pointer">
                    <div class="w-10 h-10 rounded-full border border-dashed border-gray-600 flex items-center justify-center">+</div>
                    <p class="text-sm">Use another account</p>
                </div>
            </div>
        </div>
    </main>

    <section id="auth" class="view-layer p-10">
        <div class="flow-card p-12 w-full max-w-2xl mt-10">
            <h2 class="text-3xl font-bold mb-10">Initialize Identity</h2>
            <div class="space-y-6">
                <input type="text" placeholder="Full Legal Name" class="w-full bg-[#111] border border-[#333] p-5 rounded-2xl outline-none focus:border-[#00f0ff]">
                <input type="email" placeholder="Email Address" class="w-full bg-[#111] border border-[#333] p-5 rounded-2xl outline-none focus:border-[#00f0ff]">
                <input type="text" placeholder="Billing Address (Street, City, Zip)" class="w-full bg-[#111] border border-[#333] p-5 rounded-2xl outline-none focus:border-[#00f0ff]">
                <div class="grid grid-cols-2 gap-4">
                    <input type="password" placeholder="Password" class="bg-[#111] border border-[#333] p-5 rounded-2xl outline-none">
                    <input type="password" placeholder="Confirm" class="bg-[#111] border border-[#333] p-5 rounded-2xl outline-none">
                </div>
                <button onclick="navTo('dashboard')" class="w-full bg-white text-black py-5 rounded-full font-bold all-caps">Create Account</button>
            </div>
        </div>
    </section>

    <section id="dashboard" class="view-layer p-6">
        <header class="w-full flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="eye-container scale-50"><div class="eye-iris"></div></div>
                <h2 class="text-xl font-bold">FLOW</h2>
            </div>
            <div class="flex gap-4">
                <div class="bg-[#1e1e1e] px-6 py-2 rounded-full border border-[#333] text-[#ffcc00] font-bold">2,000c</div>
                <div class="w-10 h-10 rounded-full bg-gray-700"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-7xl">
            <div class="flow-card h-64 relative group">
                <img src="1773441360031.jpg" class="w-full h-full object-cover opacity-50">
                <div class="absolute inset-0 p-6 flex flex-col justify-end bg-gradient-to-t from-black">
                    <p class="font-bold">Knocks Creative</p>
                    <p class="text-xs opacity-50">Mar 29 - 12:08</p>
                </div>
            </div>
            <div class="flow-card h-64 border-dashed border-2 flex items-center justify-center hover:bg-white/5">
                <div class="text-center">
                    <p class="text-4xl mb-2">+</p>
                    <p class="all-caps text-xs">New project</p>
                </div>
            </div>
        </div>

        <div class="fixed bottom-10 w-full max-w-3xl glass p-4 rounded-[40px] border border-[#333] flex items-center gap-4">
            <button class="p-4 bg-[#252525] rounded-full">+</button>
            <input type="text" placeholder="What do you want to create?" class="flex-grow bg-transparent outline-none text-sm">
            <div class="flex items-center gap-2 bg-[#252525] px-4 py-2 rounded-full border border-[#444] text-[10px]">
                <span>Video</span> <span class="opacity-30">|</span> <span>x2</span>
            </div>
            <button onclick="document.getElementById('drill-fx').play()" class="p-4 bg-white text-black rounded-full">→</button>
        </div>
    </section>

    <script>
        function navTo(id) {
            document.querySelectorAll('.view-layer').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }
    </script>
</body>
</html>
