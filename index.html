<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNOCKSSTUDiOS | CEO_VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .ks-monolith { font-family: 'Syncopate'; font-size: 10px; letter-spacing: 5px; color: #333; }
        .hidden-vault { display: none; }
        .access-granted { display: block !important; animation: flicker 0.2s infinite alternate; }
        @keyframes flicker { from { opacity: 1; } to { opacity: 0.8; } }
        input { background: transparent; border: 1px solid #111; color: #00fff2; text-align: center; padding: 10px; outline: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div id="gatekeeper" class="text-center">
        <p class="ks-monolith mb-8">VERIFY_IDENTITY_CEO_TAMAYO</p>
        <input type="password" id="vaultCode" placeholder="ENTER_CODE" oninput="checkVaultCode()">
        <p class="text-[8px] text-gray-800 mt-10">UNAUTHORIZED ACCESS IS A FEDERAL OFFENSE</p>
    </div>

    <div id="adminVault" class="hidden-vault w-full max-w-4xl p-20">
        <div class="flex justify-between items-end mb-20 border-b border-white/10 pb-10">
            <div>
                <h1 class="text-6xl font-black italic tracking-tighter">ADMIN_VAULT</h1>
                <p class="text-cyan-400 text-[10px] tracking-[0.5em] mt-4">STRICTLY_BUSINESS // CEO_ACCESS_ONLY</p>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-gray-500 italic">LOGGED_IN_AS: G_TAMAYO</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="border border-white/5 p-10 bg-zinc-950">
                <p class="text-[8px] text-gray-600 mb-4 tracking-widest">ENGINE_IGNITION</p>
                <button class="w-full py-4 border border-cyan-400 text-cyan-400 font-black text-[10px] tracking-widest">ACTIVE</button>
            </div>

            <div class="border border-red-900/20 p-10 bg-zinc-950">
                <p class="text-[8px] text-red-500 mb-4 tracking-widest">2ND_TRIGGER: GLOBAL_PAYWALL</p>
                <button id="trigger2" onclick="igniteFreeAccess()" class="w-full py-4 border border-white/10 text-white font-black text-[10px] tracking-widest hover:bg-red-600 hover:text-white transition">
                    GRANT_FREE_FULL_ACCESS: OFF
                </button>
            </div>
        </div>
    </div>

    <script>
        // REPLACE '9999' WITH YOUR SECRET PIN
        function checkVaultCode() {
            const input = document.getElementById('vaultCode').value;
            if(input === '0736') { // Your private code
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('adminVault').classList.add('access-granted');
            }
        }

        function igniteFreeAccess() {
            const btn = document.getElementById('trigger2');
            btn.classList.toggle('bg-red-600');
            if(btn.classList.contains('bg-red-600')) {
                btn.innerText = "GRANT_FREE_FULL_ACCESS: ON";
                alert("CEO_ALERT: 2nd Trigger Engaged. The Engine is now FREE for all users.");
                // This is where your engine.vault updates locally
            } else {
                btn.innerText = "GRANT_FREE_FULL_ACCESS: OFF";
            }
        }
    </script>
</body>
</html>
