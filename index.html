<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIGINAL 9K ULTRA POWER ENGINE ™</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010103; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #00FFFF; }
        #interface { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; width: 100%; }
        #sentinel-v-display { background: rgba(0, 5, 15, 0.9); border: 1px solid #003366; padding: 25px; border-radius: 2px; margin-bottom: 20px; display: none; box-shadow: 0 0 40px #001133; }
        .command-text { font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; color: #00FFFF; text-shadow: 0 0 10px #00FFFF; }
        .sub-text { font-size: 12px; color: #003366; margin-top: 10px; letter-spacing: 2px; }
        button { background: transparent; color: #00FFFF; border: 2px solid #00FFFF; padding: 18px 45px; cursor: pointer; font-size: 16px; font-weight: 900; letter-spacing: 5px; transition: all 0.4s ease; text-transform: uppercase; }
        button:hover { background: #00FFFF; color: #000; box-shadow: 0 0 50px #00FFFF; }
    </style>
</head>
<body>

    <div id="interface">
        <div id="sentinel-v-display">
            <div class="command-text" id="status-line">SENTINEL V: STANDBY</div>
            <div class="sub-text">POWERED BY AI LAB LEGENDS | KNOCKSSTUDiOS ™</div>
        </div>
        <button onmousedown="sentinelMad()" onmouseup="sentinelStealth()" ontouchstart="sentinelMad()" ontouchend="sentinelStealth()">ENGAGE 9K ULTRA</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, armor, vLogo, glowLights;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. INDUSTRIAL LIGHTING
            const pLight = new THREE.PointLight(0x0044ff, 1, 100);
            pLight.position.set(10, 10, 10);
            scene.add(pLight);
            scene.add(new THREE.AmbientLight(0x050505, 0.5));

            // 2. THE 15FT SENTINEL BODY (OBSIDIAN TITANIUM)
            const armorGeo = new THREE.BoxGeometry(2.2, 3, 0.8);
            const armorMat = new THREE.MeshStandardMaterial({ 
                color: 0x020205, // Midnight Obsidian
                metalness: 1, 
                roughness: 0.05,
                emissive: 0x000000
            });
            armor = new THREE.Mesh(armorGeo, armorMat);
            scene.add(armor);

            // 3. THE STEALTH 'V' CHEST PLATE (HIDDEN)
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const vGeo = new THREE.TextGeometry('V', { font, size: 1.2, height: 0.1 });
                vGeo.center();
                const vMat = new THREE.MeshStandardMaterial({ 
                    color: 0x000000, 
                    emissive: 0x00FFFF, 
                    emissiveIntensity: 0 // FULL STEALTH
                });
                vLogo = new THREE.Mesh(vGeo, vMat);
                vLogo.position.z = 0.41; // Flush against chest
                armor.add(vLogo);
            });
        }

        function sentinelMad() {
            const display = document.getElementById('sentinel-v-display');
            const status = document.getElementById('status-line');
            display.style.display = 'block';
            status.innerText = "9K ULTRA: MAD MODE ACTIVE";
            status.style.color = "#FF0000"; // Red Warning Text
            
            if(vLogo) vLogo.material.emissiveIntensity = 15; // THE V IGNITES
            armor.scale.set(1.05, 1.05, 1.05); // Expansion
            renderer.setClearColor(0x050000); // Screen turns dark red tint
        }

        function sentinelStealth() {
            const status = document.getElementById('status-line');
            status.innerText = "SENTINEL V: STEALTH RE-ENGAGED";
            status.style.color = "#00FFFF";
            
            if(vLogo) vLogo.material.emissiveIntensity = 0; // V DISAPPEARS
            armor.scale.set(1, 1, 1);
            renderer.setClearColor(0x010103);
            setTimeout(() => { document.getElementById('sentinel-v-display').style.display = 'none'; }, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            armor.rotation.y = Math.sin(Date.now() * 0.0005) * 0.15;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
