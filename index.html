<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@900&display=swap');
        :root { --ks-void: #020205; --ks-cyan: #00fff2; --ks-blood: #ff4b2b; }
        
        body { 
            background: var(--ks-void); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a2a22, transparent),
                        radial-gradient(circle at bottom left, #1a1a2a, var(--ks-void));
        }

        .ks-monolith { font-family: 'Syncopate'; font-weight: 900; text-transform: uppercase; }

        .hero-title {
            font-size: 10vw;
            letter-spacing: -5px;
            background: linear-gradient(to right, #00fff2, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.8;
        }

        .btn-orange { background: #ff4b2b; padding: 18px 45px; border-radius: 50px; font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border:none; cursor:pointer; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.2); padding: 18px 45px; border-radius: 50px; font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; background:transparent; color:white; cursor:pointer; }

        /* THE HIDDEN VAULT */
        #master-vault { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.99); 
            z-index: 9999; display: none; flex-direction: column; 
            align-items: center; justify-content: center; backdrop-filter: blur(30px);
        }
        
        .ks-input { 
            background: #050505; border: 1px solid #111; color: var(--ks-cyan); 
            padding: 22px; text-align: center; width: 300px; outline: none; 
            font-weight: 900; letter-spacing: 0.4em; margin-bottom: 15px; font-size: 13px;
        }
        
        .trigger-btn { 
            border: 1px solid rgba(255,255,255,0.1); padding: 45px; width: 100%; 
            font-weight: 900; letter-spacing: 0.6em; text-transform: uppercase; 
            font-size: 11px; transition: 0.5s; background: transparent; color: white;
        }
        .trigger-active { background: var(--ks-blood) !important; box-shadow: 0 0 60px var(--ks-blood); border: none; }
        
        .sys-access-btn {
            position: fixed; bottom: 25px; right: 25px; font-size: 8px; 
            letter-spacing: 6px; color: rgba(255,255,255,0.05); text-transform: uppercase; font-weight: 900; background:none; border:none;
        }
    </style>
</head>
<body>

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="mb-6">
            <span class="text-[8px] border border-cyan-500/30 text-cyan-400 px-4 py-1 rounded-full uppercase tracking-widest font-bold">
                ● AI LAB LEGENDS
            </span>
        </div>
        <h1 class="ks-monolith hero-title mb-8">KNOCKS<br>STUDiOS</h1>
        <p class="max-w-xl text-gray-400 text-sm tracking-wide mb-10 leading-relaxed">
            Where cinematic imagination meets omnipotent AI.<br>
            Build worlds. Render legends. Ship the impossible.
        </p>
        <div class="flex flex-col md:flex-row gap-4">
            <button class="btn-orange">EXPLORE THE ENGINE</button>
            <button class="btn-outline">WATCH THE REEL</button>
        </div>
    </header>

    <button onclick="document.getElementById('master-vault').style.display='flex'" class="sys-access-btn">SYS_LOGIN</button>

    <div id="master-vault">
        <div class="w-full max-w-sm p-10 bg-black border border-white/5 text-center">
            
            <div id="entry-gate">
                <p class="text-[10px] text-gray-700 tracking-[1em] mb-12 font-black uppercase">AUTHENTICATE</p>
                <input type="password" id="pass-field" class="ks-input" placeholder="PASSKEY">
                <button onclick="checkAccess()" class="w-full py-6 bg-white text-black font-black text-[11px] tracking-[0.6em] uppercase">VERIFY</button>
                <button onclick="document.getElementById('master-vault').style.display='none'" class="text-[8px] text-gray-800 mt-10 uppercase tracking-widest">Cancel</button>
            </div>

            <div id="ceo-gate" style="display:none;">
                <p class="text-[10px] text-red-600 tracking-[1.2em] mb-12 font-black uppercase italic">CEO_ULTIMATE_BYPASS</p>
                <button id="master-trigger" onclick="igniteInfinite()" class="trigger-btn">Infinite_Rendering: OFF</button>
                <p class="text-[7px] text-cyan-400 mt-10 tracking-[0.5em] uppercase font-black">Life_Time_Credits: gtamayo36@gmail.com</p>
                <button onclick="location.reload()" class="mt-14 text-[9px] text-gray-800 uppercase tracking-widest">Lock_Engine</button>
            </div>

        </div>
    </div>

    <script>
        function checkAccess() {
            const p = document.getElementById('pass-field').value;
            if (p === "0736") { 
                document.getElementById('entry-gate').style.display = 'none';
                document.getElementById('ceo-gate').style.display = 'block';
            } else if (p === "1234") {
                alert("Observer Mode Active");
                location.reload();
            } else {
                alert("ACCESS_DENIED");
                location.reload();
            }
        }

        function igniteInfinite() {
            const btn = document.getElementById('master-trigger');
            btn.classList.toggle('trigger-active');
            const status = btn.classList.contains('trigger-active');
            btn.innerText = status ? "Infinite_Rendering: ACTIVE" : "Infinite_Rendering: OFF";
            console.log("6 Bots Syncing to Account...");
        }
    </script>
</body>
</html>
