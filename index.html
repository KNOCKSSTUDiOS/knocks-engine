<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@900&display=swap');
        :root { --ks-void: #020205; --ks-cyan: #00fff2; --ks-blood: #ff4b2b; }
        
        body { 
            background: var(--ks-void); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a2a22, transparent),
                        radial-gradient(circle at bottom left, #1a1a2a, var(--ks-void));
        }

        /* LAYER FIX: Ensure hero is clickable */
        header { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }

        .ks-monolith { font-family: 'Syncopate'; font-weight: 900; text-transform: uppercase; }

        .hero-title {
            font-size: 11vw; letter-spacing: -6px; line-height: 0.78;
            background: linear-gradient(to bottom right, #ffffff 30%, #00fff2, #8a2be2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* BUTTON FIX: Added pointer-events and relative positioning */
        .btn-orange { 
            position: relative; z-index: 20; background: #ff4b2b; color: white;
            padding: 22px 55px; border-radius: 60px; font-size: 11px; 
            font-weight: 900; letter-spacing: 3px; text-transform: uppercase; 
            border: none; cursor: pointer; display: inline-block; pointer-events: auto;
            box-shadow: 0 10px 40px rgba(255, 75, 43, 0.4);
        }

        .btn-outline { 
            position: relative; z-index: 20; border: 1px solid rgba(255,255,255,0.3); 
            padding: 22px 55px; border-radius: 60px; font-size: 11px; 
            font-weight: 900; letter-spacing: 3px; text-transform: uppercase; 
            background: transparent; color: white; cursor: pointer; pointer-events: auto;
        }

        /* VAULT OVERLAY */
        #master-vault { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.99); 
            z-index: 9999; display: none; flex-direction: column; 
            align-items: center; justify-content: center; backdrop-filter: blur(40px);
        }
        
        .ks-input { 
            background: #050505; border: 1px solid #222; color: var(--ks-cyan); 
            padding: 24px; text-align: center; width: 300px; outline: none; 
            font-weight: 900; letter-spacing: 0.5em; font-size: 16px; margin-bottom: 20px;
        }

        .sys-trigger {
            position: fixed; bottom: 20px; right: 20px; z-index: 50;
            font-size: 8px; letter-spacing: 5px; color: rgba(255,255,255,0.05);
            background: none; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="mb-10">
            <span style="color:#00fff2; border:1px solid rgba(0,255,242,0.3); padding:8px 20px; border-radius:50px; font-size:8px; font-weight:900; letter-spacing:4px;">● AI LAB LEGENDS</span>
        </div>
        <h1 class="ks-monolith hero-title mb-12">KNOCKS<br>STUDiOS</h1>
        <p class="max-w-2xl text-gray-400 text-sm md:text-base tracking-wide mb-14 px-6">
            Where cinematic imagination meets omnipotent AI.<br>
            Build worlds. Render legends. Ship the impossible.
        </p>
        <div class="flex flex-col sm:flex-row gap-6">
            <button class="btn-orange" onclick="console.log('Exploring...')">EXPLORE THE ENGINE</button>
            <button class="btn-outline" onclick="console.log('Reel Loading...')">WATCH THE REEL</button>
        </div>
    </header>

    <button onclick="document.getElementById('master-vault').style.display='flex'" class="sys-trigger">SYS_LOGIN</button>

    <div id="master-vault">
        <div class="w-full max-w-sm p-10 bg-black border border-white/5 text-center">
            <p class="text-[10px] text-gray-700 tracking-[1em] mb-12 font-black uppercase">Authenticate</p>
            <input type="password" id="pass-field" class="ks-input" placeholder="PASSKEY">
            <button onclick="checkAccess()" style="width:100%; background:white; color:black; padding:20px; font-weight:900; font-size:12px; letter-spacing:4px; border:none; cursor:pointer;">VERIFY</button>
            <button onclick="document.getElementById('master-vault').style.display='none'" style="margin-top:30px; color:#444; font-size:9px; background:none; border:none; cursor:pointer;">CANCEL</button>
            
            <div id="ceo-controls" style="display:none; margin-top:40px;">
                <p style="color:#ff4b2b; font-weight:900; font-size:10px; letter-spacing:5px;">CEO ACCESS GRANTED</p>
                <button onclick="this.style.background='#00fff2'; this.innerText='INFINITE RENDERING: ON'" style="margin-top:20px; width:100%; padding:20px; background:#111; color:white; border:1px solid #333; font-weight:900; font-size:10px;">TRIGGER_INFINITE_BYPASS</button>
            </div>
        </div>
    </div>

    <script>
        function checkAccess() {
            const p = document.getElementById('pass-field').value;
            if (p === "0736") {
                document.getElementById('ceo-controls').style.display = 'block';
                document.getElementById('pass-field').style.display = 'none';
            } else {
                alert("ACCESS DENIED");
                location.reload();
            }
        }
    </script>
</body>
</html>
