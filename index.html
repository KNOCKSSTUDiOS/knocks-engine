<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9K ENGINE // KNOCKSTUDiOS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff; pointer-events: none; z-index: 10;
        }
        #system-logs {
            position: absolute; bottom: 20px; left: 20px; color: #00f0ff;
            font-size: 10px; opacity: 0.7; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="margin:0; font-size: 1.5rem;">SATELLITE FEED: 9K ULTRA</h1>
        <p style="margin:5px 0;">STATUS: ENGINE_AWAKENED // ONLINE</p>
        <p style="margin:0;">LOCATION: KNOX STUDIOS MANSION</p>
    </div>

    <div id="system-logs">
        [SYS] CACHE_RECOVERY: SUCCESS<br>
        [SYS] NEURAL_LINK: STANDBY<br>
        [SYS] MASTER: KNOCKS_VERIFIED
    </div>

    <canvas id="engineCanvas"></canvas>

<script>
const canvas = document.getElementById('engineCanvas');
const ctx = canvas.getContext('2d');
let w, h, zoom = 1, scanLine = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function drawGrid() {
    ctx.strokeStyle = "rgba(0, 150, 255, 0.15)";
    ctx.lineWidth = 1;
    const spacing = 50 * zoom;
    for (let x = (w / 2) % spacing; x < w; x += spacing) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = (h / 2) % spacing; y < h; y += spacing) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
}

function drawHQ() {
    const cx = w / 2, cy = h / 2;
    const size = 180 * zoom;
    
    // Geometric Core
    ctx.fillStyle = "rgba(0, 240, 255, 0.05)";
    ctx.strokeStyle = "#00f0ff";
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - size/2, cy - size/2, size, size);
    ctx.fillRect(cx - size/2, cy - size/2, size, size);
    
    // The "Pulse"
    ctx.beginPath();
    ctx.arc(cx, cy, 5 + Math.sin(Date.now()/200)*2, 0, Math.PI*2);
    ctx.fillStyle = "#00f0ff";
    ctx.fill();
    
    ctx.font = "12px Courier New";
    ctx.fillText("KNOX STUDIOS HQ", cx - size/2, cy - size/2 - 10);
}

function animate() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, w, h);
    
    zoom = 1 + Math.sin(Date.now() / 3000) * 0.05;
    
    drawGrid();
    drawHQ();
    
    // Scanning Pulse
    scanLine = (Date.now() / 20) % h;
    ctx.strokeStyle = "rgba(0, 240, 255, 0.3)";
    ctx.beginPath(); ctx.moveTo(0, scanLine); ctx.lineTo(w, scanLine); ctx.stroke();
    
    // Satellite Ping
    if(Math.sin(Date.now()/500) > 0.8) {
        ctx.fillStyle = "#ff0055";
        ctx.beginPath(); ctx.arc(w - 50, 50, 5, 0, Math.PI*2); ctx.fill();
    }
    
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
