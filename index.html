<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNOCKSSTUDiOS | VERCEL DEPLOY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Courier New', monospace; }

        /* THE SINGULARITY - NO IMAGE NEEDED */
        .eye-focus {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(255, 120, 0, 0.15) 0%, transparent 40%);
            z-index: 1;
        }

        .sun-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 
                0 0 40px #fff, 
                0 0 80px #ffaa00, 
                0 0 150px #ff6600, 
                0 0 300px rgba(255, 50, 0, 0.4);
            animation: flicker 0.1s infinite secondary;
        }

        /* The Horizontal Energy Line (The "Real" Space Look) */
        .energy-beam {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 2px;
            background: linear-gradient(90deg, transparent, #00f2ff, #fff, #00f2ff, transparent);
            box-shadow: 0 0 20px #00f2ff;
            opacity: 0.7;
        }

        @keyframes flicker {
            0% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.02); }
        }

        /* BRANDING */
        .brand-text {
            position: absolute; top: 48%; width: 100%; text-align: center;
            font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 900; letter-spacing: 20px;
            color: rgba(255, 255, 255, 0.8); text-transform: uppercase; z-index: 10;
            text-shadow: 0 0 15px rgba(0,0,0,1);
        }

        /* UI BUTTONS */
        .ui-nav { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; }
        .btn { 
            padding: 15px 40px; background: rgba(0,0,0,0.8); 
            border: 1px solid #00f2ff; color: #00f2ff; 
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
            transition: 0.4s; font-weight: bold; border-radius: 2px;
        }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 40px #00f2ff; }
        .gold { border-color: #ffd700; color: #ffd700; }
        .gold:hover { background: #ffd700; color: #000; box-shadow: 0 0 40px #ffd700; }

        /* SCAN OVERLAY */
        #scanner { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .progress-box { width: 300px; height: 1px; background: #222; margin-top: 20px; position: relative; }
        .progress-fill { position: absolute; left: 0; height: 100%; background: #00f2ff; width: 0%; transition: 5s linear; box-shadow: 0 0 15px #00f2ff; }
    </style>
</head>
<body>

    <div class="eye-focus">
        <div class="energy-beam"></div>
        <div class="sun-center"></div>
    </div>

    <div class="brand-text">KNOCKSSTUDiOS</div>

    <div class="ui-nav">
        <div class="btn" onclick="alert('Bypassing...')">Login</div>
        <div class="btn" onclick="runScan()">Sign Up</div>
        <div class="btn gold" onclick="location.href='valerius.html'">Request Intel</div>
    </div>

    <div id="scanner">
        <div style="letter-spacing: 10px; font-size: 0.8rem; color: #00f2ff;">SCANNING BIOMETRICS</div>
        <div class="progress-box"><div class="progress-fill" id="fill"></div></div>
        <div id="status" style="margin-top: 20px; font-size: 0.6rem; color: #444; letter-spacing: 2px;">A7 OBSIDIAN VERIFICATION...</div>
    </div>

    <script>
        function runScan() {
            document.getElementById('scanner').style.display = 'flex';
            setTimeout(() => { document.getElementById('fill').style.width = '100%'; }, 100);
            setTimeout(() => { 
                document.getElementById('status').innerText = "ACCESS GRANTED"; 
                document.getElementById('status').style.color = "#ffd700";
            }, 4800);
            setTimeout(() => { location.reload(); }, 5800);
        }
    </script>
</body>
</html>
