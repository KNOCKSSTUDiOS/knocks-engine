<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | THE SOVEREIGN PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { cursor: none !important; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        /* PIXEL SORT OVERLAY (Triggered during recovery) */
        #sort-buffer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 40; pointer-events: none; display: none;
            background: repeating-linear-gradient(90deg, 
                transparent 0%, 
                rgba(34, 211, 238, 0.5) 0.5%, 
                rgba(255, 0, 255, 0.5) 1%, 
                transparent 1.5%);
            background-size: 200% 200%;
            mix-blend-mode: screen;
        }

        @keyframes sort-drag {
            0% { background-position: 0% 0%; filter: contrast(5) brightness(2); }
            100% { background-position: 0% 1000%; filter: contrast(1) brightness(1); }
        }

        .recovery-snap #sort-buffer {
            display: block;
            animation: sort-drag 0.5s linear forwards;
        }

        /* IRIS & SHATTER ENGINE */
        #iris-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: radial-gradient(circle, transparent 100%, black 100%);
        }
        @keyframes iris-close {
            0% { background: radial-gradient(circle, transparent 100%, black 100%); }
            85% { background: radial-gradient(circle, transparent 2%, black 20%); }
            100% { background: radial-gradient(circle, white 0%, white 100%); }
        }
        .persistence-hd #iris-layer { animation: iris-close 8s forwards; }

        #video-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -2; background: #000; display: grid; 
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
        }
        .video-shard { width: 100%; height: 100%; overflow: hidden; position: relative; }
        video { position: absolute; width: 200%; height: 200%; object-fit: cover; filter: brightness(0.2) blur(15px); }
        #v1 { top: 0; left: 0; } #v2 { top: 0; left: -100%; } #v3 { top: -100%; left: 0; } #v4 { top: -100%; left: -100%; }
