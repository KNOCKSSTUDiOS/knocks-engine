<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLLYWOOD iMAGiNG | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        :root { --cyan: #00f0ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- THE ORIGINAL VISUALS (LOCKED) --- */
        #visual-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #08081a 0%, #000 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; animation: drift 15s infinite alternate ease-in-out; }
        @keyframes drift { 0% { transform: scale(1); } 100% { transform: scale(1.5) translate(5%, 5%); } }

        /* --- THE LOGO SHAKE (4X INTENSITY) --- */
        @keyframes shake { 
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(-3px, 0px); }
            75% { transform: translate(3px, 2px); }
            100% { transform: translate(1px, -1px); }
        }
        .overclock-active { animation: shake 0.05s infinite; }

        /* --- THE CLEAN LOGIN POP-UP --- */
        #auth-gate { position: fixed; inset: 0; z-index: 6000; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); display: none; align-items: center; justify-content: center; }
        .auth-box { border: 1px solid var(--cyan); padding: 50px; width: 400px; text-align: center; background: #000; }
        .auth-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 12px; color: #fff; margin-bottom: 12px; font-size: 10px; outline: none; }

        /* --- LAYOUT --- */
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.95); border-right: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding-top: 40px; gap: 35px; z-index: 500; }
        .tool-card { background: rgba(10,10,15,0.95); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; transition: 0.3s; cursor: pointer; }
        .tool-card:hover { border-color: var(--cyan); }
    </style>
</head>

            </div>
        </div>
    </div>
