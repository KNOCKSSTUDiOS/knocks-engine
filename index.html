<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLLYWOODiMAGiNG.STUDiO | 9K ULTRA</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvas-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        /* COSMO EYE CORE */
        .eye-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .plasma-rim { 
            width: 380px; height: 380px; border-radius: 50%; padding: 4px; 
            background: conic-gradient(from 0deg, #00f2ff, #ff00ff, #ffd700, #00f2ff); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            mask-composite: exclude; animation: spin 3s linear infinite; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
        }
        .core-glow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90px; height: 90px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 60px #fff, 0 0 120px #00f2ff, 0 0 200px #ff00ff; 
            animation: pulse 1.5s infinite alternate; 
        }

        /* HOLLYWOOD BRANDiNG */
        .brand { 
            position: absolute; top: 50%; width: 100%; text-align: center; transform: translateY(-50%); 
            font-size: clamp(1rem, 6vw, 3rem); font-weight: 900; letter-spacing: 12px; z-index: 10; 
            text-transform: none; text-shadow: 0 0 30px #00f2ff; pointer-events: none; 
        }

        /* AUTO-BOT UI */
        .ui-nav { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; align-items: center; width: 100%; }
        .btn { padding: 22px 70px; background: rgba(0,0,0,0.95); border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold; cursor: pointer; letter-spacing: 6px; transition: 0.3s; }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 60px #00f2ff; }
        .bot-status { font-size: 0.6rem; color: #444; letter-spacing: 2px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { scale: 0.85; opacity: 0.6; } to { scale: 1.15; opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    
    <div class="eye-wrap">
        <div class="plasma-rim"></div>
        <div class="core-glow"></div>
    </div>
