<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS | SiNGULALRiTY RENDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Syncopate:wght@700&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .knocks-font { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }

        /* --- THE ANIMATED VOID --- */
        #ascension-void {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #080808 0%, #000 100%);
            z-index: -2;
        }
        .void-particle {
            position: absolute; width: 2px; height: 2px; background: rgba(0,240,255,0.05);
            border-radius: 50%; animation: voidFlow 20s infinite linear;
        }
        @keyframes voidFlow { from { transform: translateY(100vh) scale(0.5); } to { transform: translateY(-10vh) scale(1.5); } }

        /* --- THE SHUTTER --- */
        #shutter {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            transform: scaleY(0); transition: transform 0.8s cubic-bezier(1, 0, 0, 1);
            display: flex; align-items: center; justify-content: center;
        }
        #shutter.active { transform: scaleY(1); }
        .shutter-line { width: 100%; height: 2px; background: #00f0ff; box-shadow: 0 0 50px #00f0ff; position: absolute; }

        /* --- 9D LIQUID LOGO RENDERING --- */
        .liquid-canvas {
            width: 100%; height: 75vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            background: rgba(10,10,10,0.5); border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
        }

        /* The Gold & Black Globe */
        .master-globe {
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffcc00 0%, #000 70%);
            box-shadow: 0 0 100px rgba(255,204,0,0.15), inset 0 0 50px rgba(0,0,0,0.8);
            position: absolute; z-index: 1; animation: globeRotate 30s infinite linear;
        }
        @keyframes globeRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* The Liquid Typography */
        .liquid-text {
            font-size: 60px; font-weight: 900; font-family: 'Inter', sans-serif;
            letter-spacing: -0.05em; text-transform: uppercase;
            color: #ffcc00; z-index: 10;
            background: linear-gradient(180deg, #ffcc00 0%, #6b8e23 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,204,0,0.2));
            animation: textFlow 3s infinite ease-in-out;
            position: relative;
        }
        @keyframes textFlow { 0%, 100% { transform: translateY(0); filter: hue-rotate(0deg); } 50% { transform: translateY(-5px); filter: hue-rotate(15deg); } }

        /* Water Droplets */
        .droplet {
            position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%;
            backdrop-filter: blur(2px); box-shadow: inset 0 0 5px rgba(255,255,255,0.2);
            animation: dropFloat 10s infinite ease-in-out; z-index: 5;
        }
        @keyframes dropFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(10px, 10px); } }

        /* Navigation Rail */
        .nav-rail { height: 100vh; width: 90px; position: fixed; left: 0; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding-top: 120px; gap: 50px; z-index: 100; background: rgba(0,0,0,0.9); backdrop-blur: 20px; }
        .nav-item { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 10px; letter-spacing: 0.8em; cursor: pointer; opacity: 0.3; transition: 0.3s; color: #fff; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }

        /* Legacies List */
        .legacy-list {
            font-size: 9px; text-transform: uppercase; letter-spacing: 0.5em; color: rgba(255,255,255,0.3);
            writing-mode: vertical-rl; transform: rotate(180deg); position: fixed; right: 20px; top: 120px;
        }

    </style>
</head>
<body onload="igniteVoid()">

    <div id="ascension-void"></div>
    <div id="shutter"><div class="shutter-line"></div><h1 class="extraordinary text-xs tracking-[2em] animate-pulse">SYNTHESIZING</h1></div>

    <div class="nav-rail">
        <div class="knocks-font text-[#ffcc00] font-black text-xs">KNOCKS</div>
        <div class="nav-item active knocks-font">STUDiOS</div>
        <div class="nav-item knocks-font">ACADEMY</div>
        <div class="nav-item knocks-font">STORE</div>
    </div>

    <div class="legacy-list knocks-font space-y-8">
        <span>LEGACY</span><span>WEALTH</span><span>BUiLDiNG</span><span>GROWTH</span><span>YOUTH</span><span>CREATiViTY</span>
    </div>

    <main class="pl-[130px] pr-[60px] pt-16">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h1 class="extraordinary text-6xl italic font-black uppercase tracking-tighter">Ascension <span class="text-[#00f0ff]">Drill</span></h1>
                <p class="knocks-font text-[11px] opacity-30 tracking-[1.2em] mt-4 uppercase">Proprietary SiNGULALRiTY Engine V9.1</p>
            </div>
        </div>

        <div class="liquid-canvas">
            <div class="master-globe"></div>
            <h1 class="liquid-text extraordinary">KNOCKSCREATIVESTUDIOS</h1>
            
            <div class="droplet" style="width: 20px; height: 20px; top: 20%; left: 30%; animation-delay: 1s;"></div>
            <div class="droplet" style="width: 10px; height: 10px; bottom: 30%; right: 40%; animation-delay: 2s;"></div>
            <div class="droplet" style="width: 15px; height: 15px; top: 60%; left: 70%; animation-delay: 0.5s;"></div>
        </div>

    </main>

    <script>
        function igniteVoid() {
            // Create 50 unique animated particles for the background
            const voidContainer = document.getElementById('ascension-void');
            for(let i=0; i<50; i++) {
                const particle = document.createElement('div');
                particle.className = 'void-particle';
                particle.style.left = Math.random() * 100 + "vw";
                particle.style.animationDelay = Math.random() * 20 + "s";
                voidContainer.appendChild(particle);
            }
            console.log("VOiD ACTIVE");
        }
    </script>
</body>
</html>
