<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLLYWOOD iMAGiNG | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        :root { --cyan: #00f0ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }

        /* --- THE ORIGINAL LOGO SHAKE (4X) --- */
        @keyframes shake { 
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(-3px, 0px); }
            75% { transform: translate(3px, 2px); }
            100% { transform: translate(1px, -1px); }
        }
        .overclock-active { animation: shake 0.05s infinite; }

        /* --- VISUALS --- */
        #visual-core { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #08081a 0%, #000 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; }

        /* --- LAYOUT --- */
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.95); border-right: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding-top: 40px; gap: 35px; z-index: 100; }
        .tool-card { background: rgba(10,10,15,0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; transition: 0.3s; height: 280px; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }
        .tool-card:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,240,255,0.1); }

        /* --- LOGIN GATE (THE POP UP) --- */
        #login-gate { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; }
        .auth-box { border: 1px solid var(--cyan); padding: 40px; width: 350px; text-align: center; background: #000; }
        .auth-input { width: 100%; background: #111; border: 1px solid #222; padding: 12px; color: #fff; margin-bottom: 10px; font-size: 10px; outline: none; }
    </style>
</head>
<body onload="ignite()">

    <div id="login-gate">
        <div class="auth-box">
            <h2 class="extraordinary text-white text-lg mb-6">ACCESS_REQUIRED</h2>
            <input type="text" class="auth-input knocks-font" placeholder="USERNAME / EMAIL">
            <input type="password" class="auth-input knocks-font" placeholder="PASSWORD">
            <button class="w-full bg-cyan-400 text-black py-4 text-[10px] font-black uppercase mb-4" onclick="hideLogin()">Login</button>
            <p class="text-[8px] opacity-40 uppercase cursor-pointer" onclick="hideLogin()">Create Account</p>
        </div>
    </div>

    <div id="engine-wrap">

        </nav>

        <main class="pl-[110px] pr-10 pt-10">

                <h1 id="main-logo" class="extraordinary text-5xl tracking-tighter overclock-active">HOLLYWOOD iMAGiNG</h1>
                <div class="knocks-font text-[10px] text-emerald-400">VAULT: 2000</div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">

                    <p class="text-[8px] opacity-40 uppercase">Assets & Modules</p>
                </div>
                <div class="tool-card" onclick="showLogin()">

                </div>
                <div class="tool-card" onclick="showLogin()">
                    <h3 class="extraordinary text-xs text-pink-400 mb-1">CREATE</h3>
                    <p class="text-[8px] opacity-40 uppercase">New Projects</p>
                </div>
                <div class="tool-card" onclick="showLogin()">
                    <h3 class="extraordinary text-xs text-emerald-400 mb-1">SCHOOL</h3>
                    <p class="text-[8px] opacity-40 uppercase">Global Academy</p>
                </div>
            </div>
        </main>
    </div>
