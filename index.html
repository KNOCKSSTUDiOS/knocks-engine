    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { cursor: none !important; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; margin: 0; }
        
        /* VIDEO ENGINE */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        
        #bg-video {
            width: 100%; height: 100%;
            filter: brightness(0.25) contrast(1.2) blur(12px) grayscale(0%);
            object-fit: cover;
            transition: filter 0.6s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* SHATTER / QUAD-TILE EFFECT */
        .fragmented-mode #bg-video {
            object-fit: contain !important;
            background-size: 50% 50% !important;
            background-repeat: repeat !important;
            /* Tiling the video visually using scale and transform-origin if possible, 
               but for 150ms a CSS filter + background-repeat simulation works best */
            transform: scale(2); 
        }

        /* PRISMATIC RAINBOW SURGE */
        @keyframes rainbow-shatter {
            0% { filter: hue-rotate(0deg) brightness(4) contrast(3); }
            100% { filter: hue-rotate(360deg) brightness(6) contrast(4); }
        }
        .prismatic-flash #bg-video {
            animation: rainbow-shatter 0.05s linear infinite;
        }

        /* CRITICAL STASIS (FREEZE) */
        .system-stasis #bg-video { 
            filter: brightness(1) contrast(2) blur(0px) grayscale(100%) !important;
            transform: scale(1.4) rotate(0deg) !important;
        }

        /* CENTRIFUGAL RESET (SPIN + PULL) */
        .reset-pull #bg-video {
            transform: scale(0.6) rotate(360deg) !important;
            filter: brightness(0.15) blur(10px) grayscale(0%) !important;
        }

        /* STILLNESS FOCUS */
        .is-focused #bg-video { 
            filter: brightness(0.4) contrast(1.4) blur(0px) grayscale(100%); 
            transform: scale(1.15); 
        }

        /* BRANDING LOCKUP */
        #main-header h1 { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); letter-spacing: -0.05em; }
        .system-stasis #main-header h1 { letter-spacing: 2em !important; color: #06b6d4; text-shadow: 0 0 50px #06b6d4; }
        .signature-i { text-transform: none !important; color: #06b6d4; display: inline-block; }

        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.3); }
        #init-btn { background: #0891b2; transition: all 0.4s ease; }
        #init-btn:hover { background: #22d3ee; color: #000; box-shadow: 0 0 30px rgba(34, 211, 238, 0.8); }
    </style>
