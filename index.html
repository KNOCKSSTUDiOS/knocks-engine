<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDIOS | GLOBAL PROXIED ENGINE</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; }
        
        /* THE VISUAL ENGINE CONTAINER */
        .engine-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('your-9k-eye-image.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Darkens the eye slightly for UI focus */
        }

        .ui-layer { z-index: 10; text-align: center; }

        h1 { font-size: 3rem; letter-spacing: 12px; margin-bottom: 5px; color: #fff; text-shadow: 0 0 20px #00f, 0 0 30px #00f; }
        p.tagline { font-size: 10px; color: #888; letter-spacing: 4px; margin-bottom: 50px; }

        /* THE GATE BUTTONS */
        .gate-buttons { display: flex; gap: 30px; }
        
        .btn {
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: 0.3s;
        }

        .btn-login { border: 1px solid #fff; color: #fff; }
        .btn-login:hover { background: #fff; color: #000; }

        .btn-signup { background: #FFD700; color: #000; border: 1px solid #FFD700; }
        .btn-signup:hover { background: transparent; color: #FFD700; }

        /* MODULE FOOTER (AS SEEN IN IMAGE) */
        .footer-modules {
            position: absolute;
            bottom: 40px;
            width: 90%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .mod-box {
            border: 1px solid #222;
            padding: 15px;
            width: 200px;
            text-align: center;
            font-size: 10px;
            color: #444;
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="engine-container">
        <div class="overlay"></div>

        <div class="ui-layer">
            <h1>KNOCKSSTUDIOS</h1>
            <p class="tagline">9K SOVEREIGN RENDERING ENGINE</p>

            <div class="gate-buttons">
                <a href="login.html" class="btn btn-login">OPERATOR_LOG_IN</a>
                <a href="signup.html" class="btn btn-signup">SECURE_SIGN_UP</a>
            </div>
        </div>

        <div class="footer-modules">
            <div class="mod-box">
                <span style="color: #666;">MODULE_01</span><br>
                <span style="color: #fff;">OPERATOR_SYNC</span>
            </div>
            <div class="mod-box" style="border-color: #FFD700;">
                <span style="color: #FFD700;">MODULE_02_MAX</span><br>
                <span style="color: #fff;">RENDER_CORE_PRO</span>
            </div>
            <div class="mod-box">
                <span style="color: #666;">MODULE_03</span><br>
                <span style="color: #fff;">SECURE_BRIEF</span>
            </div>
        </div>
    </div>

</body>
</html>
