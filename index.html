<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>KNOCKSSTUDiOS | OMNIPOTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@900&display=swap');
        :root { --ks-void: #020205; --ks-cyan: #00fff2; --ks-blood: #ff4b2b; }
        body { background: var(--ks-void); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; touch-action: manipulation; }
        .ks-monolith { font-family: 'Syncopate'; font-weight: 900; text-transform: uppercase; }

        .ks-card { 
            border: 0.5px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255,255,255,0.01); 
            height: 480px; padding: 45px; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            position: relative; overflow: hidden; 
        }

        #master-vault { 
            position: fixed; inset: 0; background: #000; 
            z-index: 9999; display: none; flex-direction: column; 
            align-items: center; justify-content: center; backdrop-filter: blur(40px);
        }
        
        .ks-input { 
            background: #050505; border: 1px solid #111; color: var(--ks-cyan); 
            padding: 22px; text-align: center; width: 100%; outline: none; 
            font-weight: 900; letter-spacing: 0.4em; margin-bottom: 15px; font-size: 13px;
            border-radius: 0; -webkit-appearance: none;
        }
        
        .trigger-btn { 
            border: 1px solid rgba(255,255,255,0.1); padding: 45px; width: 100%; 
            font-weight: 900; letter-spacing: 0.6em; text-transform: uppercase; 
            font-size: 11px; transition: 0.5s; 
        }
        .trigger-active { background: var(--ks-blood) !important; box-shadow: 0 0 60px var(--ks-blood); border: none; }
        
        #ceo-gate { display: none; width: 100%; }
        
        .sys-access-btn {
            position: fixed; bottom: 25px; right: 25px; font-size: 8px; 
            letter-spacing: 6px; color: #1a1a1a; text-transform: uppercase; font-weight: 900;
        }
    </style>
</head>
<body>

    <header class="h-[65vh] flex flex-col items-center justify-center text-center px-6">
        <p class="text-[9px] tracking-[1.5em] text-cyan-400 mb-10 uppercase font-bold">Engine_Active // Sovereign_v2.1</p>
        <h1 class="ks-monolith text-[11vw] md:text-[8vw] tracking-[-6px] md:tracking-[-12px] leading-[0.8]">
            KNOCKS<br>STUDiOS
        </h1>
    </header>

    <section class="max-w-[1700px] mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-48">
        <div class="ks-card"><div class="absolute top-10 left-10 text-[9px] font-bold text-red-600 tracking-widest uppercase opacity-40">Unit_005 // 3D</div><h3 class="ks-monolith text-3xl italic">Blender School</h3></div>
        <div class="ks-card"><div class="absolute top-10 left-10 text-[9px] font-bold tracking-widest uppercase opacity-40">Unit_004 // AI</div><h3 class="ks-monolith text-3xl italic">Legend School</h3></div>
        <div class="ks-card"><div class="absolute top-10 left-10 text-[9px] font-bold tracking-widest uppercase opacity-40">Unit_006 // ARS</div><h3 class="ks-monolith text-3xl italic">The Arsenal</h3></div>
    </section>

    <button onclick="document.getElementById('master-vault').style.display='flex'" class="sys-access-btn">SYS_LOGIN</button>

    <div id="master-vault">
        <div class="w-full max-w-sm p-10 bg-black border border-white/5 text-center">
            
            <div id="entry-field">
                <p class="text-[10px] text-gray-700 tracking-[1em] mb-12 font-black uppercase">AUTHENTICATE_CEO</p>
                <input type="password" id="vault-key" class="ks-input" placeholder="ACCESS_PASSKEY" autocomplete="off">
                <button onclick="processKey()" class="w-full py-6 bg-white text-black font-black text-[11px] tracking-[0.6em] uppercase mt-4">VERIFY</button>
                <button onclick="document.getElementById('master-vault').style.display='none'" class="text-[8px] text-gray-800 mt-10 uppercase tracking-[0.4em] font-bold">Cancel</button>
            </div>

            <div id="ceo-gate">
                <p class="text-[10px] text-red-600 tracking-[1.2em] mb-12 font-black uppercase italic">MASTER_OVERRIDE</p>
                <button id="trigger-2" onclick="executeTrigger()" class="trigger-btn">Grant_Free_Full_Access: OFF</button>
                <p id="sync-log" class="text-[8px] mt-10 text-gray-800 tracking-widest uppercase font-black">Sync: gtamayo36@gmail.com</p>
                <button onclick="location.reload()" class="mt-14 text-[9px] text-gray-600 uppercase tracking-widest border-b border-gray-900 pb-2">Lock_System</button>
            </div>

        </div>
    </div>

    <footer class="py-40 border-t border-white/5 text-center">
        <a href="mailto:gtamayo36@gmail.com" class="text-[11px] tracking-[1.5em] text-gray-700 hover:text-cyan-400 transition uppercase font-black">gtamayo36@gmail.com</a>
    </footer>

    <script>
        function processKey() {
            const k = document.getElementById('vault-key').value;
            const entry = document.getElementById('entry-field');

            if (k === "0736") { 
                entry.style.display = 'none';
                document.getElementById('ceo-gate').style.display = 'block';
            } else {
                alert("CRITICAL_ERROR: INVALID_CREDENTIALS");
                location.reload();
            }
        }

        async function executeTrigger() {
            const btn = document.getElementById('trigger-2');
            const log = document.getElementById('sync-log');
            btn.classList.toggle('trigger-active');
            const isLive = btn.classList.contains('trigger-active');
            
            btn.innerText = isLive ? "Grant_Free_Full_Access: ACTIVE" : "Grant_Free_Full_Access: OFF";
            log.innerText = "Transmitting_Override...";

            try {
                const response = await fetch('/api/trigger', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-ceo-auth': '0736' },
                    body: JSON.stringify({ access: isLive, admin: "gtamayo36@gmail.com" })
                });
                if(response.ok) log.innerText = "Status: ENGINE_UNLOCKED_LIVE";
            } catch (err) { log.innerText = "Status: OFFLINE"; }
        }
    </script>
</body>
</html>
