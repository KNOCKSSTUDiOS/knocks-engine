<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS | OMNIPOTENT V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --neon: #00f0ff; --gold: #ffcc00; --olive: #6b8e23; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .knocks-font { font-family: 'Orbitron', sans-serif; }
        .extraordinary { font-family: 'Syncopate', sans-serif; font-weight: 700; }

        /* 9D LIQUID ANIMATED VOID */
        #live-void { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #080808 0%, #000 100%); }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.2; animation: float 12s infinite linear; filter: blur(1px); }
        @keyframes float { from { transform: translateY(110vh) scale(0.5); } to { transform: translateY(-10vh) scale(1.5); } }

        /* LIQUID LOGO RENDERING */
        .liquid-text {
            font-size: 52px; font-weight: 900; background: linear-gradient(180deg, var(--gold), var(--olive));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,204,0,0.4)); animation: drip 3s infinite ease-in-out;
        }
        @keyframes drip { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.03); } }

        /* LIVE TICKER */
        .ticker-wrap { position: fixed; bottom: 0; left: 90px; right: 0; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.05); padding: 10px; z-index: 4000; overflow: hidden; }
        .ticker-move { display: flex; animation: ticker 30s linear infinite; white-space: nowrap; gap: 50px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* INTERFACE STYLING */
        #main-interface { display: none; padding-left: 120px; padding-right: 40px; padding-top: 40px; height: 100vh; overflow-y: auto; }
        .nav-rail { height: 100vh; width: 90px; position: fixed; left: 0; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 35px; z-index: 5000; background: #000; }
        .nav-item { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 8px; letter-spacing: 0.6em; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .nav-item:hover, .active-nav { opacity: 1; color: var(--neon); }

        .engine-tile { background: rgba(15,15,15,0.7); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(40px); position: relative; }
        .ghost-gem { position: absolute; width: 20px; height: 20px; background: transparent; cursor: crosshair; z-index: 1000; }
        .ghost-gem:hover { border: 1px solid var(--neon); box-shadow: 0 0 15px var(--neon); }

        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .vault-input { background: #000; border: 1px solid #222; padding: 15px; color: var(--neon); width: 100%; font-size: 10px; margin-bottom: 15px; outline: none; }
        
        #shutter { position: fixed; inset: 0; background: #000; z-index: 10000; transform: scaleY(0); transition: 0.7s cubic-bezier(1,0,0,1); display: flex; align-items: center; justify-content: center; }
        #shutter.active { transform: scaleY(1); }
    </style>
</head>
<body onload="initVoid()">

    <div id="live-void"></div>
    <div id="shutter">
