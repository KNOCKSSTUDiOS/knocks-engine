        @keyframes shake { 
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(-3px, 0px); }
            75% { transform: translate(3px, 2px); }
            100% { transform: translate(1px, -1px); }
        }
        .overclock-active { animation: shake 0.05s infinite; }

        /* --- REACTIVE BACKGROUND --- */
        #visual-core { position: fixed; inset: 0; z-index: -1; background: #000; transition: background 0.8s ease; }

        /* --- MAJESTIC TILES --- */
        .sidebar { width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.9); border-right: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding-top: 40px; gap: 35px; z-index: 100; }
        
        .tool-card { 
            background: rgba(10,10,15,0.98); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 2px; 
            cursor: pointer; 
            transition: 0.4s; 
            height: 300px; 
            display: flex;

            justify-content: flex-end;

        /* TILE SPECIFIC HOVERS */
        .fire:hover { border-color: #ff4d00; box-shadow: 0 0 30px rgba(255, 77, 0, 0.2); }
        .nature:hover { border-color: #00ff88; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .tech:hover { border-color: #00f0ff; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); }
        .royal:hover { border-color: #bf00ff; box-shadow: 0 0 30px rgba(191, 0, 255, 0.2); }

        /* MANUAL SWITCH */
        #kill-btn { position: fixed; bottom: 30px; right: 30px; z-index: 1000; font-size: 9px; cursor: pointer; color: #ff0000; padding: 5px 10px; border: 1px solid #ff0000; }
    </style>
</head>
