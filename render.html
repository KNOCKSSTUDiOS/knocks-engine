<section id="render-module" class="titangine-card p-10 space-y-8 max-w-2xl mx-auto mt-20">
    <div class="flex justify-between">
        <span class="text-[0.6rem] font-bold text-zinc-400 uppercase tracking-widest">9K Rendering Lab</span>
        <span id="rate-display" class="text-[0.5rem] border border-zinc-800 px-2 py-1 text-zinc-600">RATE: 5.00 / RENDER</span>
    </div>

    <textarea id="vision-input" class="w-full bg-transparent border-b border-zinc-800 py-4 text-sm focus:border-white outline-none" placeholder="DESCRIBE YOUR CINEMATIC VISION..."></textarea>
    
    <div id="output-stream" class="h-32 text-[0.65rem] text-zinc-500 italic border-l border-zinc-900 pl-6 flex items-center">
        Awaiting Sovereign Pulse to begin fabrication cycle.
    </div>

    <button onclick="processRender()" class="btn-9k w-full py-5 bg-white text-black font-black text-xs">Execute Render</button>
</section>

<script>
    let coins = 100.00;
    let cost = 5.00;

    function processRender() {
        if (coins < cost) {
            document.getElementById('viral-gate').classList.remove('hidden');
            return;
        }
        
        coins -= cost;
        document.getElementById('coin-count').innerText = coins.toFixed(2);
        
        const stream = document.getElementById('output-stream');
        stream.innerText = "9K TITANGINE: PROCESSING RENDER...";
        
        setTimeout(() => {
            stream.innerText = "[SUCCESS]: Vision sitting exactly in the code. 9K Standard met.";
        }, 3000);
    }
</script>
