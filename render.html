<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE RENDER CORE | HOLLYWOODiMAGiNG</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; text-align: center; }
        .container { padding: 100px 20px; }
        .status-light { width: 15px; height: 15px; background: #00f2ff; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #00f2ff; }
        .render-box { border: 1px solid #222; max-width: 600px; margin: 40px auto; padding: 50px; background: #050505; }
        .progress-bar { width: 100%; height: 2px; background: #111; margin: 30px 0; position: relative; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: #00f2ff; position: absolute; }
        .btn-ignite { padding: 20px 50px; background: transparent; border: 1px solid #00f2ff; color: #00f2ff; cursor: pointer; font-weight: bold; letter-spacing: 5px; }
        .btn-ignite:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        #log { font-size: 0.7rem; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch" style="font-size: 1.5rem; letter-spacing: 10px;">9K_ULTRA_RENDER_CORE</div>
        <p><span class="status-light"></span> AUTHENTiCATED: <span id="user-display">---</span></p>

        <div class="render-box">
            <h2 id="coin-count">CREDiTS: 0</h2>
            <div class="progress-bar"><div class="fill" id="bar"></div></div>
            <button class="btn-ignite" id="burn-btn" onclick="startRender()">iNiTiATE 1000 CREDIT BURN</button>
            <div id="log">STANDBY...</div>
        </div>
        
        <a href="store.html" style="color: #444; text-decoration: none; font-size: 0.8rem;">[ RETURN TO STUDiO ]</a>
    </div>

    <script>
        // SYNC STATUS
        const user = localStorage.getItem('active_user') || "GUEST";
        const credits = parseInt(localStorage.getItem('knocks_credits')) || 0;
        
        document.getElementById('user-display').innerText = user;
        document.getElementById('coin-count').innerText = `CREDiTS: ${credits}`;

        if(credits < 1000) {
            document.getElementById('burn-btn').disabled = true;
            document.getElementById('log').innerText = "ERROR: iNSUFFiCiENT CREDiTS FOR HQ RENDER.";
        }

        function startRender() {
            const current = parseInt(localStorage.getItem('knocks_credits'));
            localStorage.setItem('knocks_credits', current - 1000);
            
            document.getElementById('burn-btn').disabled = true;
            document.getElementById('log').innerText = "PROCESSiNG: ALLOCATiNG GPU LAYERS...";
            
            let width = 0;
            const bar = document.getElementById('bar');
            const interval = setInterval(() => {
                if(width >= 100) {
                    clearInterval(interval);
                    document.getElementById('log').innerText = "SUCCESS: HQ_RENDER_COMPLETE. FiLE SENT TO EMAiL.";
                    document.getElementById('coin-count').innerText = `CREDiTS: ${localStorage.getItem('knocks_credits')}`;
                    alert("ACTiVATiON FiNISHED. CHECK YOUR iNBOX.");
                } else {
                    width++;
                    bar.style.width = width + "%";
                }
            }, 50);
        }
    </script>
</body>
</html>
