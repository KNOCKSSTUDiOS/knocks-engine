<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKS_CORE | 9K_RENDER_ENGINE // KNOCKSSTUDiOS</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #000; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow-x: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .engine-wrap { width: 90%; max-width: 900px; border: 1px solid #111; background: rgba(5,5,5,0.95); padding: 50px; position: relative; backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(0,0,0,1); }
        .engine-wrap::before { content: "TRADEMARK_PROTECTION_ACTIVE"; position: absolute; top: 10px; left: 10px; font-size: 0.5rem; color: var(--gold); letter-spacing: 2px; }

        .header { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 1.5rem; letter-spacing: 8px; color: var(--neon); margin: 0; }
        .header p { font-size: 0.6rem; color: #444; margin-top: 10px; letter-spacing: 2px; }

        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .input-group { background: #080808; border: 1px solid #1a1a1a; padding: 20px; }
        label { display: block; font-size: 0.6rem; color: var(--neon); margin-bottom: 10px; letter-spacing: 2px; }
        
        select, input { 
            width: 100%; background: #000; border: 1px solid #333; color: #fff; 
            padding: 12px; font-family: 'Courier New'; outline: none; font-size: 0.8rem; box-sizing: border-box;
        }

        /* WATERMARK PREVIEW AREA */
        .render-display { 
            width: 100%; height: 200px; background: #050505; border: 1px solid #111; 
            margin-bottom: 20px; position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .watermark-overlay { 
            position: absolute; color: rgba(255, 215, 0, 0.15); font-size: 2rem; 
            font-weight: 900; letter-spacing: 15px; pointer-events: none; text-transform: uppercase;
            transform: rotate(-15deg); display: none;
        }

        .progress-container { height: 2px; background: #111; margin: 40px 0; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: var(--gold); box-shadow: 0 0 15px var(--gold); transition: 0.1s; }

        .ignite-btn { 
            width: 100%; padding: 25px; background: var(--gold); color: #000; 
            font-weight: 900; border: none; cursor: pointer; letter-spacing: 5px; font-size: 1rem;
            transition: 0.3s;
        }
        .ignite-btn:hover { background: #fff; }
        :focus-visible { outline: 2px solid var(--neon); outline-offset: 2px; }

        #console { font-size: 0.65rem; color: var(--gold); margin-top: 20px; min-height: 20px; text-transform: uppercase; }
        #coin-info { text-align: right; font-size: 0.7rem; color: var(--gold); margin-bottom: 10px; }
        @keyframes brand-color-fade { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .brand-animated {
            display: inline;
            background: linear-gradient(270deg, #00fff2, #00e5ff, #bc13fe, #ff6ec7, #ffd700, #00ffcc, #e2e8f0, #00fff2);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brand-color-fade 8s ease infinite;
            filter: drop-shadow(0 0 12px rgba(0, 255, 242, 0.5));
        }
    </style>
</head>
<body>

    <main class="engine-wrap">
        <div class="header">
            <h1>9K_RENDER_CORE</h1>
            <p>TRADEMARKED_OUTPUT_ENGINE // <span class="brand-animated">KNOCKSSTUDiOS</span></p>
        </div>

        <div class="render-display" id="display" role="img" aria-label="Render preview window">
            <div class="watermark-overlay" id="wm" aria-hidden="true">KNOCKSSTUDiOS</div>
            <div id="status-text" style="font-size: 0.6rem; color: #222;" aria-live="polite">PREVIEW_WINDOW_LOCKED</div>
        </div>

        <div class="matrix-grid">
            <div class="input-group">
                <label for="style">AESTHETIC_SIGNATURE</label>
                <select id="style">
                    <option>STYLIZED_3D_HQ</option>
                    <option>HAND-DRAWN_CELL_v4</option>
                    <option>PHOTOREAL_PHYSICS</option>
                </select>
            </div>
            <div class="input-group">
                <label for="res">RESOLUTION</label>
                <select id="res">
                    <option>9K_ULTRA_RAW</option>
                    <option>8K_CINEMATIC</option>
                </select>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label for="prompt">PROMPT_STRING</label>
                <input type="text" id="prompt" placeholder="ENTER PROJECT SPECS...">
            </div>
        </div>

        <div id="coin-info" aria-live="polite">CREDITS: 2000</div>
        <div id="free-tier-info" style="display:none; text-align:center; margin-bottom:15px; padding:12px; border:1px solid #00FF00; background:rgba(0,255,0,0.05); font-size:0.7rem; color:#00FF00; letter-spacing:2px;" aria-live="polite">
            FREE TiER: <span id="free-remaining">2</span>/2 ViDEO RENDERS REMAiNiNG (5 SEC EACH)
        </div>
        <div style="display: flex; gap: 15px; margin-bottom: 10px;">
            <button type="button" class="ignite-btn" style="flex: 1; background: transparent; border: 1px solid var(--neon); color: var(--neon); font-size: 0.8rem; padding: 18px;" id="preview-btn" onclick="previewRender()">PREViEW — FREE</button>
            <button type="button" class="ignite-btn" style="flex: 1; font-size: 0.8rem; padding: 18px;" id="burn-btn" onclick="startRender()">FULL RENDER — 50 CREDiTS</button>
            <button type="button" class="ignite-btn" id="free-render-btn" style="flex: 1; font-size: 0.8rem; padding: 18px; background: #00FF00; display: none;" onclick="freeRender()">FREE RENDER — 5 SEC</button>
        </div>
        <div class="progress-container" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Render progress"><div class="bar" id="fill"></div></div>
        <div id="console" aria-live="polite">SYSTEM_READY...</div>

        <nav style="margin-top: 30px; text-align: center; display: flex; justify-content: center; gap: 30px;" aria-label="Page navigation">
            <a href="store.html" style="color: var(--gold); text-decoration: none; font-size: 0.6rem; letter-spacing: 2px;">[ GET CREDiTS ]</a>
            <a href="index.html" style="color: #222; text-decoration: none; font-size: 0.6rem;">[ DISCONNECT ]</a>
        </nav>
    </main>

    <script>
        let credits = parseInt(localStorage.getItem('knocks_credits')) || 0;
        let freeRenders = parseInt(localStorage.getItem('knocks_free_renders')) || 0;
        let renderInProgress = false;
        document.getElementById('coin-info').innerText = `CREDITS: ${credits}`;

        // Show free tier UI if user has free renders
        function updateFreeTierUI() {
            const freeInfo = document.getElementById('free-tier-info');
            const freeBtn = document.getElementById('free-render-btn');
            if (freeRenders > 0) {
                freeInfo.style.display = 'block';
                freeBtn.style.display = 'block';
                document.getElementById('free-remaining').innerText = freeRenders;
            } else {
                freeInfo.style.display = 'none';
                freeBtn.style.display = 'none';
            }
        }
        updateFreeTierUI();

        // FREE 5-SECOND ViDEO RENDER
        function freeRender() {
            if (renderInProgress) return;
            if (freeRenders <= 0) {
                alert("NO FREE RENDERS REMAiNiNG. USE CREDiTS OR UPGRADE YOUR TiER.");
                return;
            }
            const prompt = document.getElementById('prompt').value;
            if (!prompt) { alert("ENTER A PROMPT FiRST"); return; }

            renderInProgress = true;
            document.getElementById('free-render-btn').disabled = true;
            document.getElementById('burn-btn').disabled = true;
            document.getElementById('preview-btn').disabled = true;
            const log = document.getElementById('console');
            const status = document.getElementById('status-text');
            const bar = document.getElementById('fill');
            const wm = document.getElementById('wm');
            const display = document.getElementById('display');

            log.innerText = "GENERATiNG FREE 5-SEC ViDEO RENDER...";
            let progress = 0;
            const run = setInterval(() => {
                progress += 2;
                bar.style.width = progress + "%";
                bar.parentElement.setAttribute('aria-valuenow', progress);
                status.innerText = "FREE_RENDER_FRAME_" + Math.floor(progress * 1.2);

                if (progress == 30) log.innerText = "BUiLDiNG 5-SECOND ViDEO SEQUENCE...";
                if (progress == 60) log.innerText = "APPLYiNG ViSUAL LAYERS...";
                if (progress == 85) log.innerText = "FiNALiZiNG 5-SEC OUTPUT...";

                if (progress >= 100) {
                    clearInterval(run);
                    // Only deduct AFTER render completes
                    freeRenders--;
                    localStorage.setItem('knocks_free_renders', freeRenders);
                    updateFreeTierUI();

                    log.innerText = "FREE 5-SEC ViDEO RENDER COMPLETE. " + freeRenders + " FREE RENDER(S) REMAiNiNG.";
                    status.innerText = "FREE_RENDER_COMPLETE";
                    wm.style.display = "none";
                    display.style.borderColor = "#00FF00";
                    display.style.background = "linear-gradient(135deg, #001a00 0%, #000500 100%)";
                    status.style.color = "#00FF00";
                    status.style.fontSize = "0.8rem";
                    status.style.letterSpacing = "3px";
                    renderInProgress = false;
                    document.getElementById('free-render-btn').disabled = false;
                    document.getElementById('burn-btn').disabled = false;
                    document.getElementById('preview-btn').disabled = false;
                    bar.style.width = "0%";
                }
            }, 40);
        }

        // FREE PREViEW — no credits charged
        function previewRender() {
            if (renderInProgress) return;
            const prompt = document.getElementById('prompt').value;
            if(!prompt) { alert("ENTER A PROMPT TO PREViEW"); return; }

            renderInProgress = true;
            document.getElementById('preview-btn').disabled = true;
            document.getElementById('burn-btn').disabled = true;
            document.getElementById('free-render-btn').disabled = true;
            const log = document.getElementById('console');
            const status = document.getElementById('status-text');
            const wm = document.getElementById('wm');
            const bar = document.getElementById('fill');
            const display = document.getElementById('display');

            log.innerText = "GENERATING_PREVIEW... (FREE — NO CREDiTS CHARGED)";
            let progress = 0;
            const run = setInterval(() => {
                progress += 2;
                bar.style.width = progress + "%";
                bar.parentElement.setAttribute('aria-valuenow', progress);
                status.innerText = "PREViEW_SCAN_" + Math.floor(progress * 1.2);

                if(progress >= 100) {
                    clearInterval(run);
                    log.innerText = "PREViEW READY — WATERMARKED. FULL RENDER FOR CLEAN OUTPUT.";
                    status.innerText = "PREViEW_COMPLETE";
                    wm.style.display = "block";
                    display.style.borderColor = "var(--neon)";
                    display.style.background = "linear-gradient(135deg, #001a1a 0%, #050505 100%)";
                    renderInProgress = false;
                    document.getElementById('preview-btn').disabled = false;
                    document.getElementById('burn-btn').disabled = false;
                    document.getElementById('free-render-btn').disabled = false;
                    bar.style.width = "0%";
                }
            }, 30);
        }

        // FULL RENDER — 50 credits (deducted ONLY after completion)
        function startRender() {
            if (renderInProgress) return;
            if(credits < 50) {
                alert("NEED 50 CREDiTS. YOU HAVE " + credits + ". ViSiT THE ARCHiVE STORE.");
                return;
            }
            const prompt = document.getElementById('prompt').value;
            if(!prompt) { alert("ENTER A PROMPT FIRST"); return; }

            renderInProgress = true;
            document.getElementById('burn-btn').disabled = true;
            document.getElementById('preview-btn').disabled = true;
            document.getElementById('free-render-btn').disabled = true;

            let progress = 0;
            const bar = document.getElementById('fill');
            const log = document.getElementById('console');
            const wm = document.getElementById('wm');
            const status = document.getElementById('status-text');
            const display = document.getElementById('display');

            log.innerText = "iNiTiATiNG 9K RENDER... CREDiTS WiLL BE CHARGED ON COMPLETiON.";

            const run = setInterval(() => {
                progress += 1;
                bar.style.width = progress + "%";
                bar.parentElement.setAttribute('aria-valuenow', progress);
                status.innerText = "RENDERiNG_FRAME_" + Math.floor(progress * 2.4);

                if(progress == 20) log.innerText = "INJECTING_TRADEMARK_SIGNATURE...";
                if(progress == 50) log.innerText = "APPLYING_9K_RENDER_LAYER...";
                if(progress == 80) log.innerText = "FINALIZING_CLEAN_OUTPUT...";

                if(progress >= 100) {
                    clearInterval(run);
                    // Deduct credits ONLY after successful render
                    credits -= 50;
                    localStorage.setItem('knocks_credits', credits);
                    document.getElementById('coin-info').innerText = `CREDITS: ${credits}`;

                    log.innerText = "RENDER COMPLETE — CLEAN OUTPUT READY. -50 CREDiTS CHARGED.";
                    status.innerText = "RENDER_COMPLETE";
                    wm.style.display = "none";
                    display.style.borderColor = "var(--gold)";
                    display.style.background = "linear-gradient(135deg, #1a1200 0%, #050505 100%)";
                    status.style.color = "var(--gold)";
                    status.style.fontSize = "0.8rem";
                    status.style.letterSpacing = "3px";
                    renderInProgress = false;
                    document.getElementById('burn-btn').disabled = false;
                    document.getElementById('preview-btn').disabled = false;
                    document.getElementById('free-render-btn').disabled = false;
                }
            }, 50);
        }
    </script>
</body>
</html>
